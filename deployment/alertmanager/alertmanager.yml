# Prometheus Alertmanager configuration for MinIVess drift monitoring
# Default receiver: webhook + JSONL log
# External researchers configure their own Slack/email via .env overrides

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default-webhook'

  routes:
    - match:
        severity: critical
      receiver: 'default-webhook'
      repeat_interval: 15m

receivers:
  - name: 'default-webhook'
    webhook_configs:
      - url: '${ALERTMANAGER_WEBHOOK_URL:-http://host.docker.internal:9094/webhook}'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
