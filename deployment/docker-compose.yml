# MinIVess MLOps v2 — Docker Compose with Profile-Based Resource Tiers
#
# Copy .env.example to .env and adjust values before starting:
#   cp .env.example .env
#
# Usage:
#   docker compose --profile dev up              → 4 services  (~4 GB RAM)
#   docker compose --profile monitoring up       → 7 services  (~8 GB RAM)
#   docker compose --profile full up             → 12 services (~16 GB RAM)
#
# NOTE: Evidently AI is a Python library integrated into the pipeline code,
#       NOT a Docker service (no stable Docker image exists). Drift reports
#       are exported to Grafana dashboards. See Section 16.1 C4.
#
# Legacy training container (v0.1-alpha) preserved in deployment/archived/

x-common-labels: &common-labels
  labels:
    project: minivess-mlops
    managed-by: docker-compose

services:
  # ===========================================================================
  # Profile: dev — Core infrastructure (4 services, ~4 GB RAM)
  # ===========================================================================

  postgres:
    image: postgres:16
    container_name: minivess-postgres
    profiles: ["dev", "monitoring", "full"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-minivess}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-minivess_secret}
      POSTGRES_DB: ${POSTGRES_DB_MLFLOW:-mlflow}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_DB_MLFLOW:-mlflow},${POSTGRES_DB_LANGFUSE:-langfuse}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-minivess} -d ${POSTGRES_DB_MLFLOW:-mlflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    <<: *common-labels

  minio:
    image: minio/minio:RELEASE.2025-02-08T19-54-51Z
    container_name: minivess-minio
    profiles: ["dev", "monitoring", "full"]
    command: server /data --console-address ":${MINIO_CONSOLE_PORT:-9001}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    <<: *common-labels

  # minio-init: auto-create required buckets on stack startup.
  # Runs once after MinIO is healthy, then exits (restart: "no").
  # Fixes: MLflow artifact logging failure when mlflow-artifacts bucket doesn't exist.
  minio-init:
    image: minio/mc:RELEASE.2025-02-08T19-54-51Z
    container_name: minivess-minio-init
    profiles: ["dev", "monitoring", "full"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - >-
        mc alias set local http://minivess-minio:9000
        $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing local/${MLFLOW_ARTIFACT_BUCKET:-mlflow-artifacts} &&
        mc mb --ignore-existing local/model-registry &&
        echo 'MinIO buckets initialized successfully'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
    networks:
      - minivess
    restart: "no"
    <<: *common-labels

  mlflow:
    build:
      context: ..
      dockerfile: deployment/docker/Dockerfile.mlflow
    image: minivess-mlflow:v3.10.0
    container_name: minivess-mlflow
    profiles: ["dev", "monitoring", "full"]
    command: >
      mlflow server
        --backend-store-uri postgresql://${POSTGRES_USER:-minivess}:${POSTGRES_PASSWORD:-minivess_secret}@${POSTGRES_DOCKER_HOST:-postgres}:5432/${POSTGRES_DB_MLFLOW:-mlflow}
        --default-artifact-root s3://${MLFLOW_ARTIFACT_BUCKET:-mlflow-artifacts}/
        --host 0.0.0.0
        --port ${MLFLOW_PORT:-5000}
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://${MINIO_DOCKER_HOST:-minio}:${MINIO_API_PORT:-9000}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    <<: *common-labels

  # ---------------------------------------------------------------------------
  # mlflow-secure — MLflow with basic-auth (profile: secure)
  #
  # MUTUALLY EXCLUSIVE with the default 'mlflow' service — both bind the same
  # port (${MLFLOW_PORT:-5000}). Cannot run simultaneously (port collision).
  # Stop mlflow before starting mlflow-secure:
  #   docker compose --env-file .env stop mlflow
  #   docker compose --env-file .env --profile secure up -d mlflow-secure
  # ---------------------------------------------------------------------------
  mlflow-secure:
    build:
      context: ..
      dockerfile: deployment/docker/Dockerfile.mlflow
    image: minivess-mlflow:v3.10.0
    container_name: minivess-mlflow-secure
    profiles: ["secure"]
    command: >
      mlflow server
        --backend-store-uri postgresql://${POSTGRES_USER:-minivess}:${POSTGRES_PASSWORD:-minivess_secret}@${POSTGRES_DOCKER_HOST:-postgres}:5432/${POSTGRES_DB_MLFLOW:-mlflow}
        --default-artifact-root s3://${MLFLOW_ARTIFACT_BUCKET:-mlflow-artifacts}/
        --host 0.0.0.0
        --port ${MLFLOW_PORT:-5000}
        --app-name basic-auth
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://${MINIO_DOCKER_HOST:-minio}:${MINIO_API_PORT:-9000}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
      - ./mlflow/auth.ini:/mlflow/auth.ini:ro
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    <<: *common-labels

  bentoml:
    image: ${BENTOML_IMAGE:-bentoml/bento-server:latest}
    container_name: minivess-bentoml
    profiles: ["dev", "monitoring", "full"]
    ports:
      - "${BENTOML_PORT:-3333}:3000"
    environment:
      BENTOML_HOME: ${BENTOML_HOME:-/home/minivess/bentoml}
    restart: unless-stopped
    <<: *common-labels

  # ===========================================================================
  # Prefect Server + Workers (workflow orchestration)
  # ===========================================================================

  prefect-server:
    image: prefecthq/prefect:3-python3.12
    container_name: minivess-prefect
    profiles: ["dev", "monitoring", "full"]
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://${POSTGRES_USER:-minivess}:${POSTGRES_PASSWORD:-minivess_secret}@${POSTGRES_DOCKER_HOST:-postgres}:5432/${POSTGRES_DB_PREFECT:-prefect}
    ports:
      - "${PREFECT_PORT:-4200}:4200"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    <<: *common-labels

  prefect-worker-cpu:
    image: prefecthq/prefect:3-python3.12
    container_name: minivess-prefect-worker-cpu
    profiles: ["monitoring", "full"]
    command: prefect worker start --pool cpu-pool --type docker
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
    depends_on:
      - prefect-server
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    <<: *common-labels

  prefect-worker-gpu:
    image: prefecthq/prefect:3-python3.12
    container_name: minivess-prefect-worker-gpu
    profiles: ["full"]
    command: prefect worker start --pool gpu-pool --type docker
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
    depends_on:
      - prefect-server
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    <<: *common-labels

  # ===========================================================================
  # Profile: monitoring — Observability stack (+4 services, ~8 GB RAM total)
  # ===========================================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: minivess-prometheus
    profiles: ["monitoring", "full"]
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    <<: *common-labels

  grafana:
    image: grafana/grafana:latest
    container_name: minivess-grafana
    profiles: ["monitoring", "full"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    <<: *common-labels

  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: minivess-otel-collector
    profiles: ["monitoring", "full"]
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"
    volumes:
      - ./otel/otel-collector-config.yml:/etc/otelcol/config.yaml:ro
    restart: unless-stopped
    <<: *common-labels

  # Evidently 0.7+ monitoring service — drift metrics for Grafana
  evidently:
    image: python:3.13-slim
    container_name: minivess-evidently
    profiles: ["monitoring", "full"]
    ports:
      - "${EVIDENTLY_PORT:-8085}:8000"
    volumes:
      - ./evidently:/app/evidently:ro
      - evidently_data:/app/workspace
    environment:
      EVIDENTLY_WORKSPACE: /app/workspace
    command: ["python", "-c", "import http.server; http.server.HTTPServer(('', 8000), http.server.SimpleHTTPRequestHandler).serve_forever()"]
    restart: unless-stopped
    <<: *common-labels

  # Prometheus Alertmanager — webhook + JSONL drift alerts
  alertmanager:
    image: prom/alertmanager:latest
    container_name: minivess-alertmanager
    profiles: ["monitoring", "full"]
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    restart: unless-stopped
    <<: *common-labels

  # ===========================================================================
  # Profile: full — Complete platform (+6 services, ~16 GB RAM total)
  # ===========================================================================

  langfuse:
    image: langfuse/langfuse:latest
    container_name: minivess-langfuse
    profiles: ["full"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-minivess}:${POSTGRES_PASSWORD:-minivess_secret}@${POSTGRES_DOCKER_HOST:-postgres}:5432/${POSTGRES_DB_LANGFUSE:-langfuse}
      NEXTAUTH_URL: http://localhost:${LANGFUSE_PORT:-3001}
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET:-changeme-langfuse-secret}
      SALT: ${LANGFUSE_SALT:-changeme-langfuse-salt}
    ports:
      - "${LANGFUSE_PORT:-3001}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    <<: *common-labels

  monai-label:
    image: projectmonai/monailabel:latest
    container_name: minivess-monai-label
    profiles: ["full"]
    ports:
      - "${MONAI_LABEL_PORT:-8000}:8000"
    volumes:
      - ./monai-label/apps:/workspace/apps
    restart: unless-stopped
    <<: *common-labels

  ollama:
    image: ollama/ollama:latest
    container_name: minivess-ollama
    profiles: ["full"]
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0
    restart: unless-stopped
    <<: *common-labels

  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: minivess-label-studio
    profiles: ["full"]
    environment:
      LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED: "true"
      LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT: /label-studio/files
    ports:
      - "${LABEL_STUDIO_PORT:-8080}:8080"
    volumes:
      - label_studio_data:/label-studio/data
    restart: unless-stopped
    <<: *common-labels

  marquez:
    image: marquezproject/marquez:latest
    container_name: minivess-marquez
    profiles: ["full"]
    # MARQUEZ_PORT / MARQUEZ_ADMIN_PORT are Marquez-internal env vars (container port).
    # The host-side port mappings below use the .env.example variables.
    environment:
      MARQUEZ_PORT: 5000
      MARQUEZ_ADMIN_PORT: 5001
    ports:
      - "${MARQUEZ_PORT:-5001}:5001"
      - "${MARQUEZ_API_PORT:-5002}:5000"
    restart: unless-stopped
    <<: *common-labels

  # ---------------------------------------------------------------------------
  # CopilotKit — AG-UI protocol bridge for agentic dashboard
  #
  # Self-hosted CopilotKit runtime connects the React dashboard frontend
  # to Pydantic AI agents via the AG-UI streaming protocol. The runtime
  # proxies AG-UI events between the frontend and the dashboard agent
  # FastAPI endpoint (dashboard-api service).
  #
  # Activate: docker compose --profile full up copilotkit
  # AG-UI spec: https://docs.ag-ui.com/introduction
  # ---------------------------------------------------------------------------
  copilotkit:
    build:
      context: ..
      dockerfile: deployment/copilotkit/Dockerfile
    image: minivess-copilotkit:latest
    container_name: minivess-copilotkit
    profiles: ["full"]
    ports:
      - "${COPILOTKIT_PORT:-4111}:4111"
    environment:
      COPILOTKIT_PORT: ${COPILOTKIT_PORT:-4111}
      DASHBOARD_API_URL: http://${DASHBOARD_API_DOCKER_HOST:-dashboard-api}:${DASHBOARD_API_PORT:-8090}
    networks:
      - minivess
    restart: unless-stopped
    <<: *common-labels

  # ---------------------------------------------------------------------------
  # Falco — eBPF runtime security monitoring (profile: security)
  #
  # Falco REQUIRES privileged: true for eBPF kernel module access.
  # All other MinIVess services remain unprivileged (enforced by test_falco.py).
  #
  # Activate: docker compose --profile security up falco
  # Custom rules: deployment/falco/minivess_rules.yaml
  # Alerts on: model checkpoint exfiltration, shell spawns in flow containers,
  #            unexpected outbound network connections.
  # ---------------------------------------------------------------------------
  falco:
    image: falcosecurity/falco-no-driver:latest
    container_name: minivess-falco
    profiles: ["security"]
    privileged: true
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - ./falco/minivess_rules.yaml:/etc/falco/rules.d/minivess.yaml:ro
    environment:
      FALCO_BPF_PROBE: ""
    command: ["/usr/bin/falco", "--modern-bpf", "-r", "/etc/falco/rules.d/minivess.yaml"]
    networks:
      - minivess
    restart: "no"

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  mlflow_artifacts:
    driver: local
  grafana_data:
    driver: local
  label_studio_data:
    driver: local
  evidently_data:
    driver: local
  ollama_data:
    driver: local
