# MinIVess MLOps — GPU Smoke Test on GCP Spot via SkyPilot
#
# GCP provides VM-based instances with Docker preinstalled.
# Spot instances: 60-91% cheaper than on-demand.
# Same-region as GCS/Cloud SQL/MLflow (europe-north1, Finland).
# ALL infrastructure on GCP — no cross-Atlantic artifact uploads.
#
# Launch:
#   uv run python scripts/launch_smoke_test.py --model sam3_vanilla --cloud gcp
#
# Cost: T4 spot $0.14/hr, L4 spot $0.22/hr — cheapest Docker-compatible GPUs.
#
# Docker image: GAR (same-region, fast pulls). Setup: DVC data pull only.
# BANNED: apt-get, uv sync, git clone in setup (Docker mandate).

name: minivess-gcp-smoke-test

resources:
  # Docker image from GCP Artifact Registry (same-region = fast 1-3 min pulls)
  # Fallback to GHCR if GAR image not yet pushed
  image_id: docker:europe-north1-docker.pkg.dev/minivess-mlops/minivess/base:latest
  # L4 ONLY — T4 BANNED (Turing: no BF16 → FP16 overflow → NaN in SAM3 encoder).
  # L4 is 1.86x faster AND 37% cheaper per job than T4.
  # A100 fallback for models needing >24 GB VRAM (sam3_topolora).
  # See: .claude/metalearning/2026-03-15-t4-turing-fp16-nan-ban.md
  accelerators: {L4: 1, A100: 1}
  cloud: gcp
  use_spot: true
  disk_size: 100
  disk_tier: best

# Checkpoint persistence via GCS bucket mount.
# The bucket must exist (created by Pulumi). Use 'source' to reference
# an externally-created bucket rather than letting SkyPilot create one.
file_mounts:
  /app/checkpoints:
    source: gs://minivess-mlops-checkpoints
    mode: MOUNT

envs:
  MODEL_FAMILY: sam3_vanilla
  # DVC data still from UpCloud S3 until migrated to GCS (P2.3)
  DVC_S3_ENDPOINT_URL: ${DVC_S3_ENDPOINT_URL}
  DVC_S3_ACCESS_KEY: ${DVC_S3_ACCESS_KEY}
  DVC_S3_SECRET_KEY: ${DVC_S3_SECRET_KEY}
  # Note: SkyPilot only supports ${VAR} expansion (not ${VAR:-default}).
  # DVC_S3_BUCKET must be set in .env or exported before launch.
  DVC_S3_BUCKET: ${DVC_S3_BUCKET}
  DVC_REMOTE: upcloud
  AWS_REQUEST_CHECKSUM_CALCULATION: WHEN_REQUIRED
  AWS_RESPONSE_CHECKSUM_VALIDATION: WHEN_REQUIRED
  # MLflow on GCP Cloud Run (same-region, no auth needed for Cloud Run public)
  # SkyPilot ONLY expands ${VAR} from the launch shell's os.environ.
  # ${MLFLOW_GCP_URI} and ${MLFLOW_TRACKING_URI} must BOTH be set in .env
  # (or passed via --env at launch time). MLFLOW_TRACKING_URI is the one
  # the training code reads; MLFLOW_GCP_URI is the Pulumi output alias.
  # Pass BOTH explicitly to sky jobs launch --env.
  MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
  # Cloud Run MLflow has no auth for now (--allow-unauthenticated)
  # TODO: add basic-auth via MLflow --app-name basic-auth

  # CRITICAL: Enable multipart upload on CLIENT side
  # Cloud Run has 32 MB request limit — 910 MB checkpoints must use chunked upload
  # With multipart enabled, MLflow generates presigned GCS URLs and client
  # uploads chunks directly to GCS, bypassing the 32 MB Cloud Run limit.
  MLFLOW_ENABLE_PROXY_MULTIPART_UPLOAD: "true"
  MLFLOW_MULTIPART_UPLOAD_CHUNK_SIZE: "10485760"

  GIT_PYTHON_REFRESH: quiet
  MINIVESS_ALLOW_HOST: "1"
  PREFECT_DISABLED: "1"
  SPLITS_DIR: /app/configs/splits
  CHECKPOINT_DIR: /app/checkpoints
  LOGS_DIR: /app/logs
  PYTORCH_ALLOC_CONF: "expandable_segments:True"
  HF_TOKEN: ${HF_TOKEN}

setup: |
  set -ex
  cd /app

  dvc init --no-scm -f
  dvc remote add upcloud s3://${DVC_S3_BUCKET}
  dvc remote modify upcloud endpointurl ${DVC_S3_ENDPOINT_URL}
  dvc remote modify --local upcloud access_key_id ${DVC_S3_ACCESS_KEY}
  dvc remote modify --local upcloud secret_access_key ${DVC_S3_SECRET_KEY}

  cat > dvc.yaml << 'DVCEOF'
  stages:
    download:
      cmd: "true"
      outs:
        - data/raw/minivess/
      frozen: true
  DVCEOF

  cat > dvc.lock << 'LOCKEOF'
  schema: '2.0'
  stages:
    download:
      cmd: "true"
      outs:
      - path: data/raw/minivess/
        hash: md5
        md5: e712f8b23f377a4990b91bef0b1aef76.dir
        size: 2749883382
        nfiles: 350
  LOCKEOF

  dvc pull -r upcloud

  cp configs/splits/smoke_test_1fold_4vol.json configs/splits/splits.json
  mkdir -p /app/checkpoints /app/logs

  if [ "${MODEL_FAMILY}" = "vesselfm" ]; then
    python -c "from huggingface_hub import hf_hub_download; hf_hub_download('bwittmann/vesselFM', 'vesselFM_base.pt')" || true
  fi

  echo "=== Pre-flight Check ==="
  nvidia-smi
  python -c "import torch; print(f'PyTorch: {torch.__version__}, CUDA: {torch.cuda.is_available()}, GPU: {torch.cuda.get_device_name(0) if torch.cuda.is_available() else \"N/A\"}')"
  ls -la configs/splits/splits.json
  ls data/raw/minivess/imagesTr/ | head -5 || echo "WARNING: No training data!"

run: |
  cd /app

  if [ ! -f configs/splits/splits.json ]; then
    echo "FATAL: splits.json missing — setup did not complete."
    exit 1
  fi
  if [ ! -d data/raw/minivess/imagesTr ]; then
    echo "FATAL: Training data missing — DVC pull failed in setup."
    exit 1
  fi

  # Use cloud-specific experiment configs when available (validation enabled,
  # AMP policy correct). Falls back to standard smoke config otherwise.
  CLOUD_CONFIG="configs/experiment/smoke_${MODEL_FAMILY}_cloud.yaml"
  if [ -f "${CLOUD_CONFIG}" ]; then
    export EXPERIMENT="smoke_${MODEL_FAMILY}_cloud"
  else
    export EXPERIMENT="smoke_${MODEL_FAMILY}"
  fi
  export EXPERIMENT_UUID=$(python -c "import uuid; print(uuid.uuid4().hex[:8])")

  # CLI-level Hydra overrides for cloud-specific training behavior.
  # "+" = add new key not in struct. "++" = force-override existing key.
  # mixed_precision: SAM3 model config constraint (MONAI #4243, AMP + sliding_window = NaN).
  # val_interval: cloud GPUs (L4: 24 GB) should validate every epoch, unlike 8 GB RunPod sentinel.
  # NOTE: cloud=gcp_spot group has val_interval:1 but experiment config (val_interval:3) wins
  #   via @package _global_ ordering. Belt-and-suspenders CLI override is needed until
  #   the config flattening is fixed (docs/planning/hydra-double-check.md Phase 3).
  CLOUD_OVERRIDES=""
  if echo "${MODEL_FAMILY}" | grep -q "sam3"; then
    CLOUD_OVERRIDES="++mixed_precision=false,++val_interval=1"
  fi

  if [ -n "${CLOUD_OVERRIDES}" ]; then
    export HYDRA_OVERRIDES="experiment_name=smoke_test_${EXPERIMENT_UUID}_${MODEL_FAMILY},cloud=gcp_spot,${CLOUD_OVERRIDES}"
  else
    export HYDRA_OVERRIDES="experiment_name=smoke_test_${EXPERIMENT_UUID}_${MODEL_FAMILY},cloud=gcp_spot"
  fi

  echo "=== MinIVess GPU Smoke Test (GCP Spot) ==="
  echo "Model: ${MODEL_FAMILY}"
  echo "MLflow server: ${MLFLOW_TRACKING_URI}"

  python -m minivess.orchestration.flows.train_flow
