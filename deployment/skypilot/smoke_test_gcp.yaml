# MinIVess MLOps — GPU Smoke Test on GCP Spot via SkyPilot
#
# GCP provides VM-based instances with Docker preinstalled.
# Spot instances: 60-91% cheaper than on-demand.
# Same-region as GCS/Cloud SQL/MLflow (europe-west4, Finland).
# ALL infrastructure on GCP — no cross-Atlantic artifact uploads.
#
# Launch:
#   set -a && source .env && set +a
#   sky jobs launch deployment/skypilot/smoke_test_gcp.yaml --env MODEL_FAMILY=sam3_vanilla -y
#
# Or via Makefile (recommended):
#   make smoke-test-gcp MODEL=sam3_vanilla
#
# Cost: L4 spot $0.22/hr — cheapest BF16-capable Docker-compatible GPU.
# T4 BANNED: Turing architecture, no BF16 → FP16 overflow → NaN in SAM3 encoder.
# See: .claude/metalearning/2026-03-15-t4-turing-fp16-nan-ban.md
#
# Data source: GCS bucket gs://minivess-mlops-dvc-data via ADC (Application Default Credentials).
# GCP VMs authenticate to GCS via service account — NO S3 credentials needed.
# BANNED: DVC_S3_ENDPOINT_URL, DVC_S3_ACCESS_KEY, DVC_S3_SECRET_KEY in this file.
# See: .claude/metalearning/2026-03-16-gcp-uses-gcs-not-upcloud-s3.md
#
# MLflow: Cloud Run at ${MLFLOW_TRACKING_URI} (set in .env before launch).
# Docker image: GAR (same-region, ~15 min pull — dominates provisioning time).
# BANNED: apt-get, uv sync, git clone in setup (Docker mandate).
# Setup: DVC data pull from GCS only.

name: minivess-gcp-smoke-test

resources:
  # Docker image from GCP Artifact Registry (same-region = fastest pulls, ~15 min for 9 GB)
  image_id: docker:europe-west4-docker.pkg.dev/minivess-mlops/minivess/base:latest
  # L4 ONLY. A100 removed — unauthorized. T4 BANNED (no BF16).
  # See: .claude/metalearning/2026-03-15-t4-turing-fp16-nan-ban.md
  accelerators: L4:1
  cloud: gcp
  use_spot: true
  disk_size: 100
  disk_tier: best
  job_recovery:
    max_restarts_on_errors: 3

# Checkpoint persistence: MLflow GCS artifact store.
# file_mounts removed — MLflow is the only persistence mechanism.

envs:
  MODEL_FAMILY: sam3_vanilla

  # GCP data source: GCS bucket via DVC (ADC auth — NO S3 keys needed).
  # GCP VMs get ADC automatically via service account (Pulumi-provisioned).
  # Prerequisite: gs://minivess-mlops-dvc-data must be populated (one-time: dvc push -r gcs).
  DVC_REMOTE: gcs

  # MLflow on GCP Cloud Run (same-region, no auth needed for Cloud Run public).
  # CRITICAL: Use ${MLFLOW_TRACKING_URI} directly — SkyPilot cannot chain env var refs.
  # Must be set in .env before launch: MLFLOW_TRACKING_URI=<Cloud Run URL>
  # Note: SkyPilot only supports ${VAR} expansion (not ${VAR:-default}).
  MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}

  # MLflow server uses --no-serve-artifacts: client uploads directly to GCS.
  # No proxy multipart needed — google-cloud-storage handles resumable upload.
  # See: .claude/metalearning/2026-03-17-docker-research-report-false-premise.md

  GIT_PYTHON_REFRESH: quiet
  MINIVESS_ALLOW_HOST: "1"
  PREFECT_DISABLED: "1"
  SPLITS_DIR: /app/configs/splits
  CHECKPOINT_DIR: /app/checkpoints
  LOGS_DIR: /app/logs
  PYTORCH_ALLOC_CONF: "expandable_segments:True"
  HF_TOKEN: ${HF_TOKEN}

setup: |
  set -ex
  cd /app

  # TIMING: Capture phase timestamps for FinOps benchmarking (Issue #747).
  # Parsed by scripts/infra_timing.py — plain key=value format (no regex needed).
  echo "TIMING: phase=docker_ready ts=$(date +%s)"

  # HuggingFace login for gated models (SAM3, VesselFM).
  # HF_TOKEN is passed via SkyPilot envs: block from the launching machine.
  if [ -n "${HF_TOKEN}" ]; then
    huggingface-cli login --token "${HF_TOKEN}" --add-to-git-credential 2>/dev/null || true
    echo "HF_TOKEN: logged in"
  else
    echo "WARNING: HF_TOKEN not set — gated models (SAM3) will fail"
  fi

  # Data: GCS bucket via DVC using Application Default Credentials (ADC).
  # GCP VMs authenticate automatically via service account — no key files needed.
  # NEVER use UpCloud S3 for GCP (wrong architecture — caused 8+ failed jobs 2026-03-16).
  dvc init --no-scm -f
  dvc remote add gcs gs://minivess-mlops-dvc-data

  cat > dvc.yaml << 'DVCEOF'
  stages:
    download:
      cmd: "true"
      outs:
        - data/raw/minivess/
      frozen: true
  DVCEOF

  cat > dvc.lock << 'LOCKEOF'
  schema: '2.0'
  stages:
    download:
      cmd: "true"
      outs:
      - path: data/raw/minivess/
        hash: md5
        md5: e712f8b23f377a4990b91bef0b1aef76.dir
        size: 2749883382
        nfiles: 350
  LOCKEOF

  dvc pull -r gcs
  echo "TIMING: phase=dvc_done ts=$(date +%s)"

  cp configs/splits/smoke_test_1fold_4vol.json configs/splits/splits.json
  mkdir -p /app/checkpoints /app/logs

  if [ "${MODEL_FAMILY}" = "vesselfm" ]; then
    python -c "from huggingface_hub import hf_hub_download; hf_hub_download('bwittmann/vesselFM', 'vesselFM_base.pt')" || true
  fi

  echo "=== Pre-flight Check ==="
  nvidia-smi
  python -c "import torch; print(f'PyTorch: {torch.__version__}, CUDA: {torch.cuda.is_available()}, GPU: {torch.cuda.get_device_name(0) if torch.cuda.is_available() else \"N/A\"}')"
  ls -la configs/splits/splits.json
  ls data/raw/minivess/imagesTr/ | head -5 || echo "WARNING: No training data!"

run: |
  cd /app

  echo "TIMING: phase=training_start ts=$(date +%s)"

  if [ ! -f configs/splits/splits.json ]; then
    echo "FATAL: splits.json missing — setup did not complete."
    exit 1
  fi
  if [ ! -d data/raw/minivess/imagesTr ]; then
    echo "FATAL: Training data missing — DVC pull from GCS failed in setup."
    exit 1
  fi

  # Compute EXPERIMENT in shell (NOT in envs — SkyPilot can't resolve intra-envs ${}).
  # Use cloud-specific experiment configs when available (validation enabled, AMP correct).
  # Falls back to standard smoke config otherwise.
  CLOUD_CONFIG="configs/experiment/smoke_${MODEL_FAMILY}_cloud.yaml"
  if [ -f "${CLOUD_CONFIG}" ]; then
    export EXPERIMENT="smoke_${MODEL_FAMILY}_cloud"
  else
    export EXPERIMENT="smoke_${MODEL_FAMILY}"
  fi
  export EXPERIMENT_UUID=$(python -c "import uuid; print(uuid.uuid4().hex[:8])")

  # CLI-level Hydra overrides for cloud-specific training behavior.
  # "+" = add new key not in struct. "++" = force-override existing key.
  # mixed_precision: SAM3 model config constraint (MONAI #4243, AMP + sliding_window = NaN).
  # val_interval: cloud GPUs (L4: 24 GB) should validate every epoch, unlike 8 GB RunPod sentinel.
  # NOTE: cloud=gcp_spot group has val_interval:1 but experiment config (val_interval:3) wins
  #   via @package _global_ ordering. Belt-and-suspenders CLI override is needed until
  #   the config flattening is fixed (docs/planning/hydra-double-check.md Phase 3).
  CLOUD_OVERRIDES=""
  if echo "${MODEL_FAMILY}" | grep -q "sam3"; then
    CLOUD_OVERRIDES="++mixed_precision=false,++val_interval=1"
  fi

  if [ -n "${CLOUD_OVERRIDES}" ]; then
    export HYDRA_OVERRIDES="experiment_name=smoke_test_${EXPERIMENT_UUID}_${MODEL_FAMILY},cloud=gcp_spot,${CLOUD_OVERRIDES}"
  else
    export HYDRA_OVERRIDES="experiment_name=smoke_test_${EXPERIMENT_UUID}_${MODEL_FAMILY},cloud=gcp_spot"
  fi

  echo "=== MinIVess GPU Smoke Test (GCP Spot) ==="
  echo "Model: ${MODEL_FAMILY}"
  echo "MLflow server: ${MLFLOW_TRACKING_URI}"

  python -m minivess.orchestration.flows.train_flow

  echo "TIMING: phase=training_end ts=$(date +%s)"
