# MinIVess MLOps — Dev Environment on RunPod (No Custom Docker Image)
#
# Quick GPU iteration without the 21.4 GB Docker image pull.
# Uses SkyPilot's default RunPod image + installs deps via uv in setup.
#
# Launch:
#   uv run python scripts/launch_dev_runpod.py --model dynunet
#   uv run python scripts/launch_dev_runpod.py --model sam3_vanilla --spot
#
# Or via Makefile:
#   make dev-gpu MODEL=dynunet
#
# Architecture:
#   RunPod pod = container (SkyPilot default image, pre-cached = instant start)
#   setup: installs Python 3.13 + uv + project deps + pulls DVC data (~8-12 min)
#   run: executes training directly (no Docker-in-Docker, no Prefect)
#
# This is the "dev" environment — no Docker, no Prefect, direct execution.
# For staging/prod (Docker-mandatory), use Lambda Labs (issue #681).
#
# Cost: A4000 $0.16/hr, RTX 4090 $0.44/hr (on-demand)
# Auto-stop: 15 min idle → pod stops (restart with 'sky start')
#
# Prerequisites:
#   - RunPod API key configured: sky check runpod
#   - UpCloud MLflow server running
#   - DVC data pushed to UpCloud S3: dvc push -r upcloud
#   - .env populated with DVC_S3_*, MLFLOW_CLOUD_* variables

name: minivess-dev

resources:
  cloud: runpod
  # GPU fallback: SkyPilot tries cheapest available.
  # DynUNet needs ~3.5 GB, sam3_vanilla ~3.5 GB, sam3_hybrid ~7.5 GB.
  # A4000 (16 GB) is cheapest and sufficient for all models.
  accelerators: {A4000: 1, RTX4090: 1, RTX3090: 1, A40: 1, RTX4080: 1, L40S: 1}
  # On-demand for dev reliability (spot can preempt during debugging).
  use_spot: false
  disk_size: 50

# Sync project source to the pod via rsync. SkyPilot places files at
# ~/sky_workdir/ and cds there before running setup:/run:.
# .skyignore excludes data/, mlruns/, outputs/, .git objects, .venv/.
workdir: .

envs:
  # Model to train (override with --env MODEL_FAMILY=...)
  MODEL_FAMILY: dynunet

  # DVC data pull credentials (UpCloud S3)
  DVC_S3_ENDPOINT_URL: ${DVC_S3_ENDPOINT_URL}
  DVC_S3_ACCESS_KEY: ${DVC_S3_ACCESS_KEY}
  DVC_S3_SECRET_KEY: ${DVC_S3_SECRET_KEY}
  DVC_S3_BUCKET: ${DVC_S3_BUCKET:-minivess-dvc-data}
  DVC_REMOTE: upcloud

  # boto3 CRC32C checksum workaround for UpCloud S3 (H17)
  AWS_REQUEST_CHECKSUM_CALCULATION: WHEN_REQUIRED
  AWS_RESPONSE_CHECKSUM_VALIDATION: WHEN_REQUIRED

  # Remote MLflow tracking (UpCloud) — resolved by launcher script
  MLFLOW_TRACKING_URI: ${MLFLOW_CLOUD_URI}
  MLFLOW_TRACKING_USERNAME: ${MLFLOW_CLOUD_USERNAME:-admin}
  MLFLOW_TRACKING_PASSWORD: ${MLFLOW_CLOUD_PASSWORD}

  # Suppress git warning
  GIT_PYTHON_REFRESH: quiet

  # Dev environment escape hatches (approved — same as pytest, RC12)
  MINIVESS_ALLOW_HOST: "1"
  PREFECT_DISABLED: "1"

  # PyTorch CUDA memory optimization
  PYTORCH_ALLOC_CONF: "expandable_segments:True"

  # HuggingFace token (required for SAM3 + VesselFM weight download)
  HF_TOKEN: ${HF_TOKEN}

setup: |
  set -ex  # Fail fast, trace commands

  echo "=== MinIVess Dev Environment Setup ==="
  echo "This installs Python 3.13 + all project deps (~8-12 min first time)"

  # SkyPilot workdir: we're already in ~/sky_workdir/ with all source files.
  WORKDIR=$(pwd)
  TIMING_FILE="${WORKDIR}/timing_setup.txt"

  # Infrastructure timing: record setup_start (issue #683)
  echo "setup_start=$(date +%s.%N)" > "$TIMING_FILE"

  # Step 1: Install Python 3.13 from deadsnakes PPA
  # SkyPilot's default RunPod image has Python 3.10/3.11 — we need 3.13
  echo "python_install_start=$(date +%s.%N)" >> "$TIMING_FILE"
  if ! python3.13 --version 2>/dev/null; then
    apt-get update -qq
    apt-get install -y -qq software-properties-common
    add-apt-repository -y ppa:deadsnakes/ppa
    apt-get update -qq
    apt-get install -y -qq python3.13 python3.13-venv python3.13-dev
  fi
  python3.13 --version
  echo "python_install_end=$(date +%s.%N)" >> "$TIMING_FILE"

  # Step 2: Install uv (fast Python package manager)
  echo "uv_install_start=$(date +%s.%N)" >> "$TIMING_FILE"
  if ! command -v uv &>/dev/null; then
    curl -LsSf https://astral.sh/uv/install.sh | sh
  fi
  export PATH="$HOME/.local/bin:$PATH"
  uv --version
  echo "uv_install_end=$(date +%s.%N)" >> "$TIMING_FILE"

  # Step 3: Create venv with Python 3.13 and install project dependencies
  echo "uv_sync_start=$(date +%s.%N)" >> "$TIMING_FILE"
  uv venv --python python3.13 .venv
  export VIRTUAL_ENV="${WORKDIR}/.venv"
  export PATH="${WORKDIR}/.venv/bin:$HOME/.local/bin:$PATH"
  uv sync --all-extras
  echo "uv_sync_end=$(date +%s.%N)" >> "$TIMING_FILE"

  # Step 4: Configure DVC + pull training data
  echo "dvc_config_start=$(date +%s.%N)" >> "$TIMING_FILE"
  dvc init --no-scm -f

  dvc remote add upcloud s3://${DVC_S3_BUCKET}
  dvc remote modify upcloud endpointurl ${DVC_S3_ENDPOINT_URL}
  dvc remote modify --local upcloud access_key_id ${DVC_S3_ACCESS_KEY}
  dvc remote modify --local upcloud secret_access_key ${DVC_S3_SECRET_KEY}

  # Write minimal DVC pipeline for data pull
  cat > dvc.yaml << 'DVCEOF'
  stages:
    download:
      cmd: "true"
      outs:
        - data/raw/minivess/
      frozen: true
  DVCEOF

  cat > dvc.lock << 'LOCKEOF'
  schema: '2.0'
  stages:
    download:
      cmd: "true"
      outs:
      - path: data/raw/minivess/
        hash: md5
        md5: e712f8b23f377a4990b91bef0b1aef76.dir
        size: 2749883382
        nfiles: 350
  LOCKEOF
  echo "dvc_config_end=$(date +%s.%N)" >> "$TIMING_FILE"

  echo "dvc_pull_start=$(date +%s.%N)" >> "$TIMING_FILE"
  dvc pull -r upcloud
  echo "dvc_pull_end=$(date +%s.%N)" >> "$TIMING_FILE"

  # Step 5: Use smoke test splits (4 volumes — dev is for quick iteration)
  cp configs/splits/smoke_test_1fold_4vol.json configs/splits/splits.json

  # Step 6: Create required directories for train_flow.py
  mkdir -p checkpoints logs

  # Step 7: Pre-cache model weights during setup (don't burn GPU time)
  echo "model_weights_start=$(date +%s.%N)" >> "$TIMING_FILE"
  if [ "${MODEL_FAMILY}" = "vesselfm" ]; then
    python -c "from huggingface_hub import hf_hub_download; hf_hub_download('bwittmann/vesselFM', 'vesselFM_base.pt')" || true
  fi
  if echo "${MODEL_FAMILY}" | grep -q "sam3"; then
    python -c "from transformers import Sam3Model; Sam3Model.from_pretrained('facebook/sam3')" || true
  fi
  echo "model_weights_end=$(date +%s.%N)" >> "$TIMING_FILE"

  # Step 8: Verify environment
  echo "verification_start=$(date +%s.%N)" >> "$TIMING_FILE"
  echo "=== Pre-flight Check ==="
  nvidia-smi
  python -c "import torch; print(f'PyTorch: {torch.__version__}, CUDA: {torch.cuda.is_available()}, GPU: {torch.cuda.get_device_name(0) if torch.cuda.is_available() else \"N/A\"}')"
  python -c "import monai; print(f'MONAI: {monai.__version__}')"
  ls -la configs/splits/splits.json
  ls data/raw/minivess/imagesTr/ | head -5 || echo "WARNING: No training data!"
  echo "verification_end=$(date +%s.%N)" >> "$TIMING_FILE"

  echo "setup_end=$(date +%s.%N)" >> "$TIMING_FILE"
  echo "=== Setup complete (timing written to $TIMING_FILE) ==="

run: |
  # SkyPilot workdir: we're in ~/sky_workdir/
  WORKDIR=$(pwd)
  export PATH="${WORKDIR}/.venv/bin:$HOME/.local/bin:$PATH"
  export VIRTUAL_ENV="${WORKDIR}/.venv"

  # Set train_flow.py env requirements (paths relative to workdir)
  export SPLITS_DIR="${WORKDIR}/configs/splits"
  export CHECKPOINT_DIR="${WORKDIR}/checkpoints"
  export LOGS_DIR="${WORKDIR}/logs"

  # Guard: verify setup completed
  if [ ! -f configs/splits/splits.json ]; then
    echo "FATAL: splits.json missing — setup did not complete. Use 'sky launch' not 'sky exec'."
    exit 1
  fi
  if [ ! -d data/raw/minivess/imagesTr ]; then
    echo "FATAL: Training data missing — DVC pull failed in setup."
    exit 1
  fi

  # Compute EXPERIMENT in shell (SkyPilot can't resolve intra-envs ${})
  export EXPERIMENT="smoke_${MODEL_FAMILY}"

  # UUID isolation via HYDRA_OVERRIDES
  export EXPERIMENT_UUID=$(python -c "import uuid; print(uuid.uuid4().hex[:8])")
  export HYDRA_OVERRIDES="experiment_name=dev_${EXPERIMENT_UUID}_${MODEL_FAMILY}"

  echo "=== MinIVess Dev GPU Run ==="
  echo "Model: ${MODEL_FAMILY}"
  echo "Hydra config: ${EXPERIMENT}"
  echo "MLflow experiment: dev_${EXPERIMENT_UUID}_${MODEL_FAMILY}"
  echo "MLflow server: ${MLFLOW_TRACKING_URI}"
  echo "Splits: $(cat configs/splits/splits.json | python -c 'import json,sys; d=json.load(sys.stdin); print(f"{len(d)} folds")')"

  # Infrastructure timing: timing_setup.txt written by setup block (#683)
  # train_flow.py reads it via infrastructure_timing.log_infrastructure_timing()
  if [ -f "${WORKDIR}/timing_setup.txt" ]; then
    echo "Infrastructure timing file found: $(wc -l < ${WORKDIR}/timing_setup.txt) entries"
  fi

  # Execute training flow
  python -m minivess.orchestration.flows.train_flow
