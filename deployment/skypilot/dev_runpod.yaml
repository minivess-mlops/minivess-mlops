# MinIVess MLOps — Dev Environment on RunPod (Network Volume + File-Based MLflow)
#
# Quick GPU iteration without custom Docker images or remote MLflow servers.
# Uses SkyPilot's default RunPod image + installs deps via uv in setup.
# All persistent data lives on RunPod Network Volume "minivess-dev".
#
# Architecture (plan v5.0 — UpCloud dropped 2026-03-16):
#   RunPod Network Volume (persistent NVMe, $3.50/month for 50 GB):
#     /opt/vol/data/raw/minivess/   ← training data (loaded once, cached forever)
#     /opt/vol/mlruns/              ← MLflow tracking (file-based, no server)
#     /opt/vol/checkpoints/         ← Saved model weights
#     /opt/vol/.cache/huggingface/  ← SAM3 ViT-32L (~1.8 GB), VesselFM (~120 MB)
#     /opt/vol/.cache/torch/        ← torchvision/torchhub weights
#
#   Data loading strategy (UpCloud DROPPED):
#     1. If data already on Network Volume → SKIP (zero cost, instant)
#     2. If not → rsync from local machine first (one-time, run before launch):
#        make dev-gpu-upload-data
#        (runs: sky rsync up data/raw/minivess/ minivess-dev:/opt/vol/data/raw/)
#     3. Fallback: DVC pull from AWS S3 (s3://minivessdataset, no custom credentials)
#
#   MLflow sync back to local (closes #716):
#     make dev-gpu-sync
#     (runs: sky rsync down minivess-dev:/opt/vol/mlruns/ mlruns/)
#
# Launch:
#   sky launch deployment/skypilot/dev_runpod.yaml --env MODEL_FAMILY=dynunet
#   sky launch deployment/skypilot/dev_runpod.yaml --env MODEL_FAMILY=sam3_vanilla
#   make dev-gpu-launch MODEL=dynunet
#
# Volume setup (one-time, auto-detected in pre-flight):
#   sky storage apply deployment/skypilot/minivess-dev-volume.yaml
#   make dev-gpu-upload-data    # rsync local data/ to Network Volume
#
# Post-run sync:
#   make dev-gpu-sync           # pull /opt/vol/mlruns/ back to local mlruns/
#   make dev-gpu-cleanup        # optional: clear volume checkpoints/logs
#
# Cost: RTX 4090 $0.74/hr (on-demand), ~15-20 min/run = ~$0.20/run
#       RTX 3090 $0.34/hr (community), ~15-20 min/run = ~$0.09/run
#
# Prerequisites:
#   - RunPod API key: sky check runpod
#   - Network volume exists: sky storage ls | grep minivess-dev (auto-checked)
#   - Local data populated: ls data/raw/minivess/imagesTr/ | wc -l → should be 47
#   - .env populated with HF_TOKEN (for SAM3/VesselFM)

name: minivess-dev

resources:
  cloud: runpod
  # Consumer RTX with ≥24 GB VRAM. sam3_hybrid ~7.5 GB, VesselFM ~10 GB.
  # SkyPilot tries cheapest available from this list.
  accelerators: {RTX4090: 1, RTX5090: 1, RTX3090: 1}
  # On-demand for dev reliability (spot can preempt during debugging).
  use_spot: false
  disk_size: 50

# Persistent storage — survives pod termination.
# Created via: sky volumes apply deployment/skypilot/minivess-dev-volume.yaml
volumes:
  /opt/vol: minivess-dev

# Sync project source to the pod via rsync. SkyPilot places files at
# ~/sky_workdir/ and cds there before running setup:/run:.
# .skyignore excludes data/, mlruns/, outputs/, .git objects, .venv/.
workdir: .

envs:
  # Model to train (override with --env MODEL_FAMILY=...)
  MODEL_FAMILY: dynunet

  # Data source: Network Volume cache-first. No UpCloud (dropped 2026-03-16).
  # If data missing on volume, setup falls back to AWS S3 (no custom credentials).
  # For first-time data load: run `make dev-gpu-upload-data` from local machine.
  DVC_REMOTE: remote_storage

  # File-based MLflow on Network Volume — NO remote server needed
  MLFLOW_TRACKING_URI: /opt/vol/mlruns

  # Suppress git warning
  GIT_PYTHON_REFRESH: quiet

  # Dev environment escape hatches (approved — same as pytest, RC12)
  MINIVESS_ALLOW_HOST: "1"
  PREFECT_DISABLED: "1"

  # PyTorch CUDA memory optimization
  PYTORCH_ALLOC_CONF: "expandable_segments:True"

  # HuggingFace token (required for SAM3 + VesselFM weight download)
  HF_TOKEN: ${HF_TOKEN}

  # Weight cache on Network Volume — download once, reuse forever
  HF_HOME: /opt/vol/.cache/huggingface
  TORCH_HOME: /opt/vol/.cache/torch

setup: |
  set -ex  # Fail fast, trace commands

  echo "=== MinIVess Dev Environment Setup ==="
  echo "Network Volume mounted at /opt/vol"

  # SkyPilot workdir: we're already in ~/sky_workdir/ with all source files.
  WORKDIR=$(pwd)
  TIMING_FILE="${WORKDIR}/timing_setup.txt"

  # Infrastructure timing: record setup_start (issue #683)
  echo "setup_start=$(date +%s.%N)" > "$TIMING_FILE"

  # Verify volume is mounted
  if [ ! -d /opt/vol ]; then
    echo "FATAL: Network volume not mounted at /opt/vol"
    echo "  Create it: sky volumes apply deployment/skypilot/minivess-dev-volume.yaml"
    exit 1
  fi
  echo "Network volume OK: $(df -h /opt/vol | tail -1)"

  # Create persistent directories on volume (idempotent)
  mkdir -p /opt/vol/data/raw /opt/vol/mlruns /opt/vol/checkpoints /opt/vol/logs
  mkdir -p /opt/vol/.cache/huggingface /opt/vol/.cache/torch

  # Step 1: Install Python 3.13 from deadsnakes PPA
  # SkyPilot's default RunPod image has Python 3.10/3.11 — we need 3.13
  echo "python_install_start=$(date +%s.%N)" >> "$TIMING_FILE"
  if ! python3.13 --version 2>/dev/null; then
    apt-get update -qq
    apt-get install -y -qq software-properties-common
    add-apt-repository -y ppa:deadsnakes/ppa
    apt-get update -qq
    apt-get install -y -qq python3.13 python3.13-venv python3.13-dev
  fi
  python3.13 --version
  echo "python_install_end=$(date +%s.%N)" >> "$TIMING_FILE"

  # Step 2: Install uv (fast Python package manager)
  echo "uv_install_start=$(date +%s.%N)" >> "$TIMING_FILE"
  if ! command -v uv &>/dev/null; then
    curl -LsSf https://astral.sh/uv/install.sh | sh
  fi
  export PATH="$HOME/.local/bin:$PATH"
  uv --version
  echo "uv_install_end=$(date +%s.%N)" >> "$TIMING_FILE"

  # Step 3: Create venv with Python 3.13 and install project dependencies
  echo "uv_sync_start=$(date +%s.%N)" >> "$TIMING_FILE"
  uv venv --python python3.13 .venv
  export VIRTUAL_ENV="${WORKDIR}/.venv"
  export PATH="${WORKDIR}/.venv/bin:$HOME/.local/bin:$PATH"
  # --all-extras includes mamba-ssm which needs nvcc (not available on RunPod default image).
  # Install all extras EXCEPT mamba-ssm. mamba-ssm is only built in Docker builder stage.
  uv sync --extra eval --extra quality --extra dev --extra agents --extra sam --extra serving --extra hydra --extra ci --extra infra --extra sky
  # T0.7: Verify python symlink exists in venv (reviewer C1 fix, #696)
  ls -la "${WORKDIR}/.venv/bin/python"* | head -5
  if [ ! -e "${WORKDIR}/.venv/bin/python" ]; then
    echo "WARNING: No python symlink in venv — creating one"
    ln -sf "${WORKDIR}/.venv/bin/python3.13" "${WORKDIR}/.venv/bin/python"
  fi
  echo "Python in venv: $(${WORKDIR}/.venv/bin/python --version)"
  echo "uv_sync_end=$(date +%s.%N)" >> "$TIMING_FILE"

  # Step 4: Verify training data is on Network Volume (NO S3 fallback)
  # Upload your data BEFORE launching: make dev-gpu-upload-data LOCAL_DATA=data/raw/
  # For MiniVess from EBRAINS: run Acquisition Flow locally first, then upload.
  echo "dvc_config_start=$(date +%s.%N)" >> "$TIMING_FILE"
  DATA_DIR=/opt/vol/data/raw/minivess/imagesTr
  if [ -d "${DATA_DIR}" ] && [ "$(ls "${DATA_DIR}" 2>/dev/null | wc -l)" -gt 10 ]; then
    echo "Training data found on Network Volume ($(ls ${DATA_DIR} | wc -l) files)"
  else
    echo "FATAL: Training data not found at /opt/vol/data/raw/minivess/imagesTr/"
    echo ""
    echo "The RunPod 'dev' path requires data uploaded from your local machine first."
    echo "  make dev-gpu-upload-data LOCAL_DATA=/path/to/your/dataset"
    echo ""
    echo "For MiniVess (EBRAINS dataset):"
    echo "  1. prefect deployment run 'acquisition-flow/default'  # download from EBRAINS"
    echo "  2. make dev-gpu-upload-data LOCAL_DATA=data/raw/minivess"
    echo ""
    echo "There is NO automatic S3 fallback. RunPod uses YOUR data, not a shared bucket."
    exit 1
  fi
  echo "dvc_config_end=$(date +%s.%N)" >> "$TIMING_FILE"

  # Symlink volume data into workdir (train_flow.py expects data/raw/minivess/)
  mkdir -p data/raw
  if [ -d /opt/vol/data/raw/minivess ] && [ ! -L data/raw/minivess ]; then
    rm -rf data/raw/minivess
    ln -sf /opt/vol/data/raw/minivess data/raw/minivess
  fi

  # Step 5: Use smoke test splits (4 volumes — dev is for quick iteration)
  cp configs/splits/smoke_test_1fold_4vol.json configs/splits/splits.json

  # Step 6: Create required directories
  mkdir -p checkpoints logs

  # Step 7: Pre-cache model weights during setup (don't burn GPU time)
  # Weights go to HF_HOME/TORCH_HOME on Network Volume — cached forever
  echo "model_weights_start=$(date +%s.%N)" >> "$TIMING_FILE"
  if [ "${MODEL_FAMILY}" = "vesselfm" ]; then
    "${WORKDIR}/.venv/bin/python" -c "from huggingface_hub import hf_hub_download; hf_hub_download('bwittmann/vesselFM', 'vesselFM_base.pt')" || true
  fi
  if echo "${MODEL_FAMILY}" | grep -q "sam3"; then
    "${WORKDIR}/.venv/bin/python" -c "from transformers import Sam3Model; Sam3Model.from_pretrained('facebook/sam3')" || true
  fi
  echo "model_weights_end=$(date +%s.%N)" >> "$TIMING_FILE"

  # Step 8: Verify environment
  echo "verification_start=$(date +%s.%N)" >> "$TIMING_FILE"
  echo "=== Pre-flight Check ==="
  nvidia-smi
  "${WORKDIR}/.venv/bin/python" -c "import torch; print(f'PyTorch: {torch.__version__}, CUDA: {torch.cuda.is_available()}, GPU: {torch.cuda.get_device_name(0) if torch.cuda.is_available() else \"N/A\"}')"
  "${WORKDIR}/.venv/bin/python" -c "import monai; print(f'MONAI: {monai.__version__}')"
  ls -la configs/splits/splits.json
  ls data/raw/minivess/imagesTr/ | head -5 || echo "WARNING: No training data!"
  echo "=== Volume contents ==="
  ls /opt/vol/
  du -sh /opt/vol/.cache/ 2>/dev/null || true
  echo "verification_end=$(date +%s.%N)" >> "$TIMING_FILE"

  echo "setup_end=$(date +%s.%N)" >> "$TIMING_FILE"
  echo "=== Setup complete (timing written to $TIMING_FILE) ==="

run: |
  set -e  # Fail on any error
  # SkyPilot workdir: we're in ~/sky_workdir/
  WORKDIR=$(pwd)
  export PATH="${WORKDIR}/.venv/bin:$HOME/.local/bin:$PATH"
  export VIRTUAL_ENV="${WORKDIR}/.venv"

  # Set train_flow.py env requirements
  export SPLITS_DIR="${WORKDIR}/configs/splits"
  export CHECKPOINT_DIR="/opt/vol/checkpoints"
  export LOGS_DIR="/opt/vol/logs"

  # Guard: verify setup completed
  if [ ! -f configs/splits/splits.json ]; then
    echo "FATAL: splits.json missing — setup did not complete. Use 'sky launch' not 'sky exec'."
    exit 1
  fi
  if [ ! -d data/raw/minivess/imagesTr ]; then
    echo "FATAL: Training data missing — DVC pull failed in setup."
    exit 1
  fi

  # Guard: verify Network Volume is mounted
  if [ ! -d /opt/vol/mlruns ]; then
    echo "FATAL: Network volume not mounted at /opt/vol — mlruns dir missing."
    exit 1
  fi

  # File-based MLflow — just verify the directory exists
  echo "MLflow tracking: ${MLFLOW_TRACKING_URI} (file-based on Network Volume)"
  echo "HF cache: ${HF_HOME}"
  echo "Torch cache: ${TORCH_HOME}"

  # Compute EXPERIMENT in shell (SkyPilot can't resolve intra-envs ${})
  # Respect --experiment override from launch_dev_runpod.py if set
  export EXPERIMENT="${EXPERIMENT:-smoke_${MODEL_FAMILY}}"

  # UUID isolation via HYDRA_OVERRIDES
  export EXPERIMENT_UUID=$(${WORKDIR}/.venv/bin/python -c "import uuid; print(uuid.uuid4().hex[:8])")
  export HYDRA_OVERRIDES="experiment_name=dev_${EXPERIMENT_UUID}_${MODEL_FAMILY}"

  echo "=== MinIVess Dev GPU Run ==="
  echo "Model: ${MODEL_FAMILY}"
  echo "Hydra config: ${EXPERIMENT}"
  echo "MLflow experiment: dev_${EXPERIMENT_UUID}_${MODEL_FAMILY}"
  echo "MLflow tracking: ${MLFLOW_TRACKING_URI} (file-based)"
  echo "Splits: $(cat configs/splits/splits.json | ${WORKDIR}/.venv/bin/python -c 'import json,sys; d=json.load(sys.stdin); print(f"{len(d)} folds")')"

  # Infrastructure timing: timing_setup.txt written by setup block (#683)
  # train_flow.py reads it via infrastructure_timing.log_infrastructure_timing()
  if [ -f "${WORKDIR}/timing_setup.txt" ]; then
    echo "Infrastructure timing file found: $(wc -l < ${WORKDIR}/timing_setup.txt) entries"
  fi

  # Execute training flow
  ${WORKDIR}/.venv/bin/python -m minivess.orchestration.flows.train_flow
