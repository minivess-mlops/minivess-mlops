# MinIVess MLOps — MambaVesselNet++ Smoke Test on RunPod via SkyPilot
#
# GPU smoke test for MambaVesselNet++ with CUDA-compiled mamba-ssm.
# Uses :mamba-latest Docker image (INSTALL_MAMBA=1 build arg).
# Network Volume (data+mlruns) + Docker image → RunPod RTX 4090 → T09 VRAM capture
#
# Pre-flight (run first):
#   make smoke-test-mamba-preflight
#
# Launch (MUST use 'sky jobs launch' for spot recovery — NOT 'sky launch'):
#   sky jobs launch deployment/skypilot/smoke_test_mamba.yaml \
#     --env-file .env -y
#
# Or via Makefile (recommended):
#   make smoke-test-mamba
#
# T09 VRAM capture: logs contain VRAM_PEAK_MB=NNNN (parsed by Ralph monitor)
# T10 smoke test: 2 epochs, 1 fold, 4 volumes → validates end-to-end pipeline
#
# AMP policy (D04): train=ON, val=OFF (MONAI #4243 — selective scan not safe under autocast)
# Config: configs/experiment/smoke_mambavesselnet_cloud.yaml has mixed_precision_val=false
#
# Differences from smoke_test_gpu.yaml:
#   - image_id: minivess-base:mamba-latest (CUDA-compiled mamba-ssm==2.3.1)
#   - volumes: Network Volume for data cache + file-based MLflow
#   - MODEL_FAMILY: mambavesselnet (no HF_TOKEN needed — no pretrained weights)
#   - setup: python -c "import mamba_ssm" verification
#   - run: VRAM_PEAK_MB capture for T09 (#744)
#
# Network Volume required: minivess-dev (create: sky volumes apply deployment/skypilot/minivess-dev-volume.yaml)
# Data upload: make dev-gpu-upload-data (first time — rsync local data to volume)
# MLflow sync: make dev-gpu-sync (after run — pull /opt/vol/mlruns/ back to local)
#
# Cost: ~$0.10/attempt (8 min × $0.74/hr RTX 4090 on-demand)
# Budget: $0.50 max (3 retries) — abort if exceeded
#
# WARNING: 'sky launch' does NOT recover from spot preemption.
#          'sky exec' skips setup: entirely — guards in run: will catch this.
#
# Prerequisites:
#   - RunPod API key: sky check runpod
#   - Network volume: sky storage ls | grep minivess-dev
#   - :mamba-latest image pushed: make push-mamba
#   - Data on volume: make dev-gpu-upload-data (first time) or DVC S3 fallback
#   - .env populated: HF_TOKEN (not needed), GITHUB_TOKEN (for private GHCR)

name: minivess-mamba-smoke-test

resources:
  # :mamba-latest = standard :latest + CUDA-compiled mamba-ssm==2.3.1
  # Build: DOCKER_BUILDKIT=1 docker build --build-arg INSTALL_MAMBA=1 ...
  # Push: make push-mamba (requires GITHUB_TOKEN with write:packages)
  image_id: docker:ghcr.io/petteriteikari/minivess-base:mamba-latest
  # RTX 4090 = Ada Lovelace, RTX 5090 = Blackwell, RTX 3090 = Ampere — all BF16 ✓, ≥24 GB
  # MambaVesselNet++ has no half-precision encoder → safe on all three (unlike SAM3)
  # Estimated VRAM: ~5–8 GB @ patch=(64,64,64), batch=1
  accelerators: {RTX4090: 1, RTX5090: 1, RTX3090: 1}
  cloud: runpod
  # On-demand for reliability (spot often sold out on RunPod, 2026-03-14)
  use_spot: false
  disk_size: 40

# Persistent Network Volume — survives pod termination.
# Created via: sky volumes apply deployment/skypilot/minivess-dev-volume.yaml
# Contents: data/raw/minivess/, mlruns/, checkpoints/, .cache/
volumes:
  /opt/vol: minivess-dev

envs:
  # MambaVesselNet++ model
  MODEL_FAMILY: mambavesselnet

  # DVC data: Network Volume cache-first (UpCloud dropped 2026-03-16)
  # Fallback: AWS S3 public bucket (s3://minivessdataset, no credentials needed)
  DVC_REMOTE: remote_storage

  # File-based MLflow on Network Volume — NO remote server needed
  # Sync back after run: make dev-gpu-sync
  MLFLOW_TRACKING_URI: /opt/vol/mlruns

  # Suppress git warning (runner image has no git — by design)
  GIT_PYTHON_REFRESH: quiet

  # Cloud VM escape hatches (approved — same as pytest, RC12)
  MINIVESS_ALLOW_HOST: "1"
  PREFECT_DISABLED: "1"

  # train_flow.py env requirements (H15)
  SPLITS_DIR: /app/configs/splits
  CHECKPOINT_DIR: /app/checkpoints
  LOGS_DIR: /app/logs

  # PyTorch CUDA memory optimization
  PYTORCH_ALLOC_CONF: "expandable_segments:True"

  # No HF_TOKEN needed — MambaVesselNet++ has no pretrained weights to download

setup: |
  set -ex  # Fail fast, trace commands

  # All deps are in the Docker image — setup is DATA ONLY + mamba verification.
  # NOTE: uv, git, scripts/ are NOT in the runner image.
  # Use python/dvc directly (.venv/bin is on PATH).
  cd /app

  # Verify mamba_ssm CUDA extension compiled and loadable
  echo "=== Verifying mamba-ssm CUDA extension ==="
  python -c "import mamba_ssm; print(f'mamba_ssm {mamba_ssm.__version__} CUDA ready')"

  # Verify Network Volume mounted
  if [ ! -d /opt/vol ]; then
    echo "FATAL: Network volume not mounted at /opt/vol"
    echo "  Create it: sky volumes apply deployment/skypilot/minivess-dev-volume.yaml"
    echo "  Then upload data: make dev-gpu-upload-data"
    exit 1
  fi
  echo "Network volume OK: $(df -h /opt/vol | tail -1)"

  # Create MLflow and checkpoint dirs on volume (idempotent)
  mkdir -p /opt/vol/mlruns /opt/vol/checkpoints /opt/vol/logs

  # Data: Network Volume cache-first. If data not on volume, pull from AWS S3.
  # (UpCloud dropped 2026-03-16. No UpCloud credentials needed.)
  # First-time setup: run `make dev-gpu-upload-data` to rsync local data to volume.
  if [ -d /opt/vol/data/raw/minivess/imagesTr ] && \
     [ "$(ls /opt/vol/data/raw/minivess/imagesTr/ 2>/dev/null | wc -l)" -gt 10 ]; then
    echo "Training data already on Network Volume — skipping DVC pull"
    mkdir -p data/raw
    ln -sf /opt/vol/data/raw/minivess data/raw/minivess
  else
    echo "Pulling training data from AWS S3 (s3://minivessdataset)..."
    # Initialize DVC without git (container has no .git)
    dvc init --no-scm -f

    # Use remote_storage (AWS S3 public dataset bucket, no credentials)
    dvc remote add remote_storage s3://minivessdataset

    # Write minimal DVC pipeline for data pull
    cat > dvc.yaml << 'DVCEOF'
  stages:
    download:
      cmd: "true"
      outs:
        - data/raw/minivess/
      frozen: true
  DVCEOF

    cat > dvc.lock << 'LOCKEOF'
  schema: '2.0'
  stages:
    download:
      cmd: "true"
      outs:
      - path: data/raw/minivess/
        hash: md5
        md5: e712f8b23f377a4990b91bef0b1aef76.dir
        size: 2749883382
        nfiles: 350
  LOCKEOF

    dvc pull -r remote_storage

    # Cache pulled data on volume for next run
    if [ -d data/raw/minivess ] && [ ! -d /opt/vol/data/raw/minivess/imagesTr ]; then
      mkdir -p /opt/vol/data/raw
      cp -r data/raw/minivess /opt/vol/data/raw/
    fi
  fi

  # H13: Use smoke test splits (4 volumes) instead of full 3-fold (70 volumes)
  cp configs/splits/smoke_test_1fold_4vol.json configs/splits/splits.json

  # Create required directories (H15)
  mkdir -p /app/checkpoints /app/logs

  # Verify environment
  echo "=== Pre-flight Check ==="
  nvidia-smi
  python -c "import torch; print(f'PyTorch: {torch.__version__}, CUDA: {torch.cuda.is_available()}, GPU: {torch.cuda.get_device_name(0) if torch.cuda.is_available() else \"N/A\"}')"
  python -c "import mamba_ssm; print(f'mamba_ssm: {mamba_ssm.__version__}')"
  ls -la configs/splits/splits.json
  ls data/raw/minivess/imagesTr/ | head -5 || echo "WARNING: No training data!"
  echo "=== Volume contents ==="
  ls /opt/vol/

run: |
  cd /app

  # Guard: verify setup completed (catches sky exec without setup)
  if [ ! -f configs/splits/splits.json ]; then
    echo "FATAL: splits.json missing — setup did not complete. Use 'sky launch' not 'sky exec'."
    exit 1
  fi
  if [ ! -d data/raw/minivess/imagesTr ]; then
    echo "FATAL: Training data missing — DVC pull failed in setup."
    exit 1
  fi
  if [ ! -d /opt/vol/mlruns ]; then
    echo "FATAL: Network volume not mounted — /opt/vol/mlruns missing."
    exit 1
  fi

  # Compute EXPERIMENT in shell (NOT in envs — SkyPilot can't resolve intra-envs ${})
  export EXPERIMENT="smoke_mambavesselnet"

  # UUID isolation via HYDRA_OVERRIDES → experiment_name in resolved config
  export EXPERIMENT_UUID=$(python -c "import uuid; print(uuid.uuid4().hex[:8])")
  export HYDRA_OVERRIDES="experiment_name=smoke_mamba_${EXPERIMENT_UUID}_${MODEL_FAMILY}"

  echo "=== MinIVess MambaVesselNet++ Smoke Test (T10) ==="
  echo "Model: ${MODEL_FAMILY}"
  echo "Hydra config: ${EXPERIMENT}"
  echo "MLflow experiment: smoke_mamba_${EXPERIMENT_UUID}_${MODEL_FAMILY}"
  echo "MLflow tracking: ${MLFLOW_TRACKING_URI} (file-based on Network Volume)"
  echo "Splits: $(cat configs/splits/splits.json | python -c 'import json,sys; d=json.load(sys.stdin); print(f"{len(d)} folds")')"
  echo "AMP policy: train=ON, val=OFF (D04, MONAI #4243)"

  # Reset VRAM peak stats before training for accurate T09 measurement
  python -c "import torch; torch.cuda.reset_peak_memory_stats(); print('VRAM peak stats reset')"

  # Execute training flow (python is on PATH from .venv/bin)
  python -m minivess.orchestration.flows.train_flow

  # T09: Capture peak VRAM after training completes (closes #744)
  VRAM_MB=$(python -c "import torch; print(torch.cuda.max_memory_allocated() // (1024 * 1024) if torch.cuda.is_available() else 0)")
  VRAM_GB=$(python -c "import torch; mb = torch.cuda.max_memory_allocated() // (1024 * 1024) if torch.cuda.is_available() else 0; print(f'{mb / 1024:.2f}')")
  GPU_NAME=$(python -c "import torch; print(torch.cuda.get_device_name(0) if torch.cuda.is_available() else 'N/A')")
  echo "VRAM_PEAK_MB=${VRAM_MB}"
  echo "VRAM_PEAK_GB=${VRAM_GB}"
  echo "T09 VRAM measurement: ${VRAM_MB} MB (${VRAM_GB} GB) on ${GPU_NAME}"

  echo "=== Smoke test complete. Sync back: make dev-gpu-sync ==="
