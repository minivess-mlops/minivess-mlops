# MinIVess Dev-B Network Volume on RunPod — Concurrency QA / Isolation Test
#
# Intentionally SEPARATE from minivess-dev.
# Used in concurrent RunPod QA (P3 in remaining-runpod-gcp-qa-4th-pass.xml):
#   - Pod A: minivess-dev (pre-loaded data, primary path)
#   - Pod B: minivess-dev-b (EMPTY volume → falls back to s3://minivessdataset)
