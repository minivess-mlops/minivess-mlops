#
# Cost: 50 GB × $0.07/GB/month = $3.50/month
#       IMPORTANT: DELETE after concurrency test (sky volumes delete minivess-dev-b)
#
# Create:  sky volumes apply deployment/skypilot/minivess-dev-b-volume.yaml
# Delete:  sky volumes delete minivess-dev-b
# List:    sky volumes ls
#
# Plan: docs/planning/remaining-runpod-gcp-qa-4th-pass.xml (P3)

name: minivess-dev-b
