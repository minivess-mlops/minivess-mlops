# MinIVess MLOps — Production Training on Cloud GPU via SkyPilot
#
# Full training run: 100 epochs, 3 folds, cbdice_cldice loss (default).
# Uses Docker image with all deps pre-installed.
#
# Launch (MUST use 'sky jobs launch' for spot recovery — NOT 'sky launch'):
#   sky jobs launch deployment/skypilot/train_production.yaml \
#     --env-file .env --env MODEL_FAMILY=sam3_vanilla -y
#
# Or with custom experiment config:
#   sky jobs launch deployment/skypilot/train_production.yaml \
#     --env-file .env --env MODEL_FAMILY=sam3_vanilla \
#     --env EXPERIMENT=sam3_vanilla_baseline -y
#
# Docker image: All deps (Python, PyTorch, MONAI, uv, project code) are baked
# into the GHCR image. SkyPilot setup: only pulls data + copies config.
# BANNED: apt-get, uv sync, git clone in setup (Docker mandate).
#
# Multi-cloud failover: RunPod → GCP → AWS (Lambda archived 2026-03-16)
# Cost: ~$0.44/hr on RTX 4090 spot (RunPod), ~$0.19/hr L4 spot (GCP)
#
# Data strategy (UpCloud dropped 2026-03-16):
#   AWS S3 public bucket (s3://minivessdataset, no credentials needed)
# MLflow strategy:
#   File-based on GCS checkpoint bucket mount (mounted at /app/checkpoints/../mlruns)
#   OR file-based on RunPod Network Volume (/opt/vol/mlruns) for RunPod jobs
#   Post-run sync: make dev-gpu-sync (RunPod) or gsutil rsync (GCP)

name: minivess-train

resources:
  # Docker image from GHCR — all deps pre-installed, no bare VM setup.
  image_id: docker:ghcr.io/petteriteikari/minivess-base:latest
  accelerators: RTX4090:1
  cloud: runpod
  use_spot: true
  disk_size: 80  # Larger disk for full training (checkpoints + logs)
  any_of:
    - cloud: runpod
      accelerators: RTX4090:1
    - cloud: aws
      accelerators: A100:1
    - cloud: gcp
      accelerators: A100:1
    # Lambda Labs archived 2026-03-16 (no EU availability — code in deployment/archived/lambda/)

# Checkpoint persistence via cloud storage bucket mount.
# Bucket must exist (created by Pulumi or manually).
# Bucket name: set GCS_CHECKPOINT_BUCKET in .env (default: minivess-mlops-checkpoints)
file_mounts:
  /app/checkpoints:
    source: gs://${GCS_CHECKPOINT_BUCKET:-minivess-mlops-checkpoints}
    mode: MOUNT

envs:
  # Model to train (override with --env MODEL_FAMILY=...)
  MODEL_FAMILY: dynunet

  # Experiment config (defaults to production config for the model)
  # Override with --env EXPERIMENT=custom_experiment_name
  # EXPERIMENT is computed in run: block, NOT here (SkyPilot can't resolve intra-envs ${})

  # DVC data: AWS S3 public bucket (UpCloud dropped 2026-03-16)
  # s3://minivessdataset is public — no credentials needed
  DVC_REMOTE: remote_storage

  # File-based MLflow on mounted GCS bucket (GCP) or Network Volume (RunPod)
  # GCP: mounted at /app/mlruns via file_mounts (add mlruns bucket to file_mounts if needed)
  # RunPod: use Network Volume pattern from dev_runpod.yaml (MLFLOW_TRACKING_URI=/opt/vol/mlruns)
  # For now: default to file-based in workdir (sync back manually post-run)
  MLFLOW_TRACKING_URI: /app/mlruns

  # Cloud VM escape hatches (approved — same as pytest, RC12)
  MINIVESS_ALLOW_HOST: "1"
  PREFECT_DISABLED: "1"

  # train_flow.py env requirements (H15)
  SPLITS_DIR: /app/configs/splits
  CHECKPOINT_DIR: /app/checkpoints
  LOGS_DIR: /app/logs

  # PyTorch CUDA memory optimization
  PYTORCH_ALLOC_CONF: "expandable_segments:True"

  # HuggingFace token (required for VesselFM + SAM3 weight download)
  HF_TOKEN: ${HF_TOKEN}

setup: |
  set -ex  # Fail fast, trace commands

  # All deps are in the Docker image — setup is DATA ONLY.
  # NOTE: uv, git, scripts/ are NOT in the runner image.
  # Use python/dvc directly (.venv/bin is on PATH).
  cd /app

  # Initialize DVC without git (container has no .git)
  dvc init --no-scm -f

  # Configure DVC remote_storage (AWS S3 public bucket — no credentials needed)
  # UpCloud S3 dropped 2026-03-16 — replaced by public AWS S3 fallback
  dvc remote add remote_storage s3://minivessdataset

  # Write minimal DVC pipeline for data pull.
  # MD5 hash from committed dvc.lock — stable unless data changes.
  cat > dvc.yaml << 'DVCEOF'
  stages:
    download:
      cmd: "true"
      outs:
        - data/raw/minivess/
      frozen: true
  DVCEOF

  cat > dvc.lock << 'LOCKEOF'
  schema: '2.0'
  stages:
    download:
      cmd: "true"
      outs:
      - path: data/raw/minivess/
        hash: md5
        md5: e712f8b23f377a4990b91bef0b1aef76.dir
        size: 2749883382
        nfiles: 350
  LOCKEOF

  # Pull FULL training data from AWS S3 public bucket
  dvc pull -r remote_storage

  # Use full 3-fold splits (70 volumes, seed=42)
  cp configs/splits/3fold_seed42.json configs/splits/splits.json

  # Create required directories (H15)
  mkdir -p /app/checkpoints /app/logs

  # Pre-cache model weights during setup (don't burn GPU time on download)
  if [ "${MODEL_FAMILY}" = "vesselfm" ]; then
    python -c "from huggingface_hub import hf_hub_download; hf_hub_download('bwittmann/vesselFM', 'vesselFM_base.pt')" || true
  fi

  # Verify environment
  echo "=== Pre-flight Check ==="
  nvidia-smi
  python -c "import torch; print(f'PyTorch: {torch.__version__}, CUDA: {torch.cuda.is_available()}, GPU: {torch.cuda.get_device_name(0) if torch.cuda.is_available() else \"N/A\"}')"
  ls -la configs/splits/splits.json
  echo "Training volumes: $(ls data/raw/minivess/imagesTr/ | wc -l)"

run: |
  cd /app

  # Guard: verify setup completed (catches sky exec without setup)
  if [ ! -f configs/splits/splits.json ]; then
    echo "FATAL: splits.json missing — setup did not complete. Use 'sky launch' not 'sky exec'."
    exit 1
  fi
  if [ ! -d data/raw/minivess/imagesTr ]; then
    echo "FATAL: Training data missing — DVC pull failed in setup."
    exit 1
  fi

  # Compute EXPERIMENT in shell (NOT in envs — SkyPilot can't resolve intra-envs ${})
  # Use model-specific experiment config, or override via EXPERIMENT env var
  export EXPERIMENT="${EXPERIMENT:-${MODEL_FAMILY}_production}"

  # UUID isolation for MLflow experiment name
  export EXPERIMENT_UUID=$(python -c "import uuid; print(uuid.uuid4().hex[:8])")
  export HYDRA_OVERRIDES="experiment_name=train_${EXPERIMENT_UUID}_${MODEL_FAMILY}"

  echo "=== MinIVess Production Training ==="
  echo "Model: ${MODEL_FAMILY}"
  echo "Hydra config: ${EXPERIMENT}"
  echo "MLflow experiment: train_${EXPERIMENT_UUID}_${MODEL_FAMILY}"
  echo "MLflow server: ${MLFLOW_TRACKING_URI}"
  echo "Splits: $(cat configs/splits/splits.json | python -c 'import json,sys; d=json.load(sys.stdin); print(f"{len(d)} folds")')"

  # Execute training flow (python is on PATH from .venv/bin)
  python -m minivess.orchestration.flows.train_flow
