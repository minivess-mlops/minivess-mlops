# MinIVess MLOps — SkyPilot Generic Training Task
#
# Launch: sky jobs launch deployment/skypilot/train_generic.yaml
# Dry run: sky jobs launch deployment/skypilot/train_generic.yaml --dryrun
#
# Supports spot instances with automatic failover and checkpointing.

name: minivess-train

resources:
  accelerators: A100:1
  use_spot: true
  disk_size: 100
  cloud: aws
  # Failover order: AWS → GCP → RunPod → Lambda
  any_of:
    - cloud: aws
      accelerators: A100:1
    - cloud: gcp
      accelerators: A100:1
    - cloud: runpod
      accelerators: A100:1
    - cloud: lambda
      accelerators: A100:1

file_mounts:
  /data:
    source: s3://minivess-data/raw
    mode: COPY

  /checkpoints:
    name: minivess-checkpoints
    store: s3
    mode: MOUNT

envs:
  MLFLOW_TRACKING_URI: http://mlflow:5000
  PREFECT_API_URL: ${PREFECT_API_URL}
  LOSS_NAME: cbdice_cldice
  MODEL_FAMILY: dynunet
  COMPUTE: gpu_low
  NUM_FOLDS: 3
  MAX_EPOCHS: 100
  EXPERIMENT_NAME: minivess_training
  CHECKPOINT_DIR: /checkpoints

setup: |
  pip install uv
  cd /app && uv sync --no-dev

run: |
  cd /app
  prefect deployment run 'training-flow/default' \
    --params "{\"loss_name\": \"${LOSS_NAME}\", \"model_family\": \"${MODEL_FAMILY}\", \
               \"compute\": \"${COMPUTE}\", \"num_folds\": ${NUM_FOLDS}, \
               \"max_epochs\": ${MAX_EPOCHS}, \"experiment_name\": \"${EXPERIMENT_NAME}\"}"
