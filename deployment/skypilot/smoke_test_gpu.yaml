# MinIVess MLOps — GPU Smoke Test on RunPod via SkyPilot
#
# Minimal training run to verify the cloud GPU pipeline works end-to-end:
#   UpCloud S3 --DVC pull--> RunPod RTX 4090 --MLflow--> UpCloud MLflow
#
# Launch (MUST use 'sky jobs launch' for spot recovery — NOT 'sky launch'):
#   sky jobs launch deployment/skypilot/smoke_test_gpu.yaml \
#     --env-file .env --env MODEL_FAMILY=sam3_vanilla -y
#
# Or via Makefile (recommended):
#   make smoke-test-gpu MODEL=sam3_vanilla
#
# WARNING: 'sky launch' does NOT recover from spot preemption.
#          'sky exec' skips setup: entirely — guards in run: will catch this.
#
# Docker image: All deps (Python, PyTorch, MONAI, uv, project code) are baked
# into the GHCR image. SkyPilot setup: only pulls data + copies config.
# BANNED: apt-get, uv sync, git clone in setup (see metalearning 2026-03-14).
#
# Cost: ~$0.12/model (2 epochs, 1 fold, 4 volumes, RTX 4090 spot)
# Total: ~$0.36 for all 3 models (sam3_vanilla, sam3_hybrid, vesselfm)
#
# Prerequisites:
#   - RunPod API key configured: sky check runpod
#   - Docker image pushed: make push-ghcr
#   - UpCloud MLflow server running (Pulumi stack)
#   - DVC data pushed to UpCloud S3: dvc push -r upcloud
#   - .env populated with DVC_S3_*, MLFLOW_CLOUD_* variables

name: minivess-smoke-test

resources:
  # Docker image from registry — all deps pre-installed, no bare VM setup.
  # Change registry by updating $DOCKER_REGISTRY in .env.example.
  # SkyPilot resources: block doesn't support ${} interpolation — update here directly.
  # Supported registries: GHCR, Docker Hub, AWS ECR, GCP GAR, Azure ACR.
  image_id: docker:ghcr.io/petteriteikari/minivess-base:latest
  # GPU fallback: SkyPilot tries cheapest available. All have ≥24 GB VRAM.
  # sam3_vanilla needs 2.9 GB, sam3_hybrid ~7.5 GB, vesselfm ~10 GB — any works.
  # If all spot instances sold out, SkyPilot queues and retries automatically.
  accelerators: {RTX4090: 1, RTX3090: 1, A40: 1, L40S: 1, A100-80GB: 1}
  cloud: runpod
  use_spot: true
  disk_size: 40

envs:
  # Model to test (override with --env MODEL_FAMILY=...)
  MODEL_FAMILY: sam3_vanilla

  # DVC data pull credentials (UpCloud S3)
  DVC_S3_ENDPOINT_URL: ${DVC_S3_ENDPOINT_URL}
  DVC_S3_ACCESS_KEY: ${DVC_S3_ACCESS_KEY}
  DVC_S3_SECRET_KEY: ${DVC_S3_SECRET_KEY}
  DVC_S3_BUCKET: ${DVC_S3_BUCKET:-minivess-dvc-data}
  DVC_REMOTE: upcloud

  # boto3 CRC32C checksum workaround for UpCloud S3 (H17)
  AWS_REQUEST_CHECKSUM_CALCULATION: WHEN_REQUIRED
  AWS_RESPONSE_CHECKSUM_VALIDATION: WHEN_REQUIRED

  # Remote MLflow tracking (UpCloud)
  MLFLOW_TRACKING_URI: ${MLFLOW_CLOUD_URI}
  MLFLOW_TRACKING_USERNAME: ${MLFLOW_CLOUD_USERNAME:-admin}
  MLFLOW_TRACKING_PASSWORD: ${MLFLOW_CLOUD_PASSWORD}

  # Cloud VM escape hatches (approved — same as pytest, RC12)
  MINIVESS_ALLOW_HOST: "1"
  PREFECT_DISABLED: "1"

  # train_flow.py env requirements (H15)
  SPLITS_DIR: /app/configs/splits
  CHECKPOINT_DIR: /app/checkpoints
  LOGS_DIR: /app/logs

  # PyTorch CUDA memory optimization
  PYTORCH_ALLOC_CONF: "expandable_segments:True"

  # HuggingFace token (required for VesselFM weight download)
  HF_TOKEN: ${HF_TOKEN}

setup: |
  set -ex  # Fail fast, trace commands

  # All deps are in the Docker image — setup is DATA ONLY.
  # NOTE: uv, git, scripts/ are NOT in the runner image.
  # Use python/dvc directly (.venv/bin is on PATH).
  cd /app

  # Initialize DVC without git (container has no .git)
  dvc init --no-scm

  # Configure DVC upcloud remote with S3 credentials from env
  dvc remote add upcloud s3://${DVC_S3_BUCKET}
  dvc remote modify upcloud endpointurl ${DVC_S3_ENDPOINT_URL}
  dvc remote modify --local upcloud access_key_id ${DVC_S3_ACCESS_KEY}
  dvc remote modify --local upcloud secret_access_key ${DVC_S3_SECRET_KEY}

  # Write minimal DVC pipeline for data pull (only download stage needed).
  # The MD5 hash comes from the committed dvc.lock — stable unless data changes.
  cat > dvc.yaml << 'DVCEOF'
  stages:
    download:
      cmd: "true"
      outs:
        - data/raw/minivess/
      frozen: true
  DVCEOF

  cat > dvc.lock << 'LOCKEOF'
  schema: '2.0'
  stages:
    download:
      cmd: "true"
      outs:
      - path: data/raw/minivess/
        hash: md5
        md5: e712f8b23f377a4990b91bef0b1aef76.dir
        size: 2749883382
        nfiles: 350
  LOCKEOF

  # Pull training data from UpCloud S3
  dvc pull -r upcloud

  # H13: Use smoke test splits (4 volumes) instead of full 3-fold (70 volumes)
  cp configs/splits/smoke_test_1fold_4vol.json configs/splits/splits.json

  # Create required directories (H15)
  mkdir -p /app/checkpoints /app/logs

  # Pre-cache VesselFM weights during setup (H20: don't burn GPU time on download)
  if [ "${MODEL_FAMILY}" = "vesselfm" ]; then
    python -c "from huggingface_hub import hf_hub_download; hf_hub_download('bwittmann/vesselFM', 'vesselFM_base.pt')" || true
  fi

  # Verify environment
  echo "=== Pre-flight Check ==="
  nvidia-smi
  python -c "import torch; print(f'PyTorch: {torch.__version__}, CUDA: {torch.cuda.is_available()}, GPU: {torch.cuda.get_device_name(0) if torch.cuda.is_available() else \"N/A\"}')"
  ls -la configs/splits/splits.json
  ls data/raw/minivess/imagesTr/ | head -5 || echo "WARNING: No training data!"

run: |
  cd /app

  # Guard: verify setup completed (catches sky exec without setup)
  if [ ! -f configs/splits/splits.json ]; then
    echo "FATAL: splits.json missing — setup did not complete. Use 'sky launch' not 'sky exec'."
    exit 1
  fi
  if [ ! -d data/raw/minivess/imagesTr ]; then
    echo "FATAL: Training data missing — DVC pull failed in setup."
    exit 1
  fi

  # Compute EXPERIMENT in shell (NOT in envs — SkyPilot can't resolve intra-envs ${})
  export EXPERIMENT="smoke_${MODEL_FAMILY}"

  # UUID isolation via HYDRA_OVERRIDES → experiment_name in resolved config
  export EXPERIMENT_UUID=$(python -c "import uuid; print(uuid.uuid4().hex[:8])")
  export HYDRA_OVERRIDES="experiment_name=smoke_test_${EXPERIMENT_UUID}_${MODEL_FAMILY}"

  echo "=== MinIVess GPU Smoke Test ==="
  echo "Model: ${MODEL_FAMILY}"
  echo "Hydra config: ${EXPERIMENT}"
  echo "MLflow experiment: smoke_test_${EXPERIMENT_UUID}_${MODEL_FAMILY}"
  echo "MLflow server: ${MLFLOW_TRACKING_URI}"
  echo "Splits: $(cat configs/splits/splits.json | python -c 'import json,sys; d=json.load(sys.stdin); print(f"{len(d)} folds")')"

  # Execute training flow (python is on PATH from .venv/bin)
  python -m minivess.orchestration.flows.train_flow
