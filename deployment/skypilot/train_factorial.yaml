# MinIVess MLOps — Single Factorial Condition on GCP via SkyPilot
#
# Runs ONE condition of the paper factorial study.
# Called by scripts/run_factorial.sh with per-condition env vars.
#
# Env vars (set by run_factorial.sh):
#   MODEL_FAMILY:      dynunet | mambavesselnet | sam3_topolora | sam3_hybrid | sam3_vanilla | vesselfm
#   LOSS_NAME:         cbdice_cldice | dice_ce | dice_ce_cldice | none (zero-shot)
#   FOLD_ID:           0 | 1 | 2
#   WITH_AUX_CALIB:    true | false
#   MAX_EPOCHS:        2 (debug) | 50 (production) | 0 (zero-shot)
#   MAX_TRAIN_VOLUMES: 23 (debug) | 0 (production, full dataset)
#   MAX_VAL_VOLUMES:   12 (debug) | 0 (production, full dataset)
#   EXPERIMENT_NAME:   debug_factorial | paper_factorial
#   ZERO_SHOT:         true | false (default: false)
#   EVAL_DATASET:      minivess | deepvess (default: minivess)
#   POST_TRAINING_METHODS: none,swag (comma-separated, parent flow iterates internally)
#
# Docker image: All deps pre-installed. Setup only pulls data + copies config.
# BANNED: apt-get, uv sync, git clone in setup (CLAUDE.md Rule 17).
# T4 BANNED: Turing architecture, no BF16 (CLAUDE.md).
#
# Source of truth: knowledge-graph/decisions/L3-technology/paper_model_comparison.yaml

name: minivess-factorial

resources:
  # GAR image — same-region as training VMs (europe-north1).
  image_id: docker:europe-north1-docker.pkg.dev/minivess-mlops/minivess/base:latest
  # L4 preferred (Ada Lovelace, BF16, 24 GB, cheapest).
  # A100 fallback for SAM3 TopoLoRA / VesselFM if L4 OOM.
  # T4 BANNED (Turing, no BF16 → FP16 overflow → NaN).
  accelerators: {L4: 1, A100-80GB: 1}
  cloud: gcp
  # Spot: 60-91% cheaper. SkyPilot handles preemption recovery.
  use_spot: true
  disk_size: 100
  disk_tier: best  # SSD for faster checkpoint I/O
  # region removed — L4 not available in all regions. SkyPilot auto-selects.

# Spot preemption: SkyPilot auto-retries via use_spot: true above.
# Note: job_recovery field was removed in SkyPilot v1.0.
# SkyPilot controller handles zone/region failover automatically.

# Checkpoint persistence via GCS bucket mount (#878).
# MOUNT_CACHED: async upload (non-blocking writes). Previous checkpoint survives
# preemption even if last write is interrupted. Our check_resume_state_task()
# detects the latest valid checkpoint on recovery.
file_mounts:
  /app/checkpoints:
    source: gs://minivess-mlops-checkpoints
    mode: MOUNT_CACHED

envs:
  # Per-condition parameters — set by run_factorial.sh
  MODEL_FAMILY: dynunet
  LOSS_NAME: cbdice_cldice
  FOLD_ID: "0"
  WITH_AUX_CALIB: "false"
  MAX_EPOCHS: "2"
  MAX_TRAIN_VOLUMES: "0"
  MAX_VAL_VOLUMES: "0"
  EXPERIMENT_NAME: debug_factorial
  ZERO_SHOT: "false"
  EVAL_DATASET: minivess
  # Comma-separated post-training methods. Parent flow iterates internally.
  # "none" cell comes free from training sub-flow. SWAG runs in post-training sub-flow.
  POST_TRAINING_METHODS: "none,swag"

  # MLflow: Cloud SQL PostgreSQL via Cloud Run (or file-based fallback)
  # All three vars loaded from .env via --env-file in run_factorial.sh.
  # NOTE: SkyPilot does NOT expand ${VAR} in envs — these are overridden
  # by --env-file .env at launch time. Placeholders here serve as documentation.
  MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
  MLFLOW_TRACKING_USERNAME: ${MLFLOW_TRACKING_USERNAME}
  MLFLOW_TRACKING_PASSWORD: ${MLFLOW_TRACKING_PASSWORD}
  # MLflow client resilience — retry on transient network failures
  MLFLOW_HTTP_REQUEST_MAX_RETRIES: "10"
  MLFLOW_HTTP_REQUEST_TIMEOUT: "300"

  # Suppress git warning (runner image has no git)
  GIT_PYTHON_REFRESH: quiet

  # Cloud VM escape hatches (approved — same as smoke test)
  MINIVESS_ALLOW_HOST: "1"
  PREFECT_DISABLED: "1"

  # train_flow.py env requirements
  SPLITS_DIR: /app/configs/splits
  CHECKPOINT_DIR: /app/checkpoints
  LOGS_DIR: /app/logs

  # PyTorch CUDA memory optimization
  PYTORCH_ALLOC_CONF: "expandable_segments:True"

  # HuggingFace token (required for SAM3/VesselFM weight download)
  HF_TOKEN: ${HF_TOKEN}

setup: |
  set -ex

  # All deps are in the Docker image — setup is DATA ONLY.
  cd /app

  # HuggingFace login for gated models (SAM3, VesselFM)
  if [ -n "${HF_TOKEN}" ]; then
    huggingface-cli login --token "${HF_TOKEN}" --add-to-git-credential 2>/dev/null || true
    echo "HF_TOKEN: logged in"
  else
    echo "WARNING: HF_TOKEN not set — gated models (SAM3) will fail"
  fi

  # Data: pull from GCS via DVC (GCP production path)
  # Auth: ADC (Application Default Credentials) — SkyPilot configures this automatically.
  # DVC init required on fresh GCP VM — Docker container has no pre-configured remote.
  echo "Initializing DVC for GCS data pull..."
  dvc init --no-scm -f 2>/dev/null || true
  dvc remote add -f gcs gs://minivess-mlops-dvc-data

  if [ -d "data/raw/minivess/imagesTr" ] && [ "$(ls data/raw/minivess/imagesTr 2>/dev/null | wc -l)" -gt 10 ]; then
    echo "Training data already present ($(ls data/raw/minivess/imagesTr | wc -l) files)"
  else
    echo "Pulling training data from GCS via DVC..."
    # Pull only raw data (data/processed may not exist in GCS yet)
    dvc pull data/raw/minivess -r gcs || {
      echo "FATAL: DVC pull from GCS failed."
      echo "Ensure: gcloud auth application-default login"
      exit 1
    }
  fi

  # Use splits file based on experiment type:
  # Debug: debug_half_1fold.json (23 train / 12 val, fold-0 only)
  # Production: 3fold_seed42.json (47 train / 23 val, 3 folds)
  if [ "${MAX_TRAIN_VOLUMES}" -gt 0 ] 2>/dev/null; then
    # Debug mode: max_train_volumes > 0 means half-data splits
    cp configs/splits/debug_half_1fold.json configs/splits/splits.json
    echo "Using DEBUG splits (half data, 1 fold)"
  else
    cp configs/splits/3fold_seed42.json configs/splits/splits.json
    echo "Using PRODUCTION splits (full data, 3 folds)"
  fi

  # Create required directories
  mkdir -p /app/checkpoints /app/logs

  # Pre-cache model weights during setup (don't burn GPU time on download)
  case "${MODEL_FAMILY}" in
    sam3_vanilla|sam3_topolora|sam3_hybrid)
      echo "Pre-caching SAM3 weights..."
      python -c "from huggingface_hub import hf_hub_download; hf_hub_download('facebook/sam3-hiera-large', 'sam3_hiera_large.pt')" 2>/dev/null || true
      ;;
    vesselfm)
      echo "Pre-caching VesselFM weights..."
      python -c "from huggingface_hub import hf_hub_download; hf_hub_download('bwittmann/vesselFM', 'vesselFM_base.pt')" 2>/dev/null || true
      ;;
  esac

  # Pull DeepVess data for zero-shot evaluation conditions
  if [ "${EVAL_DATASET}" = "deepvess" ] && [ ! -d "data/raw/deepvess/images" ]; then
    echo "Pulling DeepVess data from GCS for zero-shot evaluation..."
    dvc pull data/raw/deepvess.dvc -r gcs || {
      echo "FATAL: DeepVess DVC pull failed."
      exit 1
    }
  fi

  # === PRE-FLIGHT CHECKS ===
  echo "=== Pre-flight Check ==="
  echo "Model:     ${MODEL_FAMILY}"
  echo "Loss:      ${LOSS_NAME}"
  echo "Fold:      ${FOLD_ID}"
  echo "Aux calib: ${WITH_AUX_CALIB}"
  echo "Epochs:    ${MAX_EPOCHS}"
  echo "Zero-shot: ${ZERO_SHOT}"
  echo "Dataset:   ${EVAL_DATASET}"
  echo "MLflow:    ${MLFLOW_TRACKING_URI}"

  # GPU verification — FAIL FAST if CUDA is not available.
  # Without this, training runs on CPU (100x slower, will OOM on system RAM).
  nvidia-smi
  python -c "import torch, sys; print(f'PyTorch: {torch.__version__}, CUDA: {torch.cuda.is_available()}'); sys.exit(1) if not torch.cuda.is_available() else print(f'GPU: {torch.cuda.get_device_name(0)}, VRAM: {torch.cuda.get_device_properties(0).total_memory / 1e9:.1f} GB')"

  # MLflow connectivity check — FAIL FAST if server is unreachable.
  # Without this, training runs for hours then silently loses all metrics.
  if echo "${MLFLOW_TRACKING_URI}" | grep -qE "^https?://"; then
    echo "Checking MLflow server connectivity..."
    python -c "import os, sys; uri = os.environ['MLFLOW_TRACKING_URI']; from mlflow.tracking import MlflowClient; client = MlflowClient(tracking_uri=uri); exps = client.search_experiments(max_results=1); print(f'MLflow OK: {uri} ({len(exps)} experiments)')" || {
      echo "FATAL: MLflow server is not reachable. Training would lose all metrics."
      echo "Check: MLFLOW_TRACKING_URI, MLFLOW_TRACKING_USERNAME, MLFLOW_TRACKING_PASSWORD"
      exit 1
    }
  elif [ -n "${MLFLOW_TRACKING_URI}" ]; then
    echo "WARNING: MLFLOW_TRACKING_URI='${MLFLOW_TRACKING_URI}' is file-based."
    echo "Metrics will be stored on ephemeral VM disk and LOST when job completes."
    echo "Set MLFLOW_TRACKING_URI to your Cloud Run URL for persistent tracking."
  else
    echo "FATAL: MLFLOW_TRACKING_URI is empty. Cannot log metrics."
    exit 1
  fi

run: |
  cd /app

  # Guard: verify setup completed
  if [ ! -f configs/splits/splits.json ]; then
    echo "FATAL: splits.json missing — setup did not complete."
    exit 1
  fi

  echo "=== MinIVess Factorial Condition ==="
  echo "Model:     ${MODEL_FAMILY}"
  echo "Loss:      ${LOSS_NAME}"
  echo "Fold:      ${FOLD_ID}"
  echo "Aux calib: ${WITH_AUX_CALIB}"
  echo "Epochs:    ${MAX_EPOCHS}"
  echo "Zero-shot: ${ZERO_SHOT}"
  echo "Dataset:   ${EVAL_DATASET}"

  # Execute via train_flow module (Rule #17: Prefect flows, NOT standalone scripts)
  # CLI args MUST match train_flow.py argparse exactly (no short aliases).
  python -m minivess.orchestration.flows.train_flow \
    --model-family "${MODEL_FAMILY}" \
    --loss-name "${LOSS_NAME}" \
    --fold "${FOLD_ID}" \
    --with-aux-calib "${WITH_AUX_CALIB}" \
    --max-epochs "${MAX_EPOCHS}" \
    --max-train-volumes "${MAX_TRAIN_VOLUMES}" \
    --max-val-volumes "${MAX_VAL_VOLUMES}" \
    --experiment-name "${EXPERIMENT_NAME}" \
    --zero-shot "${ZERO_SHOT}" \
    --eval-dataset "${EVAL_DATASET}" \
    --post-training-method "${POST_TRAINING_METHODS}"
