# Lambda Labs — VM-based GPU instances.
# Docker works natively (VM has Docker pre-installed).
# Multi-region rotation handled by launch_smoke_test.py.
#
# Override per-lab: configs/lab/<lab_name>.yaml

provider: lambda
region: null  # multi-region rotation (see LAMBDA_REGIONS_BY_PRIORITY)
use_spot: false  # Lambda has no spot — on-demand only
disk_size: 40

# GPU priority: cheapest first. A10 ($0.50/hr), A100 ($1.10/hr).
accelerators:
  - A10:1
  - A100:1
  - GH200:1
  - H100:1

# Docker image from GHCR (requires GITHUB_TOKEN for private repos).
docker_registry: ghcr
docker_image: ghcr.io/petteriteikari/minivess-base:latest

# MLflow tracking via UpCloud (MLFLOW_CLOUD_URI in .env).
mlflow_env_var: MLFLOW_CLOUD_URI
