# MinIVess MLOps v2 — Per-Flow Docker Compose
#
# Each Prefect flow runs in its own container with independent
# scaling and resource management. Flows communicate via MLflow
# artifacts — no shared filesystem or direct function calls.
#
# ALL flow outputs are volume-mounted — /tmp is never used for artifacts.
# See docs/planning/intermedia-plan-synthesis.md Part 2 for full audit.
#
# Usage:
#   docker compose -f deployment/docker-compose.flows.yml build
#   docker compose -f deployment/docker-compose.flows.yml up acquisition
#   docker compose -f deployment/docker-compose.flows.yml up train
#
# Prerequisites: Run `docker compose -f deployment/docker-compose.yml --profile dev up`
# first to start PostgreSQL, MinIO, MLflow, and Prefect.

x-common-env: &common-env
  # All values derive from .env.example — never hardcode here (CLAUDE.md Rule #22).
  MLFLOW_TRACKING_URI: http://${MLFLOW_DOCKER_HOST:-minivess-mlflow}:${MLFLOW_PORT:-5000}
  PREFECT_API_URL: http://${PREFECT_DOCKER_HOST:-minivess-prefect}:${PREFECT_PORT:-4200}/api
  AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
  AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
  # MINIO_DOCKER_HOST uses container name (minivess-minio) since flow containers
  # reach MinIO via minivess-network (not the infra compose project's internal network).
  # Service name "minio" only resolves within deployment_default network.
  MLFLOW_S3_ENDPOINT_URL: http://${MINIO_DOCKER_HOST:-minivess-minio}:${MINIO_API_PORT:-9000}
  # Container-internal artifact paths — defaults match .env.example (Rule #22)
  DATA_DIR: ${DATA_DIR:-/app/data}
  CHECKPOINT_DIR: ${CHECKPOINT_DIR:-/app/checkpoints}
  LOGS_DIR: ${LOGS_DIR:-/app/logs}
  SPLITS_DIR: ${SPLITS_DIR:-/app/configs/splits}
  # HPO — PostgreSQL is the ONLY backend (no SQLite, no in-memory)
  # Rule #22: No hardcoded credentials — use ${POSTGRES_PASSWORD} variable reference.
  OPTUNA_STORAGE_URL: ${OPTUNA_STORAGE_URL:-postgresql+psycopg2://${POSTGRES_USER:-minivess}:${POSTGRES_PASSWORD:-minivess_secret}@${POSTGRES_DOCKER_HOST:-postgres}:5432/${POSTGRES_DB_OPTUNA:-optuna}}
  REPLICA_INDEX: ${REPLICA_INDEX:-0}
  # Prefect log forwarding
  PREFECT_LOGGING_EXTRA_LOGGERS: ${PREFECT_LOGGING_EXTRA_LOGGERS:-minivess}
  # PyTorch 2.x memory allocator — expandable_segments reduces fragmentation OOM
  # on marginal-VRAM models (sam3_hybrid ~7.5GB on 8GB GPU). Fix for #534.
  # PyTorch 2.x reads PYTORCH_ALLOC_CONF (not PYTORCH_CUDA_ALLOC_CONF).
  PYTORCH_ALLOC_CONF: ${PYTORCH_ALLOC_CONF:-expandable_segments:True}
  # HuggingFace token for gated models (SAM3, VesselFM).
  # Set HF_TOKEN in .env — never hard-code here.
  HF_TOKEN: ${HF_TOKEN:-}
  # Model weight cache — mapped from host MODEL_CACHE_HOST_PATH (see .env.example).
  # HF_HOME: HuggingFace hub cache (models, tokenizers, datasets)
  # TORCH_HOME: PyTorch hub cache (MONAI pre-trained bundles, torchvision)
  # Setting these avoids re-downloading multi-GB weights on every container restart.
  HF_HOME: /model_cache/huggingface
  TORCH_HOME: /model_cache/torch
  # DG1.7: Suppress non-actionable ONNX Runtime GPU discovery warning.
  # ORT C++ layer reads this env var before Python code can set it.
  ORT_LOGGING_LEVEL: ${ORT_LOGGING_LEVEL:-3}

x-common-labels: &common-labels
  labels:
    project: minivess-mlops
    managed-by: docker-compose

# ── Security (CIS Docker Benchmark 5.3, 5.25) ────────────────────────────────
# cap_drop ALL: drop all Linux capabilities (deny privilege escalation)
# no-new-privileges: prevent setuid/setgid binaries from gaining new privs
# restart: "no" prevents ghost runs from auto-restarting after exit
x-common-security: &common-security
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  restart: "no"

# GPU services use enforce-mode seccomp profile (SCMP_ACT_ERRNO for unlisted syscalls).
# Derived from Docker moby default (~340 syscalls) — all syscalls needed for CUDA/PyTorch.
# Path is relative to the compose file's directory (deployment/).
# NOTE: x-gpu-security MUST keep cap_drop + no-new-privileges in sync with x-common-security.
x-gpu-security: &gpu-security
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
    - "seccomp=seccomp/train-enforce.json"
  restart: "no"

# ── Log driver (production log rotation — prevents unbounded log files) ───────
# local driver: binary format (more efficient than json-file), auto-compression
# non-blocking mode: log backend slowness doesn't block the training process
# 500MB max per container (50MB × 10 files) — appropriate for long training runs
x-logging: &default-logging
  logging:
    driver: local
    options:
      max-size: "50m"
      max-file: "10"
      compress: "true"
      mode: non-blocking
      max-buffer-size: "4m"

# ── Resource limits (OWASP D07) ────────────────────────────────────────────────
# GPU flows (train, hpo, hpo-worker)
# shm_size: CRITICAL — prevents MONAI 3D DataLoader Bus error (SIGBUS).
# Formula: num_workers * batch_size * patch_bytes * 2 ≈ 8GB for realistic 3D workloads.
# NOTE: shm_size from compose is NOT applied by `docker compose run`.
# Scripts using `docker compose run` must add --shm-size 8g explicitly.
x-gpu-resources: &gpu-resources
  mem_limit: 32g
  memswap_limit: 32g
  cpus: 8.0
  pids_limit: 2048
  shm_size: "8g"

# CPU-intensive flows (data, analyze, post_training, acquisition, biostatistics)
x-cpu-resources: &cpu-resources
  mem_limit: 16g
  memswap_limit: 16g
  cpus: 4.0
  pids_limit: 512

# Lightweight flows (dashboard, pipeline, annotation, deploy)
x-light-resources: &light-resources
  mem_limit: 4g
  cpus: 2.0
  pids_limit: 256

services:
  # Flow 0: Data Acquisition
  acquisition:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.acquisition
    image: minivess-acquisition:latest
    container_name: minivess-flow-acquisition
    environment:
      <<: *common-env
      FLOW_NAME: acquisition
      ACQUISITION_OUTPUT_DIR: /app/data/raw
    volumes:
      - raw_data:/app/data/raw
      - logs_data:/app/logs
    networks:
      - minivess
    <<: [*common-security, *default-logging, *cpu-resources, *common-labels]

  # Flow 1: Data Engineering
  data:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.data
    image: minivess-data:latest
    container_name: minivess-flow-data
    environment:
      <<: *common-env
      FLOW_NAME: data
      SPLITS_OUTPUT_DIR: /app/configs/splits
    volumes:
      - raw_data:/app/data/raw:ro
      - data_cache:/app/data/processed
      - configs_splits:/app/configs/splits
      - mlruns_data:/app/mlruns
    networks:
      - minivess
    <<: [*common-security, *default-logging, *cpu-resources, *common-labels]

  # Flow 2: Model Training (GPU)
  train:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.train
    image: minivess-train:latest
    container_name: minivess-flow-train
    environment:
      <<: *common-env
      FLOW_NAME: train
      # CHECKPOINT_DIR and SPLITS_DIR come from x-common-env (Rule #22)
    volumes:
      - data_cache:/app/data:ro
      - configs_splits:/app/configs/splits:ro
      - checkpoint_cache:/app/checkpoints
      - mlruns_data:/app/mlruns
      - logs_data:/app/logs
      # Persistent model weight cache — avoids re-downloading SAM3 (~9GB), MONAI bundles.
      # MODEL_CACHE_HOST_PATH must be set in .env — no default (machine-specific path).
      - ${MODEL_CACHE_HOST_PATH}:/model_cache
    # CDI GPU access — works without nvidia container runtime (Docker 25+)
    devices:
      - "nvidia.com/gpu=all"
    networks:
      - minivess
    <<: [*gpu-security, *default-logging, *gpu-resources, *common-labels]

  # Flow 2.5: Post-Training (SWA, calibration, conformal)
  # GPU required: SWA weight averaging, temperature scaling, conformal calibration
  # all operate on GPU model tensors.
  post_training:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.post_training
    image: minivess-post-training:latest
    container_name: minivess-flow-post-training
    environment:
      <<: *common-env
      FLOW_NAME: post_training
      POST_TRAINING_OUTPUT_DIR: /app/outputs/post_training
    volumes:
      - checkpoint_cache:/app/checkpoints:ro
      - data_cache:/app/data:ro
      - post_training_out:/app/outputs/post_training
      - mlruns_data:/app/mlruns
      - ${MODEL_CACHE_HOST_PATH}:/model_cache
    # CDI GPU access — SWA/calibration need GPU for model weight operations
    devices:
      - "nvidia.com/gpu=all"
    networks:
      - minivess
    <<: [*gpu-security, *default-logging, *gpu-resources, *common-labels]

  # Flow 3: Model Analysis
  # GPU required: sliding_window_inference for model evaluation, ensemble inference.
  analyze:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.analyze
    image: minivess-analyze:latest
    container_name: minivess-flow-analyze
    environment:
      <<: *common-env
      FLOW_NAME: analyze
      ANALYSIS_OUTPUT_DIR: /app/outputs/analysis
    volumes:
      - data_cache:/app/data:ro
      - checkpoint_cache:/app/checkpoints:ro
      - configs_splits:/app/configs/splits:ro
      - mlruns_data:/app/mlruns
      - outputs_analysis:/app/outputs/analysis
      - post_training_out:/app/outputs/post_training:ro
      - ${MODEL_CACHE_HOST_PATH}:/model_cache
    # CDI GPU access — model evaluation uses sliding_window_inference on GPU
    devices:
      - "nvidia.com/gpu=all"
    networks:
      - minivess
    <<: [*gpu-security, *default-logging, *gpu-resources, *common-labels]

  # Flow 4: Deployment (ONNX export, BentoML, promotion)
  deploy:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.deploy
    image: minivess-deploy:latest
    container_name: minivess-flow-deploy
    environment:
      <<: *common-env
      FLOW_NAME: deploy
      DEPLOY_OUTPUT_DIR: /app/outputs/deploy
      BENTOML_HOME: ${BENTOML_HOME:-/home/minivess/bentoml}
    volumes:
      - checkpoint_cache:/app/checkpoints:ro
      - mlruns_data:/app/mlruns:ro
      - outputs_deploy:/app/outputs/deploy
      - bentoml_store:${BENTOML_HOME:-/home/minivess/bentoml}
    networks:
      - minivess
    <<: [*common-security, *default-logging, *light-resources, *common-labels]

  # Flow 5: Dashboard & Reporting
  dashboard:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.dashboard
    image: minivess-dashboard:latest
    container_name: minivess-flow-dashboard
    environment:
      <<: *common-env
      FLOW_NAME: dashboard
      DASHBOARD_OUTPUT_DIR: /app/outputs/dashboard
    volumes:
      - mlruns_data:/app/mlruns:ro
      - outputs_analysis:/app/outputs/analysis:ro
      - outputs_dashboard:/app/outputs/dashboard
    networks:
      - minivess
    <<: [*common-security, *default-logging, *light-resources, *common-labels]

  # Dashboard API (FastAPI — unified integration hub)
  dashboard-api:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.dashboard-api
    image: minivess-dashboard-api:latest
    container_name: minivess-dashboard-api
    ports:
      - "${DASHBOARD_API_PORT:-8090}:${DASHBOARD_API_PORT:-8090}"
    environment:
      <<: *common-env
      FLOW_NAME: dashboard-api
      DASHBOARD_API_PORT: ${DASHBOARD_API_PORT:-8090}
      DASHBOARD_HEALTH_CHECK_INTERVAL_S: ${DASHBOARD_HEALTH_CHECK_INTERVAL_S:-300}
    volumes:
      - mlruns_data:/app/mlruns:ro
      - data_cache:/app/data:ro
    networks:
      - minivess
    <<: [*common-security, *default-logging, *light-resources, *common-labels]

  # Dashboard UI (React + Vite — served via nginx)
  dashboard-ui:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.dashboard-ui
      args:
        VITE_API_URL: http://${DASHBOARD_API_DOCKER_HOST:-dashboard-api}:${DASHBOARD_API_PORT:-8090}
    image: minivess-dashboard-ui:latest
    container_name: minivess-dashboard-ui
    ports:
      - "${DASHBOARD_UI_PORT:-3002}:80"
    depends_on:
      - dashboard-api
    networks:
      - minivess
    <<: [*common-security, *default-logging, *light-resources, *common-labels]

  # Biostatistics Flow (CPU — best-effort)
  biostatistics:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.biostatistics
    image: minivess-biostatistics:latest
    container_name: minivess-flow-biostatistics
    environment:
      <<: *common-env
      FLOW_NAME: biostatistics
      BIOSTATISTICS_OUTPUT_DIR: /app/outputs/biostatistics
      BIOSTATISTICS_CONFIG_DIR: /app/configs/biostatistics
    volumes:
      - mlruns_data:/app/mlruns:ro
      - outputs_biostatistics:/app/outputs/biostatistics
      - configs_biostatistics:/app/configs/biostatistics:ro
    networks:
      - minivess
    <<: [*common-security, *default-logging, *cpu-resources, *common-labels]

  # Data Annotation App (reads BentoML models from Flow 4)
  annotation:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.annotation
    image: minivess-annotation:latest
    container_name: minivess-flow-annotation
    environment:
      <<: *common-env
      FLOW_NAME: annotation
      BENTOML_HOME: ${BENTOML_HOME:-/home/minivess/bentoml}
      BENTO_SERVER_URL: ${BENTO_SERVER_URL:-}
    volumes:
      - bentoml_store:${BENTOML_HOME:-/home/minivess/bentoml}:ro
      - data_cache:/app/data:ro
      - mlruns_data:/app/mlruns
    networks:
      - minivess
    <<: [*common-security, *default-logging, *light-resources, *common-labels]

  # MONAI Label Server — interactive annotation via 3D Slicer
  # Hosts the MinIVess MONAI Label app with BentoML champion pre-segmentation.
  # Connect 3D Slicer to http://localhost:${MONAI_LABEL_PORT:-8000}
  monai-label:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.monailabel
    image: minivess-monailabel:latest
    container_name: minivess-monai-label
    ports:
      - "${MONAI_LABEL_PORT:-8000}:${MONAI_LABEL_PORT:-8000}"
    environment:
      <<: *common-env
      FLOW_NAME: monai-label
      MONAI_LABEL_PORT: ${MONAI_LABEL_PORT:-8000}
      BENTOML_URL: http://${BENTOML_DOCKER_HOST:-minivess-bento}:${BENTOML_PORT:-3333}
      STUDIES_DIR: /data/studies
    volumes:
      - data_cache:/data/studies:ro
      - mlruns_data:/app/mlruns:ro
    networks:
      - minivess
    <<: [*common-security, *default-logging, *light-resources, *common-labels]

  # HPO Flow — hyperparameter optimization (GPU for training trials)
  hpo:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.hpo
    image: minivess-hpo:latest
    container_name: minivess-flow-hpo
    environment:
      <<: *common-env
      FLOW_NAME: hpo
      # CHECKPOINT_DIR and SPLITS_DIR come from x-common-env (Rule #22)
    volumes:
      - data_cache:/app/data:ro
      - configs_splits:/app/configs/splits:ro
      - checkpoint_cache:/app/checkpoints
      - mlruns_data:/app/mlruns
      - logs_data:/app/logs
      - ${MODEL_CACHE_HOST_PATH}:/model_cache
    # CDI GPU access — works without nvidia container runtime (Docker 25+)
    devices:
      - "nvidia.com/gpu=all"
    networks:
      - minivess
    <<: [*gpu-security, *default-logging, *gpu-resources, *common-labels]

  # HPO Worker — parallel strategy: one worker per GPU replica
  # Scale with: docker compose -f docker-compose.flows.yml up --scale hpo-worker=N
  # Each replica gets its own GPU via CUDA_VISIBLE_DEVICES set by hpo_worker_entrypoint.sh
  hpo-worker:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.hpo
    image: minivess-hpo:latest
    entrypoint: ["bash", "scripts/hpo_worker_entrypoint.sh"]
    environment:
      <<: *common-env
      FLOW_NAME: hpo-worker
    volumes:
      - data_cache:/app/data:ro
      - configs_splits:/app/configs/splits:ro
      - checkpoint_cache:/app/checkpoints
      - mlruns_data:/app/mlruns
      - logs_data:/app/logs
      - ${MODEL_CACHE_HOST_PATH}:/model_cache
    # CDI GPU access — works without nvidia container runtime (Docker 25+)
    devices:
      - "nvidia.com/gpu=all"
    networks:
      - minivess
    <<: [*gpu-security, *default-logging, *gpu-resources, *common-labels]

  # Pipeline Orchestrator -- cascades all flows in sequence
  pipeline:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.pipeline
    image: minivess-pipeline:latest
    container_name: minivess-flow-pipeline
    environment:
      <<: *common-env
      FLOW_NAME: pipeline
    volumes:
      - mlruns_data:/app/mlruns:ro
    networks:
      - minivess
    <<: [*common-security, *default-logging, *light-resources, *common-labels]

volumes:
  # Input data
  raw_data:
    driver: local
  data_cache:
    driver: local
  # Configuration
  configs_splits:
    driver: local
  # Training artifacts
  checkpoint_cache:
    driver: local
  logs_data:
    driver: local
  # MLflow runs (shared read-only by most flows, written by train/data/acquisition)
  mlruns_data:
    driver: local
  # Flow outputs
  post_training_out:
    driver: local
  outputs_analysis:
    driver: local
  outputs_deploy:
    driver: local
  outputs_dashboard:
    driver: local
  # Biostatistics
  outputs_biostatistics:
    driver: local
  configs_biostatistics:
    driver: local
  # Model serving store
  bentoml_store:
    driver: local

networks:
  minivess:
    external: true
    name: minivess-network
