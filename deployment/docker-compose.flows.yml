# MinIVess MLOps v2 — Per-Flow Docker Compose
#
# Each Prefect flow runs in its own container with independent
# scaling and resource management. Flows communicate via MLflow
# artifacts — no shared filesystem or direct function calls.
#
# ALL flow outputs are volume-mounted — /tmp is never used for artifacts.
# See docs/planning/intermedia-plan-synthesis.md Part 2 for full audit.
#
# Usage:
#   docker compose -f deployment/docker-compose.flows.yml build
#   docker compose -f deployment/docker-compose.flows.yml up acquisition
#   docker compose -f deployment/docker-compose.flows.yml up train
#
# Prerequisites: Run `docker compose -f deployment/docker-compose.yml --profile dev up`
# first to start PostgreSQL, MinIO, MLflow, and Prefect.

x-common-env: &common-env
  # All values derive from .env.example — never hardcode here.
  MLFLOW_TRACKING_URI: http://${MLFLOW_DOCKER_HOST:-minivess-mlflow}:${MLFLOW_PORT:-5000}
  PREFECT_API_URL: http://${PREFECT_DOCKER_HOST:-minivess-prefect}:${PREFECT_PORT:-4200}/api
  AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
  AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
  MLFLOW_S3_ENDPOINT_URL: http://${MINIO_DOCKER_HOST:-minio}:${MINIO_API_PORT:-9000}
  # HuggingFace token for gated models (SAM3, VesselFM).
  # Set HF_TOKEN in .env — never hard-code here.
  HF_TOKEN: ${HF_TOKEN:-}

x-common-labels: &common-labels
  labels:
    project: minivess-mlops
    managed-by: docker-compose

services:
  # Flow 0: Data Acquisition
  acquisition:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.acquisition
    image: minivess-acquisition:latest
    container_name: minivess-flow-acquisition
    environment:
      <<: *common-env
      FLOW_NAME: acquisition
      ACQUISITION_OUTPUT_DIR: /app/data/raw
    volumes:
      - raw_data:/app/data/raw
      - logs_data:/app/logs
    networks:
      - minivess
    <<: *common-labels

  # Flow 1: Data Engineering
  data:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.data
    image: minivess-data:latest
    container_name: minivess-flow-data
    environment:
      <<: *common-env
      FLOW_NAME: data
      SPLITS_OUTPUT_DIR: /app/configs/splits
    volumes:
      - raw_data:/app/data/raw:ro
      - data_cache:/app/data/processed
      - configs_splits:/app/configs/splits
      - mlruns_data:/app/mlruns
    networks:
      - minivess
    <<: *common-labels

  # Flow 2: Model Training (GPU)
  train:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.train
    image: minivess-train:latest
    container_name: minivess-flow-train
    environment:
      <<: *common-env
      FLOW_NAME: train
      CHECKPOINT_DIR: /app/checkpoints
      SPLITS_DIR: /app/configs/splits
    volumes:
      - data_cache:/app/data:ro
      - configs_splits:/app/configs/splits:ro
      - checkpoint_cache:/app/checkpoints
      - mlruns_data:/app/mlruns
      - logs_data:/app/logs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - minivess
    <<: *common-labels

  # Flow 2.5: Post-Training (SWA, calibration, conformal)
  post_training:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.post_training
    image: minivess-post-training:latest
    container_name: minivess-flow-post-training
    environment:
      <<: *common-env
      FLOW_NAME: post_training
      POST_TRAINING_OUTPUT_DIR: /app/outputs/post_training
    volumes:
      - checkpoint_cache:/app/checkpoints:ro
      - data_cache:/app/data:ro
      - post_training_out:/app/outputs/post_training
      - mlruns_data:/app/mlruns
    networks:
      - minivess
    <<: *common-labels

  # Flow 3: Model Analysis
  analyze:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.analyze
    image: minivess-analyze:latest
    container_name: minivess-flow-analyze
    environment:
      <<: *common-env
      FLOW_NAME: analyze
      ANALYSIS_OUTPUT_DIR: /app/outputs/analysis
    volumes:
      - data_cache:/app/data:ro
      - checkpoint_cache:/app/checkpoints:ro
      - configs_splits:/app/configs/splits:ro
      - mlruns_data:/app/mlruns
      - outputs_analysis:/app/outputs/analysis
      - post_training_out:/app/outputs/post_training:ro
    networks:
      - minivess
    <<: *common-labels

  # Flow 4: Deployment (ONNX export, BentoML, promotion)
  deploy:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.deploy
    image: minivess-deploy:latest
    container_name: minivess-flow-deploy
    environment:
      <<: *common-env
      FLOW_NAME: deploy
      DEPLOY_OUTPUT_DIR: /app/outputs/deploy
      BENTOML_HOME: ${BENTOML_HOME:-/home/minivess/bentoml}
    volumes:
      - checkpoint_cache:/app/checkpoints:ro
      - mlruns_data:/app/mlruns:ro
      - outputs_deploy:/app/outputs/deploy
      - bentoml_store:${BENTOML_HOME:-/home/minivess/bentoml}
    networks:
      - minivess
    <<: *common-labels

  # Flow 5: Dashboard & Reporting
  dashboard:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.dashboard
    image: minivess-dashboard:latest
    container_name: minivess-flow-dashboard
    environment:
      <<: *common-env
      FLOW_NAME: dashboard
      DASHBOARD_OUTPUT_DIR: /app/outputs/dashboard
    volumes:
      - mlruns_data:/app/mlruns:ro
      - outputs_analysis:/app/outputs/analysis:ro
      - outputs_dashboard:/app/outputs/dashboard
    networks:
      - minivess
    <<: *common-labels

  # Flow 6: QA (MLflow integrity, ghost run cleanup, param validation)
  qa:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.qa
    image: minivess-qa:latest
    container_name: minivess-flow-qa
    environment:
      <<: *common-env
      FLOW_NAME: qa
      DASHBOARD_OUTPUT_DIR: /app/outputs/dashboard
    volumes:
      - mlruns_data:/app/mlruns:ro
      - outputs_dashboard:/app/outputs/dashboard
    networks:
      - minivess
    <<: *common-labels

  # Biostatistics Flow (CPU — best-effort)
  biostatistics:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.biostatistics
    image: minivess-biostatistics:latest
    container_name: minivess-flow-biostatistics
    environment:
      <<: *common-env
      FLOW_NAME: biostatistics
      BIOSTATISTICS_OUTPUT_DIR: /app/outputs/biostatistics
      BIOSTATISTICS_CONFIG_DIR: /app/configs/biostatistics
    volumes:
      - mlruns_data:/app/mlruns:ro
      - outputs_biostatistics:/app/outputs/biostatistics
      - configs_biostatistics:/app/configs/biostatistics:ro
    networks:
      - minivess
    <<: *common-labels

  # Data Annotation App (reads BentoML models from Flow 4)
  annotation:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.annotation
    image: minivess-annotation:latest
    container_name: minivess-flow-annotation
    environment:
      <<: *common-env
      FLOW_NAME: annotation
      BENTOML_HOME: ${BENTOML_HOME:-/home/minivess/bentoml}
      BENTO_SERVER_URL: ${BENTO_SERVER_URL:-}
    volumes:
      - bentoml_store:${BENTOML_HOME:-/home/minivess/bentoml}:ro
      - data_cache:/app/data:ro
      - mlruns_data:/app/mlruns
    networks:
      - minivess
    <<: *common-labels

  # HPO Flow — hyperparameter optimization (GPU for training trials)
  hpo:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.hpo
    image: minivess-hpo:latest
    container_name: minivess-flow-hpo
    environment:
      <<: *common-env
      FLOW_NAME: hpo
      CHECKPOINT_DIR: /app/checkpoints
      SPLITS_DIR: /app/configs/splits
    volumes:
      - data_cache:/app/data:ro
      - configs_splits:/app/configs/splits:ro
      - checkpoint_cache:/app/checkpoints
      - mlruns_data:/app/mlruns
      - logs_data:/app/logs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - minivess
    <<: *common-labels

  # Pipeline Orchestrator — cascades all flows in sequence
  pipeline:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile.pipeline
    image: minivess-pipeline:latest
    container_name: minivess-flow-pipeline
    environment:
      <<: *common-env
      FLOW_NAME: pipeline
    volumes:
      - mlruns_data:/app/mlruns:ro
    networks:
      - minivess
    <<: *common-labels

volumes:
  # Input data
  raw_data:
    driver: local
  data_cache:
    driver: local
  # Configuration
  configs_splits:
    driver: local
  # Training artifacts
  checkpoint_cache:
    driver: local
  logs_data:
    driver: local
  # MLflow runs (shared read-only by most flows, written by train/data/acquisition)
  mlruns_data:
    driver: local
  # Flow outputs
  post_training_out:
    driver: local
  outputs_analysis:
    driver: local
  outputs_deploy:
    driver: local
  outputs_dashboard:
    driver: local
  # Biostatistics
  outputs_biostatistics:
    driver: local
  configs_biostatistics:
    driver: local
  # Model serving store
  bentoml_store:
    driver: local

networks:
  minivess:
    external: true
    name: minivess-network
