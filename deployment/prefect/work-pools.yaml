# MinIVess MLOps — Prefect Work Pool Configuration
#
# Work pools define resource-grouped execution environments:
# - cpu-pool: For data, analyze, deploy, dashboard flows
# - gpu-pool: For training flows (NVIDIA GPU required)
# - sky-pool: For SkyPilot-managed cloud/on-prem jobs (Phase 3)
#
# Apply with: prefect work-pool create --type docker <pool-name>

work_pools:
  - name: cpu-pool
    type: docker
    description: "CPU-only work pool for data/analyze/deploy/dashboard flows"
    base_job_template:
      variables:
        image: "minivess-base:latest"
        auto_remove: true
        networks:
          - minivess-network
        # Values from .env.example — fallbacks match .env.example defaults.
        environment:
          MLFLOW_TRACKING_URI: "http://minivess-mlflow:${MLFLOW_PORT:-5000}"
          PREFECT_API_URL: "http://${PREFECT_DOCKER_HOST:-minivess-prefect}:${PREFECT_PORT:-4200}/api"
    concurrency_limit: 4

  - name: gpu-pool
    type: docker
    description: "GPU work pool for training flows (NVIDIA Container Toolkit required)"
    base_job_template:
      variables:
        image: "minivess-train:latest"
        auto_remove: true
        networks:
          - minivess-network
        device_requests:
          - driver: nvidia
            count: -1
            capabilities:
              - - gpu
        environment:
          MLFLOW_TRACKING_URI: "http://minivess-mlflow:${MLFLOW_PORT:-5000}"
          PREFECT_API_URL: "http://${PREFECT_DOCKER_HOST:-minivess-prefect}:${PREFECT_PORT:-4200}/api"
          NVIDIA_VISIBLE_DEVICES: all
    concurrency_limit: 1

  - name: sky-pool
    type: process
    description: "SkyPilot-managed pool for cloud/on-prem GPU jobs (Phase 3)"
    base_job_template:
      variables:
        working_dir: "."
        env:
          # SkyPilot jobs set MLFLOW_TRACKING_URI directly in their YAML envs block.
          # This fallback uses ${MLFLOW_TRACKING_URI} from .env (whatever the user configured).
          MLFLOW_TRACKING_URI: "${MLFLOW_TRACKING_URI}"
    concurrency_limit: 8
