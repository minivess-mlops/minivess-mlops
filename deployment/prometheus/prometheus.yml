# Prometheus configuration for MinIVess MLOps
# Scrapes BentoML serving metrics for Grafana dashboards.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # BentoML serving metrics
  - job_name: "bentoml"
    static_configs:
      - targets: ["minivess-bento:3000"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  # Node exporter (if available)
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
    scrape_interval: 30s
