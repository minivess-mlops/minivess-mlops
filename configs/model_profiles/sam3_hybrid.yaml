name: sam3_hybrid
divisor: 16
model_overhead_mb: 500
bytes_per_voxel_amp: 14
bytes_per_voxel_fp32: 28
max_batch_size:
  cpu: 1
  gpu_low: 1
  gpu_high: 1
  gpu_extreme: 2
default_patch_xy: 64
notes: >
  SAM3 Hybrid Fusion (Meta SAM3 + DynUNet LoRA). ViT-32L backbone (648M params)
  with LoRA adapters (rank=16, alpha=32) and gated feature fusion with DynUNet.
  Higher overhead than vanilla due to fusion layers and dual-branch forward pass.
  SDPA mandatory — attn_implementation='sdpa' enforced (Rule: never eager on 8 GB).
  GPU VRAM >= 16 GB strongly recommended; marginally fits 8 GB with AMP + patch=(64,64,3).
  See src/minivess/adapters/CLAUDE.md for VRAM enforcement (sam3_vram_check.py).
