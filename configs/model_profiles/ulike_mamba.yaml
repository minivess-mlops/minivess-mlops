name: ulike_mamba
divisor: 16
model_overhead_mb: 300
bytes_per_voxel_amp: 6
bytes_per_voxel_fp32: 12
max_batch_size:
  cpu: 1
  gpu_low: 4
  gpu_high: 8
  gpu_extreme: 16
default_patch_xy: 64
notes: >
  UlikeMamba architecture (Wang 2025). Pure-PyTorch SSM approximation
  (no mamba-ssm CUDA kernels required). Lightweight U-Net with Mamba
  blocks at each resolution. Good for quick iteration and baselines.
  Lower memory footprint than SAM3 or COMMA Mamba — fits well on 8 GB GPUs
  with standard patch sizes. AMP recommended but not strictly required.
vram:
  inference_gb: 2.0
  training_gb: 3.0
  measured: false
  measured_gpu: null
  measured_date: null
  measured_config:
    patch_size: null
    batch_size: null
  notes: null
