name: sam3_topolora
divisor: 16
model_overhead_mb: 1500
bytes_per_voxel_amp: 14
bytes_per_voxel_fp32: 28
max_batch_size:
  cpu: 1
  gpu_low: 1
  gpu_high: 1
  gpu_extreme: 1
default_patch_xy: 64
notes: >
  SAM3 TopoLoRA (LoRA on ViT-32L FFN + trainable decoder).
  LoRA rank=16, alpha=32 on all Conv2d/Linear in encoder.
  topology-aware loss: cbdice_cldice.
  CRITICAL: OOMs on RTX 4090 (24 GB) — measured 22.66 GiB PyTorch allocated.
  Root cause: LoRA with freeze=False computes full backward through 32 ViT-32L blocks,
  each storing activations for 5184 spatial tokens.
  REQUIRES: gradient checkpointing (torch.utils.checkpoint) or A100 (40+ GB).
  Code bugs fixed (dim order, FP16 cast, LoRA dtype) but VRAM remains the blocker.
  Verified 2026-03-15 on RunPod RTX 4090 (EU-RO-1) — OOM confirmed.
  See #680 for full context.
weights:
  hf_repo: "facebook/sam3"
  hf_revision: "main"
vram:
  inference_gb: null
  training_gb: 13.0
  measured: true
  measured_gpu: "L4"
  measured_date: "2026-03-24"
  measured_config:
    patch_size: [64, 64, 3]
    batch_size: 1
  per_batch_size:
    1: 13.0
    2: 21.9
  notes: "BS=1 fits L4 (24GB). BS=2 OOMs on L4 (21.9 GB measured, OOM with framework overhead)."
