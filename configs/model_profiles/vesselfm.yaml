name: vesselfm
divisor: 32
model_overhead_mb: 800
bytes_per_voxel_amp: 10
bytes_per_voxel_fp32: 20
max_batch_size:
  cpu: 1
  gpu_low: 1
  gpu_high: 2
  gpu_extreme: 4
default_patch_xy: 96
notes: >
  vesselFM foundation model (Wittmann et al., CVPR 2025).
  DynUNet with filters [32, 64, 128, 256, 320, 320], ~30M params.
  5 stride-2 encoder levels -> divisor = 2^5 = 32.
  Pre-trained on 17 3D vessel datasets including MiniVess.
  Requires percentile normalization (1st-99th) instead of z-score.
  Estimated ~6GB VRAM for inference, ~10GB for fine-tuning (batch=1).
  CRITICAL: requires patch Z >= 32 (5 stride-2 downsamplings). Z=16 crashes (#711).
  Model-adaptive default in train_flow.py: patch=(64,64,32).
  RTX 4090 (24 GB): trains fine. Measured 9.3s/epoch, train_loss=0.857 (smoke test).
  Verified 2026-03-15 on RunPod RTX 4090 (EU-RO-1).
vram:
  inference_gb: 6.0
  training_gb: 10.0
  measured: true
  measured_gpu: "RTX 4090"
  measured_date: "2026-03-15"
  measured_config:
    patch_size: [64, 64, 32]
    batch_size: 1
  notes: null
