# Post-training flow configuration (Flow 2.5)
# Sits between train(2) and analyze(3) in the pipeline.
# Classification: Best-effort (failure does NOT block analyze).

# SAME experiment as training (synthesis Part 2.3) so Analysis Flow
# discovers all variants in one query.
mlflow_experiment: minivess_training

# --- Weight-based plugins (no calibration data needed) ---

checkpoint_averaging:
  enabled: true
  per_loss: true
  cross_loss: false

subsampled_ensemble:
  enabled: false
  n_models: 3
  subsample_fraction: 0.7
  seed: 42

model_merging:
  enabled: true
  method: slerp
  t: 0.5
  merge_pairs:
    - [topology, overlap]

# --- Data-dependent plugins (require calibration data) ---

calibration:
  enabled: true
  methods:
    - global_temperature
    - isotonic_regression
    - spatial_platt
  calibration_fraction: 0.3
  n_bins: 15

crc_conformal:
  enabled: true
  alpha: 0.1

conseco_fp_control:
  enabled: false
  tolerance: 0.05
  shrink_method: erosion

# --- SWAG (requires resumed training with DataLoaders) ---

swag:
  enabled: false
  swa_lr: 0.01
  swa_epochs: 10
  max_rank: 20
  n_samples: 30
  update_bn: true
