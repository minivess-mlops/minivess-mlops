experiment_name: sam3_hybrid_debug
model_family: sam3_hybrid
model: sam3_hybrid
losses:
  - cbdice_cldice
compute: cpu
data_dir: data/raw/minivess
num_folds: 3
max_epochs: 6
seed: 42
debug: true
split_mode: file
splits_file: configs/splits/3fold_seed42.json
memory_limit_gb: 24
monitor_interval: 10
architecture_params:
  backbone: vit_32l
  input_size: 1008
  embed_dim: 1024
  pretrained: false
  filters:
    - 32
    - 64
    - 128
    - 256
  fpn_dim: 256
  fusion_gate_init: 0.0
checkpoint:
  tracked_metrics:
    - name: val_loss
      direction: minimize
      patience: 10
  early_stopping_strategy: all
  primary_metric: val_loss
  min_delta: 1.0e-4
  min_epochs: 2
  save_last: true
  save_history: false
notes: >
  SAM3 V3 debug: Hybrid frozen SAM3 ViT-32L + DynUNet 3D + GatedFeatureFusion.
  Short validation run to verify feature fusion and gated residual pipeline.
  Go/No-Go Gate G3: V3 DSC > V2 DSC.
