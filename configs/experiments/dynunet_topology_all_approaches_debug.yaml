# Debug topology-aware segmentation config — 6 conditions x 3 folds x 6 epochs
# Quick validation that the full pipeline runs end-to-end with real data.
# Production config: dynunet_topology_all_approaches.yaml (100 epochs)

experiment_name: dynunet_topology_all_approaches_debug
model_family: dynunet
loss: cbdice_cldice
compute: cpu
data_dir: data/raw/minivess
num_folds: 3
max_epochs: 6
seed: 42
debug: true
split_mode: file
splits_file: configs/splits/3fold_seed42.json
memory_limit_gb: 24
monitor_interval: 10

metrics:
  - dice
  - hd95
  - assd
  - nsd
  - cldice
  - betti_error_0
  - betti_error_1
  - junction_f1

checkpoint:
  tracked_metrics:
    - name: val_loss
      direction: minimize
      patience: 10
    - name: val_dice
      direction: maximize
      patience: 10
    - name: val_cldice
      direction: maximize
      patience: 10
  early_stopping_strategy: all
  primary_metric: val_dice
  min_delta: 1.0e-4
  min_epochs: 2
  save_last: true
  save_history: false

conditions:
  # Condition 1: Baseline (no wrappers)
  - name: baseline
    description: "DynUNet + cbdice_cldice baseline"
    wrappers: []
    d2c_enabled: false

  # Condition 2: D2C augmentation only
  - name: d2c_only
    description: "DynUNet + D2C augmentation"
    wrappers: []
    d2c_enabled: true
    d2c_probability: 0.3

  # Condition 3: Multi-task heads (SDF + centreline)
  - name: multitask
    description: "DynUNet + multi-task (SDF + centerline)"
    wrappers:
      - type: multitask
        auxiliary_heads:
          - name: sdf
            type: regression
            out_channels: 1
            loss: smooth_l1
            weight: 0.25
            gt_key: sdf
          - name: centerline_dist
            type: regression
            out_channels: 1
            loss: smooth_l1
            weight: 0.25
            gt_key: centerline_dist
    d2c_enabled: false

  # Condition 4: Multi-task + D2C
  - name: multitask_d2c
    description: "DynUNet + multi-task + D2C"
    wrappers:
      - type: multitask
        auxiliary_heads:
          - name: sdf
            type: regression
            out_channels: 1
            loss: smooth_l1
            weight: 0.25
            gt_key: sdf
          - name: centerline_dist
            type: regression
            out_channels: 1
            loss: smooth_l1
            weight: 0.25
            gt_key: centerline_dist
    d2c_enabled: true
    d2c_probability: 0.3

  # Condition 5: TFFM graph attention (reduced params for debug)
  - name: tffm
    description: "DynUNet + TFFM wrapper"
    wrappers:
      - type: tffm
        grid_size: 4
        hidden_dim: 16
        n_heads: 2
        k_neighbors: 4
    d2c_enabled: false

  # Condition 6: Full pipeline (TFFM + multi-task + D2C)
  - name: full_pipeline
    description: "DynUNet + TFFM + multi-task + D2C (all combined)"
    wrappers:
      - type: tffm
        grid_size: 4
        hidden_dim: 16
        n_heads: 2
        k_neighbors: 4
      - type: multitask
        auxiliary_heads:
          - name: sdf
            type: regression
            out_channels: 1
            loss: smooth_l1
            weight: 0.25
            gt_key: sdf
          - name: centerline_dist
            type: regression
            out_channels: 1
            loss: smooth_l1
            weight: 0.25
            gt_key: centerline_dist
    d2c_enabled: true
    d2c_probability: 0.3

precompute_targets:
  - name: sdf
    suffix: sdf
    compute_fn: compute_sdf_from_mask
  - name: centerline_dist
    suffix: centerline_dist
    compute_fn: compute_centreline_distance_map
