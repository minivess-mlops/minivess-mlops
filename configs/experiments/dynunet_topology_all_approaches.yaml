# Combined topology-aware segmentation experiment config (T14 — #241)
# 6 conditions x 3 folds x 100 epochs = 18 runs
# Tests Predictions P1, P3, P4 head-to-head

experiment_name: dynunet_topology_all_approaches_v1
model_family: dynunet
loss: cbdice_cldice
compute_profile: gpu_low  # 8 GB VRAM budget

folds: 3
epochs: 100
early_stopping:
  patience: 20
  metric: val_compound_nsd_cldice

# All 8 metrics per run: DSC, HD95, ASSD, NSD, clDice, BE_0, BE_1, Junction F1
metrics:
  - dice
  - hd95
  - assd
  - nsd
  - cldice
  - betti_error_0
  - betti_error_1
  - junction_f1

conditions:
  # Condition 1: Baseline
  - name: baseline
    description: "DynUNet + cbdice_cldice (retrained baseline)"
    wrappers: []
    d2c_enabled: false

  # Condition 2: D2C only (tests P1 augmentation effect)
  - name: d2c_only
    description: "DynUNet + cbdice_cldice + D2C augmentation"
    wrappers: []
    d2c_enabled: true
    d2c_probability: 0.3

  # Condition 3: Multi-task (tests P3 multi-task effect)
  - name: multitask
    description: "DynUNet + multi-task (mask + SDF + centerline)"
    wrappers:
      - type: multitask
        auxiliary_heads:
          - name: sdf
            type: regression
            out_channels: 1
            loss: smooth_l1
            weight: 0.25
            gt_key: sdf
          - name: centerline_dist
            type: regression
            out_channels: 1
            loss: smooth_l1
            weight: 0.25
            gt_key: centerline_dist
    d2c_enabled: false

  # Condition 4: Multi-task + D2C (tests P1+P3 combined)
  - name: multitask_d2c
    description: "DynUNet + multi-task + D2C augmentation"
    wrappers:
      - type: multitask
        auxiliary_heads:
          - name: sdf
            type: regression
            out_channels: 1
            loss: smooth_l1
            weight: 0.25
            gt_key: sdf
          - name: centerline_dist
            type: regression
            out_channels: 1
            loss: smooth_l1
            weight: 0.25
            gt_key: centerline_dist
    d2c_enabled: true
    d2c_probability: 0.3

  # Condition 5: TFFM only (tests P4 graph attention effect)
  - name: tffm
    description: "DynUNet + TFFM wrapper + cbdice_cldice"
    wrappers:
      - type: tffm
        grid_size: 8
        hidden_dim: 32
        n_heads: 4
        k_neighbors: 8
    d2c_enabled: false

  # Condition 6: Full pipeline (all three approaches combined)
  - name: full_pipeline
    description: "DynUNet + TFFM + multi-task + D2C (all approaches)"
    wrappers:
      - type: tffm
        grid_size: 8
        hidden_dim: 32
        n_heads: 4
        k_neighbors: 8
      - type: multitask
        auxiliary_heads:
          - name: sdf
            type: regression
            out_channels: 1
            loss: smooth_l1
            weight: 0.25
            gt_key: sdf
          - name: centerline_dist
            type: regression
            out_channels: 1
            loss: smooth_l1
            weight: 0.25
            gt_key: centerline_dist
    d2c_enabled: true
    d2c_probability: 0.3

precompute_targets:
  - name: sdf
    suffix: sdf
    compute_fn: compute_sdf_from_mask
  - name: centerline_dist
    suffix: centerline_dist
    compute_fn: compute_centreline_distance_map
