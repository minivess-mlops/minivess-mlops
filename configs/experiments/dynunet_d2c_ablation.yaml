# D2C Augmentation Ablation (Prediction P3)
# Tests whether Disconnect-to-Connect augmentation improves topology.
# 2 conditions × 3 folds × 100 epochs = 6 runs.
experiment_name: dynunet_d2c_ablation_v1
model: dynunet
compute: gpu_low
data_dir: data/raw/minivess
num_folds: 3
max_epochs: 100
seed: 42
split_mode: file
splits_file: configs/splits/3fold_seed42.json
debug: false
memory_limit_gb: 24
monitor_interval: 10

# Default loss for all conditions
loss: cbdice_cldice

conditions:
  - name: baseline
    d2c_enabled: false

  - name: d2c_augmented
    d2c_enabled: true
    d2c_probability: 0.3
    d2c_mode: zero
    d2c_max_segment_length: 15
    d2c_max_junctions: 3
    d2c_dilation_radius: 2

checkpoint:
  tracked_metrics:
    - name: val_loss
      direction: minimize
      patience: 30
    - name: val_dice
      direction: maximize
      patience: 30
    - name: val_cldice
      direction: maximize
      patience: 30
    - name: val_compound_nsd_cldice
      direction: maximize
      patience: 20
  early_stopping_strategy: all
  primary_metric: val_compound_nsd_cldice
  min_delta: 1.0e-4
  min_epochs: 10
  save_last: true
  save_history: true
