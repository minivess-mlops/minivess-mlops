experiment_name: sam3_vanilla_debug
model_family: sam3_vanilla
model: sam3_vanilla
losses:
  - dice_ce
compute: cpu
data_dir: data/raw/minivess
num_folds: 3
max_epochs: 6
seed: 42
debug: false
split_mode: file
splits_file: configs/splits/3fold_seed42.json
memory_limit_gb: 24
monitor_interval: 10
architecture_params:
  backbone: vit_32l
  input_size: 1008
  embed_dim: 1024
  pretrained: false
checkpoint:
  tracked_metrics:
    - name: val_loss
      direction: minimize
      patience: 10
  early_stopping_strategy: all
  primary_metric: val_loss
  min_delta: 1.0e-4
  min_epochs: 2
  save_last: true
  save_history: false
notes: >
  SAM3 V1 debug: Vanilla SAM3 ViT-32L, dice_ce, 3 folds x 6 epochs.
  Short validation run to verify SAM3 backbone + decoder pipeline integrity.
  Go/No-Go Gate G1: DSC >= 0.10 or abandon SAM.
