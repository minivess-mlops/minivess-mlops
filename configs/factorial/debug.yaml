# Debug factorial: FULL production experiment with reduced epochs/data/folds.
#
# 4 models × 4 losses × 2 aux_calib × 2 post-training × 2 recalib × 5 ensemble
# = 640 conditions × 1 fold = 640 evaluations
#
# This is NOT a "minimal test." Debug = production with ONLY 3 differences:
#   1. Epochs: 2 (not 50)
#   2. Data: half volumes (~23 train / ~12 val)
#   3. Folds: 1 (fold-0 only)
# NOTHING else changes. All factors are IDENTICAL to paper_full.yaml.
# See: CLAUDE.md Rule #27, .claude/metalearning/2026-03-22-debug-equals-production-8th-violation.md
#
# Cost estimate (OUR deployment: GCP L4 spot for training):
#   Training: 32 cells × 1 fold = 32 GPU jobs (~$7-13)
#   Post-training, analysis, biostatistics: depends on user's deployment choice
#
# Usage:
#   ./scripts/run_factorial.sh configs/factorial/debug.yaml

experiment_name: debug_factorial
description: "Debug 640-condition factorial: IDENTICAL factors to production, reduced epochs/data/folds"
debug: true

# ── Layer A: Training factors ─────────────────────────────────────────
# IDENTICAL to paper_full.yaml (Rule 27: debug = production)
factors:
  training:
    model_family:
      - dynunet
      - mambavesselnet
      - sam3_topolora
      - sam3_hybrid
    loss_name:
      - cbdice_cldice
      - dice_ce
      - dice_ce_cldice
      - bce_dice_05cldice
    aux_calibration:
      - true
      - false

  # ── Layer B: Post-training factors ─────────────────────────────────
  # IDENTICAL to paper_full.yaml (Rule 27: debug = production)
  post_training:
    method:
      - none
      - swag
    recalibration:
      - none
      - temperature_scaling

  # ── Layer C: Analysis factors ──────────────────────────────────────
  # IDENTICAL to paper_full.yaml (Rule 27: debug = production)
  analysis:
    ensemble_strategy:
      - none
      - per_loss_single_best
      - all_loss_single_best
      - per_loss_all_best
      - all_loss_all_best

# ── Zero-shot baselines ─────────────────────────────────────────────
zero_shot_baselines:
  - model: sam3_vanilla
    strategy: frozen_encoder_eval
    folds: 1
    dataset: minivess
  - model: vesselfm
    strategy: zero_shot_only
    folds: 1
    dataset: deepvess

# ── Model-specific overrides (VRAM safety) ────────────────────────
# SAM3 variants OOM on L4 (24 GB) at batch_size=2. Use BS=1 + grad accum.
# Models not listed use fixed.batch_size with gradient_accumulation_steps=1.
# See: docs/planning/sam3-oom-training-double-check-report.md
model_overrides:
  sam3_topolora:
    batch_size: 1
    gradient_accumulation_steps: 4
  sam3_hybrid:
    batch_size: 1
    gradient_accumulation_steps: 4
  sam3_vanilla:
    batch_size: 1
    gradient_accumulation_steps: 1

# ── Fixed parameters (debug reductions) ─────────────────────────────
fixed:
  max_epochs: 2
  num_folds: 1
  max_train_volumes: 23
  max_val_volumes: 12
  compute: auto
  learning_rate: 1.0e-3
  batch_size: 2

# ── Data splits ─────────────────────────────────────────────────────
splits_file: configs/splits/debug_half_1fold.json

# ── MLflow experiment names ─────────────────────────────────────────
mlflow:
  training_experiment: minivess_debug_factorial
  evaluation_experiment: minivess_debug_factorial_evaluation
  biostatistics_experiment: minivess_debug_factorial_biostatistics

# ── Biostatistics configuration ─────────────────────────────────────
biostatistics:
  anova_strategy: layered
  alpha: 0.05
  co_primary_metrics:
    - cldice
    - masd
  foil_metrics:
    - dsc

# ── Post-training config ────────────────────────────────────────────
# Methods are defined in factors.post_training.method above.
# "none" is free (training sub-flow result). "swag" = Maddox et al. 2019.
post_training:
  methods:
    - none
    - swag

# ── Infrastructure (read by run_factorial.sh, NOT by train_flow.py) ────
# These control HOW the factorial launches, not WHAT it sweeps.
# train_flow.py is location-agnostic — it runs anywhere.
infrastructure:
  cloud_config: gcp_spot
  skypilot_yaml: deployment/skypilot/train_factorial.yaml
  region_config: europe_us  # configs/cloud/regions/europe_us.yaml
  # Fire-and-forget resilience (read by run_factorial_resilient.sh)
  max_wait_hours: 168  # 1 week — keep retrying until spots are available
  retry_interval_seconds: 300  # 5 minutes between --resume attempts

# ── E2E flow chain ──────────────────────────────────────────────────
flows:
  - train
  - post_training
  - analyze
  - biostatistics
  - deploy
