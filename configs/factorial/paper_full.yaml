# Full factorial design for Nature Protocols publication gate.
#
# 6-factor design: 4 models × 3 losses × 2 aux_calib × 2 post-training × 2 recalib × 5 ensemble
# = 480 conditions × 3 folds = 1440 evaluations
#
# Source of truth: knowledge-graph/decisions/registry.yaml
# Post-training methods: ONLY {none, swag} (decided 2026-03-21, DO_NOT_RE_ASK)
#
# Execution location is NOT hardcoded — users deploy flows wherever they want.
# The factorial config defines WHAT to sweep, not WHERE to execute.
# See: .claude/metalearning/2026-03-22-hardcoded-execution-location-in-factorial-configs.md
#
# Cost estimate (OUR deployment: GCP L4 spot for training):
#   Training: 24 cells × 3 folds = 72 GPU jobs (~$65)
#   Post-training, analysis, biostatistics: depends on user's deployment choice
#
# Usage:
#   ./scripts/run_factorial.sh configs/factorial/paper_full.yaml
#
# Zero-shot baselines evaluated separately (NOT part of Cartesian product):
#   sam3_vanilla: frozen encoder, eval on MiniVess + DeepVess
#   vesselfm: zero-shot only, eval on DeepVess ONLY (data leakage on MiniVess)

experiment_name: paper_factorial
description: "Nature Protocols 480-condition full factorial: training × post-training × ensemble"

# ── Layer A: Training factors ─────────────────────────────────────────
factors:
  training:
    model_family:
      - dynunet
      - mambavesselnet
      - sam3_topolora
      - sam3_hybrid
    loss_name:
      - cbdice_cldice
      - dice_ce
      - dice_ce_cldice
    aux_calibration:
      - true
      - false

  # ── Layer B: Post-training factors ─────────────────────────────────
  # Post-training methods: ONLY {none, swag} (registry decision, DO_NOT_RE_ASK)
  # "none" is free from training sub-flow result.
  # "swag" = SWAG posterior approximation (Maddox et al. 2019).
  # Checkpoint averaging was removed — it was the old wrongly-named "SWA".
  post_training:
    method:
      - none
      - swag
    recalibration:
      - none
      - temperature_scaling

  # ── Layer C: Analysis factors ──────────────────────────────────────
  analysis:
    ensemble_strategy:
      - none
      - per_loss_single_best
      - all_loss_single_best
      - per_loss_all_best
      - all_loss_all_best

# ── Zero-shot baselines (separate from factorial grid) ──────────────
zero_shot_baselines:
  - model: sam3_vanilla
    strategy: frozen_encoder_eval
    folds: 3
    dataset: minivess
  - model: vesselfm
    strategy: zero_shot_only
    folds: 3
    dataset: deepvess

# ── Fixed parameters (NOT swept) ────────────────────────────────────
fixed:
  max_epochs: 50
  num_folds: 3
  compute: auto
  learning_rate: 1.0e-3
  batch_size: 2

# ── MLflow experiment names ─────────────────────────────────────────
mlflow:
  training_experiment: minivess_paper_factorial
  evaluation_experiment: minivess_paper_factorial_evaluation
  biostatistics_experiment: minivess_paper_factorial_biostatistics

# ── Biostatistics configuration ─────────────────────────────────────
biostatistics:
  anova_strategy: layered  # core 3-way → extended 5-way → ensemble analysis
  alpha: 0.05  # Read from BiostatisticsConfig, not hardcoded in code
  co_primary_metrics:
    - cldice
    - masd
  foil_metrics:
    - dsc
