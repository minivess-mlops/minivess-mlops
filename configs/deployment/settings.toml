[default]
# MinIVess MLOps v2 — Dynaconf base settings
# Environment-specific overrides in development.toml, staging.toml, etc.
# Secrets in .secrets.toml (gitignored)

project_name = "minivess-mlops-v2"
debug = false

# MLflow — URI comes from MLFLOW_TRACKING_URI env var (defined in .env.example).
# Never set mlflow_tracking_uri here; resolve_tracking_uri() reads the env var directly.
mlflow_artifact_root = "s3://mlflow-artifacts/"

# MinIO (S3-compatible object store)
minio_endpoint = "http://localhost:9000"
minio_bucket = "mlflow-artifacts"

# Langfuse
langfuse_host = "http://localhost:3001"
langfuse_enabled = true

# Braintrust
braintrust_enabled = true

# Agent Provider
agent_provider = "anthropic:claude-sonnet-4-6"
agent_fallback_provider = "ollama:qwen2.5-coder:14b"

# Serving
serving_host = "0.0.0.0"
serving_port = 3333

# Observability
otel_exporter_endpoint = "http://localhost:4317"
prometheus_port = 9090

# Drift Detection
drift_detection_threshold = 0.05
drift_embedding_threshold = 0.05
drift_alert_enabled = true
drift_report_dir = "reports/drift"

# Data
dvc_remote = "minio"
data_dir = "data"

# Data Quality Gates (PR-2)
# Severity levels: 'error' = halt pipeline, 'warning' = tag MLflow + continue, 'info' = log only
data_quality_gate_pandera = "error"
data_quality_gate_ge = "warning"
data_quality_gate_datacare = "warning"
data_quality_gate_deepchecks = "info"

# Testing
test_markers = "unit"
