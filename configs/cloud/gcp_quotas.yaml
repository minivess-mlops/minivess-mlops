# GCP Compute Engine Quotas for project: minivess-mlops (615852151588)
# Reference: https://console.cloud.google.com/apis/api/compute.googleapis.com/quotas?project=minivess-mlops
# Last updated: 2026-03-14
# Quota request case: 0eab7213-592b-4433-869f-623e6acfc7f0

global:
  GPUS_ALL_REGIONS: 1          # Approved 2026-03-14 (was 0)
  CPUS_ALL_REGIONS: 32
  NETWORKS: 5

# Per-region GPU quotas
# T4 BANNED — Turing has no BF16 → FP16 overflow → NaN in SAM3 encoder.
# See: .claude/metalearning/2026-03-15-t4-turing-fp16-nan-ban.md
regions:
  us-central1:
    # T4 quotas exist but T4 is BANNED for this project (no BF16)
    NVIDIA_L4_GPUS: 1
    PREEMPTIBLE_NVIDIA_L4_GPUS: 1
    NVIDIA_A100_GPUS: 0          # Need to request if needed
    PREEMPTIBLE_NVIDIA_A100_GPUS: 0
    IN_USE_ADDRESSES: 8
    PERSISTENT_DISK_GB: 500

  europe-north1:
    # Default region (Finland, closest to Helsinki)
    # GPU quotas need to be requested per-region
    # Request at: https://console.cloud.google.com/iam-admin/quotas?project=minivess-mlops
    NVIDIA_L4_GPUS: 1
    PREEMPTIBLE_NVIDIA_L4_GPUS: 1

# Notes:
# - GPUS_ALL_REGIONS is the GLOBAL limit across all regions
# - Per-region quotas are ALSO required (default 1 for L4 in most regions)
# - A100/H100 quotas must be requested separately
# - Preemptible (spot) quotas are separate from on-demand
# - T4 is BANNED for this project — never request T4 quota
# - Request more quota via CLI: gcloud compute regions describe REGION --format=json
# - Or GUI: https://console.cloud.google.com/iam-admin/quotas?project=minivess-mlops
