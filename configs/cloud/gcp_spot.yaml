# GCP spot instances — cheapest Docker-compatible GPUs.
# Same-region as GCS, Cloud SQL, Cloud Run MLflow (europe-north1).
#
# Override per-lab: configs/lab/<lab_name>.yaml
# Override per-user: configs/user/<user_name>.yaml

provider: gcp
region: europe-north1
use_spot: true
disk_size: 100
disk_tier: best

# GPU priority: cheapest BF16-capable first.
# T4 BANNED — Turing architecture has no BF16 support → FP16 overflow → NaN.
# See: .claude/metalearning/2026-03-15-t4-turing-fp16-nan-ban.md
accelerators:
  - L4:1
  - A100:1

# Docker image from GAR (same-region, fast pulls, public).
docker_registry: gar
docker_image: europe-north1-docker.pkg.dev/minivess-mlops/minivess/base:latest

# MLflow tracking via GCP Cloud Run — set MLFLOW_TRACKING_URI in .env.
mlflow_env_var: MLFLOW_TRACKING_URI

# Training behavior on cloud GPUs (L4: 24 GB, A100: 40-80 GB).
# Cloud GPUs have enough VRAM to validate every epoch — no sentinel needed.
# Overrides the OOM-sentinel (val_interval=max_epochs+1) used on 8 GB GPUs.
# See: docs/planning/hydra-double-check.md
val_interval: 1
