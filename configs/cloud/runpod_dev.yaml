# RunPod — container-native GPU instances (dev/prototyping).
# Cheapest option for quick experiments. Instant provisioning.
# NOTE: RunPod pods ARE containers — no Docker-in-Docker.
#
# Override per-lab: configs/lab/<lab_name>.yaml

provider: runpod
region: null  # RunPod auto-selects region
use_spot: true
disk_size: 80

# Consumer GPUs: cheapest for development iteration.
accelerators:
  - RTX4090:1
  - RTX5090:1
  - RTX3090:1

# Docker Hub: public by default — RunPod pulls without auth.
# GHCR was private → 40+ min STARTING hangs (metalearning 2026-03-16).
docker_registry: dockerhub
docker_image: petteriteikari/minivess-base:latest

# MLflow: file-based on Network Volume (UpCloud dropped 2026-03-16).
mlflow_env_var: MLFLOW_TRACKING_URI
