# RunPod — container-native GPU instances (dev/prototyping).
# Cheapest option for quick experiments. Instant provisioning.
# NOTE: RunPod pods ARE containers — no Docker-in-Docker.
#
# Override per-lab: configs/lab/<lab_name>.yaml

provider: runpod
region: null  # RunPod auto-selects region
use_spot: true
disk_size: 80

# Consumer GPUs: cheapest for development iteration.
accelerators:
  - RTX4090:1
  - RTX5090:1
  - RTX3090:1

# Docker image from GHCR (requires GITHUB_TOKEN for private repos).
docker_registry: ghcr
docker_image: ghcr.io/petteriteikari/minivess-base:latest

# MLflow tracking via UpCloud (MLFLOW_CLOUD_URI in .env).
mlflow_env_var: MLFLOW_CLOUD_URI
