# HPO experiment config — DynUNet hyperparameter sweep
# Used by scripts/run_hpo.py with Optuna + ASHA (HyperbandPruner)

study_name: hpo_dynunet_sweep
direction: minimize  # minimize val_loss
n_trials: 50
sampler: tpe
pruner: hyperband

search_space:
  learning_rate:
    type: float
    low: 1.0e-5
    high: 1.0e-2
    log: true
  weight_decay:
    type: float
    low: 1.0e-6
    high: 1.0e-3
    log: true
  batch_size:
    type: categorical
    choices: [1, 2, 4]
  loss_name:
    type: categorical
    choices:
      - dice_ce
      - cbdice_cldice
      - dice_ce_cldice
  max_epochs:
    type: int
    low: 50
    high: 200
  warmup_epochs:
    type: int
    low: 5
    high: 30

# Training defaults (not searched)
model_family: dynunet
compute: gpu_low
dataset: minivess

# HPO allocation strategy (Issue #504)
# PostgreSQL is the ONLY allowed storage (no SQLite, no in-memory).
# Leave optuna_storage as null to read OPTUNA_STORAGE_URL from .env.example.
allocation:
  strategy: sequential       # sequential | parallel | hybrid
  optuna_storage: null       # null => reads OPTUNA_STORAGE_URL env var
  n_containers: 1            # parallel/hybrid: number of worker containers
  trials_per_container: 1    # hybrid: trials per container per GPU
