# DEPRECATED: Use configs/factorial/paper_full.yaml instead.
# This flat-structure config defines ONLY the training grid (Layer A: 24 cells).
# The authoritative full factorial config (480 conditions across 6 factors) is in
# configs/factorial/paper_full.yaml (layered structure).
#
# Paper factorial study — 4 trainable models x 3 losses x 2 aux_calibration.
# This is the TRAINING GRID ONLY (Layer A). Full factorial includes post-training,
# recalibration, and ensemble factors — see configs/factorial/paper_full.yaml.
#
# Training grid: 4 models x 3 losses x 2 aux_calib = 24 cells x 3 folds = 72 GPU jobs
# Zero-shot eval: SAM3 Vanilla (3 folds), VesselFM (DeepVess only)
#
# GPU requirements:
#   dynunet:          ~3.5 GB  → L4 (24 GB) or local RTX 2070 Super (8 GB)
#   mambavesselnet:   ~4-8 GB  → L4 (24 GB), to be verified
#   sam3_topolora:    ~16 GB   → L4 (24 GB), verified on L4
#   sam3_hybrid:      ~7.2 GB  → L4 (24 GB)
#
# T4 BANNED — Turing has no BF16 support → FP16 overflow → NaN in SAM3 encoder.
# See: .claude/metalearning/2026-03-15-t4-turing-fp16-nan-ban.md
#
# Launch via SkyPilot (4 workers, 6 cells each):
#   for i in 0 1 2 3; do
#     sky jobs launch deployment/skypilot/hpo_grid_worker.yaml \
#       --env WORKER_ID=$i --env TOTAL_WORKERS=4 -y
#   done
#
# Closes: #857 (partial: grid partitioning), #789 (unblocks)

experiment_name: paper_factorial
description: "Nature Protocols 24-cell factorial: model x loss x calibration"

# Factorial factors — Cartesian product = 4 x 3 x 2 = 24 cells
# Models: ONLY trainable models. Zero-shot baselines (SAM3 Vanilla, VesselFM)
# are evaluated separately — they have no loss function or calibration factor.
factors:
  model_family:
    - dynunet
    - mambavesselnet
    - sam3_topolora
    - sam3_hybrid
  loss_name:
    - cbdice_cldice
    - dice_ce
    - dice_ce_cldice
  aux_calibration:
    - true
    - false

# Zero-shot baselines — evaluated separately (not part of factorial grid)
zero_shot_baselines:
  - model: sam3_vanilla
    strategy: frozen_encoder_eval
    folds: 3
    dataset: minivess
  - model: vesselfm
    strategy: zero_shot_only
    folds: 3
    dataset: deepvess  # NOT MiniVess (data leakage C9). TubeNet excluded (olfactory bulb, different organ).

# Fixed parameters applied to every cell (NOT swept)
fixed:
  max_epochs: 50
  num_folds: 3
  compute: auto
  learning_rate: 1.0e-3
  batch_size: 2

# DEPRECATED: This config defines ONLY training factors (Layer A).
# Post-training (Layer B) runs in the SAME flow as training — parent flow iterates
# over methods internally. See configs/factorial/paper_full.yaml for the full
# 480-condition factorial: 4×3×2 (training) × 2 (post-training) × 2×5 (analysis).
# See: knowledge-graph/decisions/registry.yaml (post_training_execution_model)

mlflow_experiment: minivess_paper_factorial
