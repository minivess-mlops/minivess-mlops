# Hydra composition root — defaults list for MinIVess MLOps v2.
#
# This is the entry point for Hydra Compose API. Config groups are
# resolved from the defaults list below. Experiments override via
# configs/experiment/<name>.yaml using `@package _global_`.
#
# Usage:
#   compose_experiment_config(experiment_name="dynunet_losses")
#   → merges base.yaml + data/minivess.yaml + training/default.yaml
#     + checkpoint/standard.yaml + experiment/dynunet_losses.yaml

defaults:
  - data: minivess
  - model: dynunet
  - training: default
  - checkpoint: standard
  - profiling: default
  - cloud: local
  - registry: ghcr
  - lab: default
  - user: default
  - _self_

# Overridable at experiment level
experiment_name: unnamed
losses:
  - dice_ce
debug: false
# patch_size: null = use model-adaptive default in train_flow.py (64,64,3 for SAM3, 64,64,16 otherwise).
# Override per-invocation: patch_size=[32,32,3] for sam3_hybrid on 8 GB GPU.
patch_size: null

# Auxiliary calibration loss (hL1-ACE, Barfoot et al. 2025)
# Factor c=2 in factorial design: {false, true}
with_aux_calib: false
aux_calib_weight: 1.0
