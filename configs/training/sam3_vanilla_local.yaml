# SAM3 Vanilla Training — Local GPU (RTX 2070 Super / RTX 3080 / etc.)
#
# Cold-start instructions for Claude Code:
#
#   1. Read this file for training configuration
#   2. Build the Docker training image:
#      docker compose -f deployment/docker-compose.flows.yml build train
#   3. Launch training via Prefect flow inside Docker:
#      docker compose -f deployment/docker-compose.flows.yml run --rm train \
#        python -m minivess.orchestration.flows.train_flow \
#        --model-family sam3_vanilla \
#        --loss-name cbdice_cldice \
#        --max-epochs 50 \
#        --num-folds 3 \
#        --batch-size 1 \
#        --experiment-name sam3_vanilla_local
#   4. Monitor via: docker logs -f <container_id>
#   5. Check MLflow results: open http://localhost:5000 or inspect mlruns/
#
# NEVER run training outside Docker. NEVER use "uv run python" directly.
# See CLAUDE.md Rule #17 and #19 (STOP Protocol).

# --- Model ---
model_family: sam3_vanilla
# SAM3 ViT-32L encoder (648M params, frozen) + lightweight Conv decoder
# Requires: transformers, torchvision, SDPA attention
# VRAM: ~3 GB peak with SDPA (verified on RTX 2070 Super 8GB)

# --- Loss ---
loss_name: cbdice_cldice
# Best topology preservation (0.906 clDice) from dynunet_loss_variation_v2

# --- Training ---
max_epochs: 50
num_folds: 3
batch_size: 1  # SAM3 encoder is large; batch=1, effective batch=4 via num_samples
learning_rate: 0.001
weight_decay: 0.00001

# --- Patches ---
# SAM3 resizes ALL inputs to 1008x1008 internally, so patch size mainly
# affects 3D depth slicing, not encoder compute
patch_size: [64, 64, 3]  # (H, W, D) — depth=3 means 3 slices per patch

# --- Validation ---
# val_roi_size MUST differ from patch_size for SAM3 (larger = fewer encoder calls)
val_roi_size: [512, 512, 3]
val_sw_batch_size: 1
val_interval: 10  # Validate every 10 epochs (SAM3 validation is slow)

# --- Compute ---
compute: auto  # Auto-detect GPU and adapt batch/patch sizes

# --- MLflow ---
experiment_name: sam3_vanilla_local

# --- Docker volume mounts (handled by docker-compose.flows.yml) ---
# /data          → raw MiniVess dataset
# /checkpoints   → model checkpoints (persistent)
# /mlruns        → MLflow tracking
# /logs          → training logs (CSV/JSONL)
# /configs       → splits and config files

# --- Monitoring ---
# Claude Code should:
#   1. Run "docker compose logs -f train" to monitor training output
#   2. Check for OOM errors (should not happen with SDPA + batch=1)
#   3. After completion, verify MLflow artifacts exist
#   4. Report final metrics (best_val_dice, best_val_cldice)
