# Standard checkpoint config — 6 tracked metrics, patience=30.
# Used by most training experiments.

checkpoint:
  tracked_metrics:
    - name: val_loss
      direction: minimize
      patience: 30
    - name: val_dice
      direction: maximize
      patience: 30
    - name: val_f1_foreground
      direction: maximize
      patience: 30
    - name: val_cldice
      direction: maximize
      patience: 30
    - name: val_masd
      direction: minimize
      patience: 30
    - name: val_compound_nsd_cldice
      direction: maximize
      patience: 30
  early_stopping_strategy: all
  primary_metric: val_compound_nsd_cldice
  min_delta: 1.0e-4
  min_epochs: 10
  save_last: true
  save_history: true
