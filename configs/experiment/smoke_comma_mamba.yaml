# @package _global_
# GPU Smoke Test: CoMMA Mamba on RunPod RTX 4090 via SkyPilot
#
# NOT scientifically valid — verifies cloud GPU pipeline only.
# 2 epochs, 1 fold, 4 volumes = ~5 min on RTX 4090 (~$0.06).
#
# Usage:
#   sky jobs launch deployment/skypilot/smoke_test_gpu.yaml \
#     -e MODEL_FAMILY=comma_mamba
defaults:
  - override /model: comma_mamba
  - override /checkpoint: lightweight

experiment_name: smoke_comma_mamba
model: comma_mamba
model_family: comma_mamba
losses:
  - dice_ce
max_epochs: 2
num_folds: 1
debug: true

# Data subsetting
max_train_volumes: 2
max_val_volumes: 2
splits_file: configs/splits/smoke_test_1fold_4vol.json

# DVC provenance
data:
  dvc_commit: HEAD

# CoMMA Mamba: pure-PyTorch SSM (no CUDA kernels)
# patch=48x48x24 on 8GB GPUs
