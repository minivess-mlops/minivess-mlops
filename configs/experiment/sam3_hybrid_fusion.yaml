# @package _global_
defaults:
  - override /model: sam3_hybrid
  - override /checkpoint: lightweight

experiment_name: sam3_hybrid_fusion
model: sam3_hybrid
model_family: sam3_hybrid
losses:
  - cbdice_cldice
max_epochs: 50
architecture_params:
  backbone: vit_32l
  input_size: 1008
  embed_dim: 1024
  fpn_dim: 256
  pretrained: false
  filters: [32, 64, 128, 256]
  fusion_gate_init: 0.0
notes: >
  SAM3 V3: Hybrid — frozen SAM3 ViT-32L features + DynUNet 3D + GatedFeatureFusion.
