# @package _global_
defaults:
  - override /checkpoint: lightweight

experiment_name: dynunet_e2e_debug
model: dynunet
losses:
  - cbdice_cldice
max_epochs: 10
checkpoint:
  tracked_metrics:
    - name: val_loss
      direction: minimize
      patience: 20
    - name: val_dice
      direction: maximize
      patience: 20
    - name: val_cldice
      direction: maximize
      patience: 20
  primary_metric: val_loss
  min_delta: 0.0001
  min_epochs: 3
  save_last: true
  save_history: false
