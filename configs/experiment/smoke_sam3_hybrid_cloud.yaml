# @package _global_
# Cloud GPU Smoke Test: SAM3 Hybrid with VALIDATION enabled
#
# For cloud GPUs (≥16 GB VRAM) where validation fits in memory.
# Unlike smoke_sam3_hybrid.yaml which skips validation (sentinel),
# this config enables validation to verify model predictions are valid.
#
# val_interval=1: validate every epoch
# max_epochs=2: sufficient for smoke test (pipeline verification, not convergence)
# Addresses #710, #715: sam3_hybrid val_loss=NaN — root cause was wrong config selection
defaults:
  - override /model: sam3_hybrid
  - override /checkpoint: lightweight

experiment_name: smoke_sam3_hybrid_cloud
model: sam3_hybrid
model_family: sam3_hybrid
losses:
  - dice_ce
max_epochs: 3
num_folds: 1
debug: true

# Validation ENABLED — cloud GPUs have sufficient VRAM
val_interval: 1

# AMP disabled for diagnostic run: MONAI maintainers confirm "AMP does not
# support very well with 3D operations" (Project-MONAI/MONAI#4243).
# First verify val_loss is finite WITHOUT AMP, then re-enable to isolate.
mixed_precision: false

# Data subsetting (belt-and-suspenders with 4-vol split file, RC10)
max_train_volumes: 2
max_val_volumes: 2
splits_file: configs/splits/smoke_test_1fold_4vol.json

# DVC provenance
data:
  dvc_commit: HEAD

architecture_params:
  backbone: vit_32l
  input_size: 1008
  embed_dim: 1024
  pretrained: false
