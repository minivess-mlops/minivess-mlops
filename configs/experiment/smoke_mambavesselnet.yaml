# @package _global_
# GPU Smoke Test: MambaVesselNet++ on RunPod RTX 4090 via SkyPilot
#
# NOT scientifically valid — verifies cloud GPU pipeline only.
# 2 epochs, 1 fold, 4 volumes = ~5 min on RTX 4090 (~$0.06).
#
# Requires mamba-ssm CUDA compilation:
#   docker build --build-arg INSTALL_MAMBA=1 -f deployment/docker/Dockerfile.base .
#
# Usage:
#   sky jobs launch deployment/skypilot/smoke_test_gpu.yaml \
#     -e MODEL_FAMILY=mambavesselnet
defaults:
  - override /model: mambavesselnet
  - override /checkpoint: lightweight

experiment_name: smoke_mambavesselnet
model: mambavesselnet
model_family: mambavesselnet
losses:
  - dice_ce
max_epochs: 2
num_folds: 1
debug: true

# AMP: train ON, val OFF (D04 — MONAI #4243)
mixed_precision: true
mixed_precision_val: false

# Data subsetting
max_train_volumes: 2
max_val_volumes: 2
splits_file: configs/splits/smoke_test_1fold_4vol.json

# DVC provenance
data:
  dvc_commit: HEAD
