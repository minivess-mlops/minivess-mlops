# @package _global_
# GPU Smoke Test: UNETR on RunPod RTX 4090 via SkyPilot
#
# NOT scientifically valid — verifies cloud GPU pipeline only.
# 2 epochs, 1 fold, 4 volumes = ~5 min on RTX 4090 (~$0.06).
#
# Usage:
#   sky jobs launch deployment/skypilot/smoke_test_gpu.yaml \
#     -e MODEL_FAMILY=unetr
defaults:
  - override /model: unetr
  - override /checkpoint: lightweight

experiment_name: smoke_unetr
model: unetr
model_family: unetr
losses:
  - dice_ce
max_epochs: 2
num_folds: 1
debug: true

# Data subsetting
max_train_volumes: 2
max_val_volumes: 2
splits_file: configs/splits/smoke_test_1fold_4vol.json

# DVC provenance
data:
  dvc_commit: HEAD

# UNETR: ~92.5M params (ViT-Base) — needs more VRAM than DynUNet
architecture_params:
  hidden_size: 768
  feature_size: 16
