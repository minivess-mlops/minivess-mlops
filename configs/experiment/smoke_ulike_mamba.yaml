# @package _global_
# GPU Smoke Test: U-Like Mamba on RunPod RTX 4090 via SkyPilot
#
# NOT scientifically valid — verifies cloud GPU pipeline only.
# 2 epochs, 1 fold, 4 volumes = ~3 min on RTX 4090 (~$0.04).
#
# Usage:
#   sky jobs launch deployment/skypilot/smoke_test_gpu.yaml \
#     -e MODEL_FAMILY=ulike_mamba
defaults:
  - override /model: ulike_mamba
  - override /checkpoint: lightweight

experiment_name: smoke_ulike_mamba
model: ulike_mamba
model_family: ulike_mamba
losses:
  - dice_ce
max_epochs: 2
num_folds: 1
debug: true

# Data subsetting
max_train_volumes: 2
max_val_volumes: 2
splits_file: configs/splits/smoke_test_1fold_4vol.json

# DVC provenance
data:
  dvc_commit: HEAD

# U-Like Mamba: lightweight, no CUDA kernels, fits 8GB easily
