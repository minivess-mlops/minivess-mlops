# @package _global_
defaults:
  - override /model: sam3_topolora
  - override /checkpoint: lightweight

experiment_name: sam3_topolora_debug
model: sam3_topolora
model_family: sam3_topolora
losses:
  - cbdice_cldice
compute: cpu
debug: false
max_epochs: 6
architecture_params:
  backbone: vit_32l
  input_size: 1008
  embed_dim: 1024
  pretrained: false
  lora_rank: 16
  lora_alpha: 32.0
  lora_dropout: 0.1
  lora_targets:
    - mlp.lin1
    - mlp.lin2
notes: >
  SAM3 V2 debug: TopoLoRA SAM3 ViT-32L + LoRA (r=16, alpha=32) + cbdice_cldice.
  Short validation run to verify LoRA wiring and topology loss integration.
  Go/No-Go Gate G2: clDice improvement >= 2% over V1.
