# @package _global_
# GPU Smoke Test: SAM3 Hybrid on RunPod RTX 4090 via SkyPilot
#
# NOT scientifically valid — verifies cloud GPU pipeline only.
# 2 epochs, 1 fold, 4 volumes = ~8 min on RTX 4090 (~$0.09).
#
# SAM3 Hybrid: ~7.5 GB VRAM ESTIMATED (marginal on 8 GB, fine on 24 GB).
# val_interval > max_epochs = skip validation to avoid OOM on 8 GB GPUs.
# On RTX 4090 (24 GB) validation will fit fine, but kept for safety.
defaults:
  - override /model: sam3_hybrid
  - override /checkpoint: lightweight

experiment_name: smoke_sam3_hybrid
model: sam3_hybrid
model_family: sam3_hybrid
losses:
  - dice_ce
max_epochs: 2
num_folds: 1
debug: true

# Skip validation on local 8 GB GPU (val_interval > max_epochs sentinel).
# Cloud override (smoke_test_gcp.yaml): ++val_interval=1 to enable validation.
val_interval: 3

# AMP disabled: SAM3 ViT encoder + sliding_window_inference + autocast = NaN (MONAI #4243).
# Architecture constraint — applies on ALL platforms (local, cloud, RunPod).
mixed_precision: false

# Data subsetting (belt-and-suspenders with 4-vol split file, RC10)
max_train_volumes: 2
max_val_volumes: 2
splits_file: configs/splits/smoke_test_1fold_4vol.json

# DVC provenance
data:
  dvc_commit: HEAD

architecture_params:
  backbone: vit_32l
  input_size: 1008
  embed_dim: 1024
  pretrained: false
