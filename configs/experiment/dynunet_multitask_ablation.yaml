# @package _global_
experiment_name: dynunet_multitask_ablation_v1
model: dynunet
loss: cbdice_cldice
checkpoint:
  primary_metric: val_compound_nsd_cldice
  tracked_metrics:
    - name: val_loss
      direction: minimize
      patience: 20
    - name: val_dice
      direction: maximize
      patience: 20
    - name: val_cldice
      direction: maximize
      patience: 20
    - name: val_compound_nsd_cldice
      direction: maximize
      patience: 20
  early_stopping_strategy: all
  min_delta: 1.0e-4
  min_epochs: 10
  save_last: true
  save_history: true
conditions:
  - name: baseline
    description: "Standard DynUNet + cbdice_cldice"
    wrappers: []
    d2c_enabled: false
  - name: multitask
    description: "DynUNet + multi-task (mask + SDF + centerline)"
    wrappers:
      - type: multitask
        auxiliary_heads:
          - name: sdf
            type: regression
            out_channels: 1
            loss: smooth_l1
            weight: 0.25
            gt_key: sdf
          - name: centerline_dist
            type: regression
            out_channels: 1
            loss: smooth_l1
            weight: 0.25
            gt_key: centerline_dist
    d2c_enabled: false
  - name: multitask_d2c
    description: "DynUNet + multi-task + D2C augmentation"
    wrappers:
      - type: multitask
        auxiliary_heads:
          - name: sdf
            type: regression
            out_channels: 1
            loss: smooth_l1
            weight: 0.25
            gt_key: sdf
          - name: centerline_dist
            type: regression
            out_channels: 1
            loss: smooth_l1
            weight: 0.25
            gt_key: centerline_dist
    d2c_enabled: true
    d2c_probability: 0.3
precompute_targets:
  - name: sdf
    suffix: sdf
    compute_fn: compute_sdf_from_mask
  - name: centerline_dist
    suffix: centerline_dist
    compute_fn: compute_centreline_distance_map
