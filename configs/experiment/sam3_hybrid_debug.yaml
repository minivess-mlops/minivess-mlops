# @package _global_
defaults:
  - override /model: sam3_hybrid
  - override /checkpoint: lightweight

experiment_name: sam3_hybrid_debug
model: sam3_hybrid
model_family: sam3_hybrid
losses:
  - cbdice_cldice
compute: cpu
debug: false
max_epochs: 6
architecture_params:
  backbone: vit_32l
  input_size: 1008
  embed_dim: 1024
  pretrained: false
  filters:
    - 32
    - 64
    - 128
    - 256
  fpn_dim: 256
  fusion_gate_init: 0.0
notes: >
  SAM3 V3 debug: Hybrid frozen SAM3 ViT-32L + DynUNet 3D + GatedFeatureFusion.
  Short validation run to verify feature fusion and gated residual pipeline.
  Go/No-Go Gate G3: V3 DSC > V2 DSC.
