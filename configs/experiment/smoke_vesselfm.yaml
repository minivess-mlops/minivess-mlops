# @package _global_
# GPU Smoke Test: VesselFM on RunPod RTX 4090 via SkyPilot
#
# NOT scientifically valid — verifies cloud GPU pipeline only.
# 2 epochs, 1 fold, 4 volumes = ~10 min on RTX 4090 (~$0.12).
#
# VesselFM: ~10 GB VRAM ESTIMATED for fine-tuning (batch=1).
# Does NOT fit on 8 GB local GPU — requires cloud RTX 4090 (24 GB).
defaults:
  - override /model: vesselfm
  - override /checkpoint: lightweight

experiment_name: smoke_vesselfm
model: vesselfm
model_family: vesselfm
losses:
  - dice_ce
max_epochs: 2
num_folds: 1
debug: true

# Data subsetting (belt-and-suspenders with 4-vol split file, RC10)
max_train_volumes: 2
max_val_volumes: 2
splits_file: configs/splits/smoke_test_1fold_4vol.json

# DVC provenance
data:
  dvc_commit: HEAD
