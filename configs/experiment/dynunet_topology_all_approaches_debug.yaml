# @package _global_
experiment_name: dynunet_topology_all_approaches_debug
model: dynunet
loss: cbdice_cldice
compute: cpu
debug: true
max_epochs: 6
checkpoint:
  tracked_metrics:
    - name: val_loss
      direction: minimize
      patience: 10
    - name: val_dice
      direction: maximize
      patience: 10
    - name: val_cldice
      direction: maximize
      patience: 10
  early_stopping_strategy: all
  primary_metric: val_dice
  min_delta: 1.0e-4
  min_epochs: 2
  save_last: true
  save_history: false
metrics:
  - dice
  - hd95
  - assd
  - nsd
  - cldice
  - betti_error_0
  - betti_error_1
  - junction_f1
conditions:
  - name: baseline
    description: "DynUNet + cbdice_cldice baseline"
    wrappers: []
    d2c_enabled: false
  - name: d2c_only
    description: "DynUNet + D2C augmentation"
    wrappers: []
    d2c_enabled: true
    d2c_probability: 0.3
  - name: multitask
    description: "DynUNet + multi-task (SDF + centerline)"
    wrappers:
      - type: multitask
        auxiliary_heads:
          - name: sdf
            type: regression
            out_channels: 1
            loss: smooth_l1
            weight: 0.25
            gt_key: sdf
          - name: centerline_dist
            type: regression
            out_channels: 1
            loss: smooth_l1
            weight: 0.25
            gt_key: centerline_dist
    d2c_enabled: false
  - name: multitask_d2c
    description: "DynUNet + multi-task + D2C"
    wrappers:
      - type: multitask
        auxiliary_heads:
          - name: sdf
            type: regression
            out_channels: 1
            loss: smooth_l1
            weight: 0.25
            gt_key: sdf
          - name: centerline_dist
            type: regression
            out_channels: 1
            loss: smooth_l1
            weight: 0.25
            gt_key: centerline_dist
    d2c_enabled: true
    d2c_probability: 0.3
  - name: tffm
    description: "DynUNet + TFFM wrapper"
    wrappers:
      - type: tffm
        grid_size: 4
        hidden_dim: 16
        n_heads: 2
        k_neighbors: 4
    d2c_enabled: false
  - name: full_pipeline
    description: "DynUNet + TFFM + multi-task + D2C (all combined)"
    wrappers:
      - type: tffm
        grid_size: 4
        hidden_dim: 16
        n_heads: 2
        k_neighbors: 4
      - type: multitask
        auxiliary_heads:
          - name: sdf
            type: regression
            out_channels: 1
            loss: smooth_l1
            weight: 0.25
            gt_key: sdf
          - name: centerline_dist
            type: regression
            out_channels: 1
            loss: smooth_l1
            weight: 0.25
            gt_key: centerline_dist
    d2c_enabled: true
    d2c_probability: 0.3
precompute_targets:
  - name: sdf
    suffix: sdf
    compute_fn: compute_sdf_from_mask
  - name: centerline_dist
    suffix: centerline_dist
    compute_fn: compute_centreline_distance_map
