# @package _global_
experiment_name: dynunet_topology_all_approaches_v1
model: dynunet
loss: cbdice_cldice
folds: 3
checkpoint:
  primary_metric: val_compound_nsd_cldice
  tracked_metrics:
    - name: val_loss
      direction: minimize
      patience: 20
    - name: val_dice
      direction: maximize
      patience: 20
    - name: val_cldice
      direction: maximize
      patience: 20
    - name: val_compound_nsd_cldice
      direction: maximize
      patience: 20
  early_stopping_strategy: all
  min_delta: 1.0e-4
  min_epochs: 10
  save_last: true
  save_history: true
metrics:
  - dice
  - hd95
  - assd
  - nsd
  - cldice
  - betti_error_0
  - betti_error_1
  - junction_f1
conditions:
  - name: baseline
    description: "DynUNet + cbdice_cldice (baseline)"
    wrappers: []
    d2c_enabled: false
  - name: d2c_only
    description: "DynUNet + cbdice_cldice + D2C augmentation"
    wrappers: []
    d2c_enabled: true
    d2c_probability: 0.3
  - name: multitask
    description: "DynUNet + multi-task (mask + SDF + centerline)"
    wrappers:
      - type: multitask
        auxiliary_heads:
          - name: sdf
            type: regression
            out_channels: 1
            loss: smooth_l1
            weight: 0.25
            gt_key: sdf
          - name: centerline_dist
            type: regression
            out_channels: 1
            loss: smooth_l1
            weight: 0.25
            gt_key: centerline_dist
    d2c_enabled: false
  - name: multitask_d2c
    description: "DynUNet + multi-task + D2C augmentation"
    wrappers:
      - type: multitask
        auxiliary_heads:
          - name: sdf
            type: regression
            out_channels: 1
            loss: smooth_l1
            weight: 0.25
            gt_key: sdf
          - name: centerline_dist
            type: regression
            out_channels: 1
            loss: smooth_l1
            weight: 0.25
            gt_key: centerline_dist
    d2c_enabled: true
    d2c_probability: 0.3
  - name: tffm
    description: "DynUNet + TFFM wrapper + cbdice_cldice"
    wrappers:
      - type: tffm
        grid_size: 8
        hidden_dim: 32
        n_heads: 4
        k_neighbors: 8
    d2c_enabled: false
  - name: full_pipeline
    description: "DynUNet + TFFM + multi-task + D2C (all approaches)"
    wrappers:
      - type: tffm
        grid_size: 8
        hidden_dim: 32
        n_heads: 4
        k_neighbors: 8
      - type: multitask
        auxiliary_heads:
          - name: sdf
            type: regression
            out_channels: 1
            loss: smooth_l1
            weight: 0.25
            gt_key: sdf
          - name: centerline_dist
            type: regression
            out_channels: 1
            loss: smooth_l1
            weight: 0.25
            gt_key: centerline_dist
    d2c_enabled: true
    d2c_probability: 0.3
precompute_targets:
  - name: sdf
    suffix: sdf
    compute_fn: compute_sdf_from_mask
  - name: centerline_dist
    suffix: centerline_dist
    compute_fn: compute_centreline_distance_map
