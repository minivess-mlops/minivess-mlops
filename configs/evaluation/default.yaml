# Evaluation Configuration (Prefect Flow 3: Analysis)
# This config defines how models are selected, ensembled, and evaluated.
#
# The primary metric determines the "single best" model for each fold/loss.
# All ensemble strategies are built from checkpoints ranked by this metric.

primary_metric: val_compound_masd_cldice
primary_metric_direction: maximize

mlflow_evaluation_experiment: minivess_evaluation
mlflow_training_experiment: minivess_training

include_expensive_metrics: true
bootstrap_n_resamples: 10000
confidence_level: 0.95

ensemble_strategies:
  - per_loss_single_best
  - all_loss_single_best
  - per_loss_all_best
  - all_loss_all_best

model_registry_name: MiniVess-Segmentor

# Sliding-window inference strategies (#505)
# standard_patch: fixed patch for cross-model scientific comparability (paper tables)
# fast: per-model-optimal ROI for quick iteration (NOT for paper tables)
# full_volume: optional, NOT included here — requires >= 24 GB VRAM for DynUNet
inference_strategies:
  - name: standard_patch
    description: "Fixed patch across ALL models — use for paper tables"
    roi_size: [128, 128, 16]
    overlap: 0.5
    sw_batch_size: 4
    aggregation_mode: gaussian
    is_primary: true

  - name: fast
    description: "Per-model-optimal ROI for quick iteration (not in paper tables)"
    roi_size: per_model
    overlap: 0.25
    sw_batch_size: 4
    aggregation_mode: gaussian
    is_primary: false
