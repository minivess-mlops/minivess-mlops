repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # L1 deterministic defense: ruff strict gate (zero errors after auto-fix)
  # The ruff hook above auto-fixes what it can. This gate BLOCKS on anything remaining.
  # Prevents the 55-error accumulation pattern (March 2026 incident).
  - repo: local
    hooks:
      - id: ruff-strict-gate
        name: Ruff strict gate (zero errors)
        entry: uv run ruff check src/ tests/ scripts/ --no-fix
        language: system
        pass_filenames: false
        always_run: true
        types: [python]

  # L1 deterministic defense: health regression gate
  # Blocks commits that increase ruff errors or decrease test count.
  # See: docs/planning/v0-2_archive/critical-failure-fixing-and-silent-failure-fix.md
  - repo: local
    hooks:
      - id: health-regression-gate
        name: Health regression gate (ruff + test count)
        entry: uv run python scripts/health_regression_gate.py
        language: system
        pass_filenames: false
        always_run: true

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        # Run on staged Python files only (uses project venv with all deps).
        # mirrors-mypy ran in an isolated venv without torch/monai/pandera,
        # causing false "Class cannot subclass Any" [misc] errors (#225).
        pass_filenames: true
        # Exclude Pulumi IaC files — they use a separate venv with pulumi SDK
        exclude: ^deployment/pulumi/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: prd-citation-check
        name: PRD Citation Integrity
        entry: uv run python scripts/validate_prd_citations.py --check-loss
        language: system
        files: '(docs/prd/|\.decision\.yaml|bibliography\.yaml)'
        exclude: '^probabilistic-sdd-template/'
        pass_filenames: false
        always_run: false

  - repo: local
    hooks:
      - id: capability-schema-check
        name: Capability Schema Consistency
        entry: uv run python -m minivess.testing.capability_discovery --check
        language: system
        files: '(method_capabilities\.yaml|config/models\.py|loss_functions\.py)'
        pass_filenames: false
        always_run: false

  - repo: local
    hooks:
      - id: yaml-contract-enforcement
        name: YAML Contract Enforcement (GPU types, cloud providers)
        entry: uv run python scripts/validate_yaml_contract.py
        language: system
        files: '(deployment/skypilot/.*\.yaml|configs/cloud/yaml_contract\.yaml)$'
        pass_filenames: false
        always_run: false

  - repo: local
    hooks:
      - id: no-prefect-disabled-in-scripts
        name: PREFECT_DISABLED banned in scripts
        entry: bash -c 'grep -rn PREFECT_DISABLED=1 scripts/*.sh && exit 1 || exit 0'
        language: system
        files: 'scripts/.*\.sh$'
        pass_filenames: false
        always_run: false

  - repo: local
    hooks:
      - id: test-collection-gate
        name: Test Collection Gate (import check)
        entry: uv run pytest --collect-only -q tests/unit/ tests/v2/unit/
        language: system
        pass_filenames: false
        always_run: false
        files: '(\.py$|pyproject\.toml|uv\.lock)'

  - repo: local
    hooks:
      - id: knowledge-links
        name: Knowledge graph link checker
        entry: uv run python scripts/review_knowledge_links.py --quick
        language: system
        pass_filenames: false
        files: '(knowledge-graph/|MEMORY\.md|CLAUDE\.md|docs/planning/)'
        always_run: false

  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit CVE scan
        entry: uvx pip-audit --strict --desc
        language: system
        pass_filenames: false
        always_run: false
        files: '(pyproject\.toml|uv\.lock)$'

  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint
        args: [--config, .hadolint.yaml]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.22.1
    hooks:
      - id: gitleaks
