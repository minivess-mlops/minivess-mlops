experiment_name: sam3_topolora_topology
model: sam3_topolora
model_family: sam3_topolora
losses:
  - cbdice_cldice
compute: gpu_low
data_dir: data/raw/minivess
num_folds: 3
max_epochs: 50
seed: 42
split_mode: file
splits_file: configs/splits/3fold_seed42.json
debug: false
memory_limit_gb: 24
monitor_interval: 10
architecture_params:
  sam2_variant: hiera_tiny
  pretrained: false
  lora_rank: 16
  lora_alpha: 32.0
  lora_dropout: 0.1
checkpoint:
  tracked_metrics:
    - name: val_loss
      direction: minimize
      patience: 15
    - name: val_dice
      direction: maximize
      patience: 15
    - name: val_cldice
      direction: maximize
      patience: 15
  early_stopping_strategy: all
  primary_metric: val_loss
  min_delta: 1.0e-4
  min_epochs: 10
  save_last: true
  save_history: true
notes: >
  SAM3 V2: TopoLoRA — SAM2 + LoRA (r=16, alpha=32) + cbdice_cldice loss.
  Same encoder/decoder as V1 + LoRA on attention q_proj/v_proj.
  Controlled experiment: ONLY difference from V1 is loss + LoRA.
  Expected: +10-20% clDice over V1.
  Go/No-Go Gate G2: clDice improvement >= 2% over V1.
