experiment_name: sam3_vanilla_baseline
model: sam3_vanilla
model_family: sam3_vanilla
losses:
  - dice_ce
compute: gpu_low
data_dir: data/raw/minivess
num_folds: 3
max_epochs: 50
seed: 42
split_mode: file
splits_file: configs/splits/3fold_seed42.json
debug: false
memory_limit_gb: 24
monitor_interval: 10
architecture_params:
  sam2_variant: hiera_tiny
  pretrained: false
checkpoint:
  tracked_metrics:
    - name: val_loss
      direction: minimize
      patience: 15
    - name: val_dice
      direction: maximize
      patience: 15
    - name: val_cldice
      direction: maximize
      patience: 15
  early_stopping_strategy: all
  primary_metric: val_loss
  min_delta: 1.0e-4
  min_epochs: 10
  save_last: true
  save_history: true
notes: >
  SAM3 V1: Vanilla SAM2 Hiera-Tiny (frozen encoder + trainable decoder).
  Slice-by-slice 2D inference with dice_ce loss.
  Expected DSC ~0.35-0.55, clDice ~0.3-0.5.
  Go/No-Go Gate G1: DSC >= 0.10 or abandon SAM.
