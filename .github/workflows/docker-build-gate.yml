# Docker Build Gate — verifies Dockerfile.train builds on every PR
# touching src/ or deployment/ (CLAUDE.md Rule #19, enforcement plan T-05).
#
# This is a BUILD-ONLY gate — no runtime test, no GPU needed.
# Integration tests (T-08) are separate and require GPU.
name: Docker Build Gate

on:
  pull_request:
    paths:
      - 'src/**'
      - 'deployment/**'
      - 'pyproject.toml'
      - 'uv.lock'

jobs:
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build training Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/docker/Dockerfile.train
          push: false
          tags: minivess-train:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
