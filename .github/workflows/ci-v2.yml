# CI v2 — DISABLED until submission-ready.
#
# All validation runs LOCALLY via:
#   - Pre-commit hooks (ruff, mypy, test collection gate)
#   - scripts/pr_readiness_check.sh (full suite before PR)
#
# GitHub Actions consume credits and are banned until the repo is
# submission-ready. See CLAUDE.md Rule #21.
#
# When re-enabled, this workflow will run:
#   1. Lint & Format (ruff)
#   2. Type Check (mypy)
#   3. Unit Tests (tests/unit/)
#   4. Test Collection Gate (verify all test files import)

name: CI v2

on:
  workflow_dispatch:  # Manual trigger only — no automatic runs

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Ruff check
        run: uv run ruff check src/minivess/ tests/v2/
      - name: Ruff format check
        run: uv run ruff format --check src/minivess/ tests/v2/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: mypy
        run: uv run mypy src/minivess/

  test:
    name: Unit Tests (fast)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run fast unit tests
        run: uv run pytest tests/unit/ -x -q --tb=short
      - name: Test collection gate (verify all test files import)
        run: uv run pytest --collect-only -q tests/unit/ tests/v2/unit/
