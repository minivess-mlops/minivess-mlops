name: CI v2

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Ruff check
        run: uv run ruff check src/minivess/ tests/v2/
      - name: Ruff format check
        run: uv run ruff format --check src/minivess/ tests/v2/

  # typecheck: Disabled — 184 pre-existing mypy strict errors across 44 files.
  # TODO: Fix strict-mode errors and re-enable (tracked as tech debt).

  # test: Disabled — 3392 tests take ~15 min in CI. Running locally until
