    priority: P0
    title: "Wire build_adapter() into training pipeline (most critical)"
    plan: "docs/planning/sam3-real-data-e2e-plan.xml Phase P0 Task T1"
    branch: "test/sam3-segmentation-with-real-data (NEW — branch from feat/sam3-remove-stub)"
    description: |
      In scripts/train_monitored.py:
      1. Add --model-family CLI arg (default="dynunet")
      2. In _build_configs(): use ModelFamily(args.model_family) to set ModelConfig.family
      3. In run_fold_safe(): replace `DynUNetAdapter(model_config)` with `build_adapter(model_config)`
      4. Remove hardcoded DynUNetAdapter import
      5. Write tests in tests/v2/unit/test_model_agnostic_training.py (TDD — write tests first)
    tdd_tests_to_write_first:
      - "test_parse_args_model_family_flag"
      - "test_build_configs_sam3_vanilla_sets_correct_family"
      - "test_build_configs_dynunet_default"
      - "test_run_fold_safe_does_not_hardcode_dynunet (static AST analysis)"
    completion_check: "uv run pytest tests/v2/unit/test_model_agnostic_training.py -v"

  - id: TASK-B
    priority: P0
    title: "Download SAM3 weights (one-time, ~3.2 GB)"
    description: |
      Source .env for HF_TOKEN, then run from_pretrained().
      First download will take 5-15 minutes depending on connection.
      Expected cache location: ~/.cache/huggingface/hub/models--facebook--sam3/
    command: |
      source .env && uv run python -c "
      import os, torch
      from transformers import Sam3Model, Sam3Config
      token = os.environ.get('HUGGINGFACE_TOKEN') or os.environ.get('HF_TOKEN')
      print(f'HF token: {token[:8]}...' if token else 'ERROR: No HF token found')
      model = Sam3Model.from_pretrained(
          'facebook/sam3',
          torch_dtype=torch.bfloat16,
          token=token
      )
      n = sum(p.numel() for p in model.parameters())
      print(f'OK: {n/1e6:.0f}M params loaded ({n*2/1e9:.1f} GB BF16)')
      "
    success_check: "848M params, ~1.7 GB BF16 in memory"

  - id: TASK-C
    priority: P0
    title: "Verify V1 Vanilla inference works on RTX 2070 Super (8 GB)"
    description: |
      After TASK-B (weights downloaded), verify inference with a real MiniVess slice.
      Expected peak VRAM: 5-7 GB BF16 with torch.no_grad().
      If OOM: set PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    command: |
      uv run python -c "
      import torch, os
      from minivess.adapters.model_builder import build_adapter
      from minivess.config.models import ModelConfig, ModelFamily
      config = ModelConfig(
          family=ModelFamily.SAM3_VANILLA,
          name='sam3_vanilla',
          architecture_params={'pretrained': True},
      )
      adapter = build_adapter(config)
      # Create dummy 3D volume (B=1, C=1, D=5, H=512, W=512)
      x = torch.zeros(1, 1, 5, 512, 512)
      with torch.no_grad():
          out = adapter.predict(x.cuda())
      print(f'V1 output shape: {out.shape}')
      print(f'Peak VRAM: {torch.cuda.max_memory_allocated()/1e9:.2f} GB')
      "
    success_check: "Output shape matches input spatial dims, peak VRAM < 8 GB"

  - id: TASK-D
    priority: P1
    title: "Run V1 Vanilla training smoke test (5 epochs, local machine)"
    depends_on: ["TASK-A", "TASK-B", "TASK-C"]
    description: |
      Use the Prefect training flow (NOT train_monitored.py directly — see CLAUDE.md rule #17).
      Run via: prefect deployment run 'train-flow/default' --params '{"model_family":"sam3_vanilla","loss":"dice_ce","max_epochs":5}'
      Monitor VRAM — expect 5-7 GB with frozen encoder.
      Log to MLflow alongside existing DynUNet runs.
    success_check: |
      - MLflow run created for experiment 'minivess_training'
      - Run has model_family=sam3_vanilla tag
      - val_loss decreases over 5 epochs
      - Peak GPU VRAM stays < 8 GB

  - id: TASK-E
    priority: P1
    title: "Expand synthesis report to ~100 kB with literature grounding"
    description: |
      Expand docs/planning/sam3-installation-issues-and-synthesis.md from 21.8 kB
      by incorporating findings from 12 bibliography papers:
      - li-2024-sam-ambiguous-segmentation (SAM prompt sensitivity → impacts V1)
      - yu-2025-unsamv-self (self-supervised SAM → justifies V2 LoRA approach)
      - yang-2025-medsamix-training (SAM medical fine-tuning strategy)
      - huang-2024-p2sam-probabilistic-segmentation (uncertainty in SAM → ConformalSAM context)
      - ma-2025-medsam-segment (MedSAM: largest medical SAM fine-tuning study)
      - yu-2025-crisp-sam2-multi-organ (SAM2 multi-organ → demonstrates SAM adapter patterns)
      - liu-2026-medsam-agent (LLM agent for SAM prompting → future V4 direction)
      - chen-2025-conformalsam-unlocking (ConformalSAM: UQ on SAM outputs → V1 extension)
      - chen-2025-dynamic-snake-upsampling-tubular (DSCNet: tubular structs → V3 decoder)
      - zhong-2024-convolution-meets-lora-sam (Conv+LoRA for SAM: direct V2 justification)
      - martin-2025-prediction-to-prompt-nnunet-sam (nnU-Net+SAM: hybrid → V3 justification)
      - yildiz-2024-sam-3d-slicer-segmentwithsam (3D Slicer SAM: slice-by-slice approach)
      Target size: 80-120 kB.

  - id: TASK-F
    priority: P2
    title: "Cloud training for V2 TopoLoRA and V3 Hybrid (SkyPilot A100)"
    depends_on: ["TASK-A", "TASK-B"]
    description: |
      V2 and V3 require A100-40GB minimum (LoRA gradients + full encoder activation graph).
      Use deployment/skypilot/train_generic.yaml.
      Configure for 3 folds x 100 epochs each (matching DynUNet baseline).
    skypilot_command: "sky launch deployment/skypilot/train_generic.yaml --env MODEL_FAMILY=sam3_topolora"

vram_decision_matrix:
  # For ANY new VRAM claim: verify against this table FIRST. No exceptions.
  # Do NOT make VRAM claims without citing one of these verified sources.
  local_machine_rtx2070super_8gb:
    single_image_inference_bfloat16_nograd:
      verdict: "FEASIBLE"
      expected_gb: 4.5-6.0
      sources:
        - "GH Issue #235 facebookresearch/sam3 — community-measured 4-6 GB"
        - "debuggercafe.com — single image inference benchmark"
    frozen_encoder_training_decoder_only:
      verdict: "LIKELY FEASIBLE (verify empirically)"
      expected_gb: 5.0-7.0
      rationale: |
        Encoder: frozen, torch.no_grad() → no activation graph stored → ~4-6 GB
        Decoder: ~1-5M params, optimizer states << 100 MB
        Total: frozen forward pass peak + tiny optimizer overhead
        NOTE: This is our V1 Vanilla case. Not yet experimentally verified.
    lora_training_unfrozen_encoder:
      verdict: "NOT FEASIBLE"
      expected_gb: 12-16
      sources:
        - "GH Issue #200 — Meta DETR fine-tuning: 22-24 GB (decoder heavier than ours)"
        - "Community LoRA estimate: ~12-16 GB (no concrete benchmark found)"
    hybrid_frozen_ViT_plus_dynunet:
      verdict: "NOT FEASIBLE (too tight even if frozen)"
      expected_gb: 18-22
      rationale: "ViT-32L BF16 (~6 GB) + DynUNet-3D with 3D patch activations (~8-12 GB)"

  cloud_a100_40gb:
    all_variants: "FEASIBLE"
    v1_vanilla_frozen: "Very comfortable — 6-8 GB peak"
    v2_topolora_lora: "Comfortable — estimated 12-16 GB of 40 GB"
    v3_hybrid: "May need grad checkpointing — estimated 18-22 GB of 40 GB"

