  - "DO NOT set VRAM thresholds without citing a source (GH issue, paper, benchmark)"
  - "DO NOT use scripts/train_monitored.py as a standalone run — Prefect flow only"
  - "DO NOT re-introduce _StubSam3Encoder or use_stub — the AST tests will catch it"
  - "DO NOT confabulate VRAM numbers — say 'estimate based on X' or 'not benchmarked'"
  - "DO NOT assume sam3-real-data-e2e-plan.xml is up to date — re-read it to verify"
  - "DO NOT make DynUNet-specific assumptions — all 3 SAM3 variants use different decoder sizes"

scientific_context:
  # Key findings from literature to guide architecture decisions
  sam_adaptation_for_medical:
    key_challenge: "SAM trained on natural images; large domain gap to medical microscopy"
    adaptation_approaches:
      frozen_encoder_trainable_decoder: "Li et al. 2024 (ambiguous segmentation), MedSAM (Ma et al. 2025)"
      lora_on_encoder: "Zhong et al. 2024 (Conv+LoRA), multiple medical SAM papers"
      hybrid_with_task_specific_head: "Martin et al. 2025 (nnU-Net+SAM), Chen et al. 2025 (DSCNet for tubular)"

  tubular_structure_specific:
    key_challenge: "SAM's 2D prompt-driven segmentation misses 3D connectivity of vessels"
    relevant_papers:
      - "Chen et al. 2025: Dynamic Snake upsampling → topology-preserving decoder design for our V3"
      - "Yildiz et al. 2024: slice-by-slice SAM on 3D Slicer → validates our slice inference strategy"
    our_solution: "V3 Hybrid: frozen SAM3 features + DynUNet-3D with gated fusion + cbdice_cldice loss"

  uncertainty_quantification:
    key_challenge: "SAM's point/box prompts sensitive to placement (Li et al. 2024)"
    relevant_papers:
      - "Huang et al. 2024 (P2SAM): probabilistic SAM with CVAE for ambiguous outputs"
      - "Chen et al. 2025 (ConformalSAM): conformal prediction on SAM to bound false negatives"
    our_solution: "V1 + conformal predictor from feat/conformal-uq branch (future integration)"

  lora_for_sam:
    key_finding: "LoRA on ViT FFN layers: 4-16 rank sufficient for medical domain adaptation"
    source: "Zhong et al. 2024 (Conv+LoRA for SAM medical segmentation)"
    our_implementation: "Sam3TopoLoraAdapter: LoRA on all 32 ViT-32L transformer blocks (rank=16 default)"

