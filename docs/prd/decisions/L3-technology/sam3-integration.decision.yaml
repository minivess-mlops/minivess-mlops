decision_id: sam3_integration
title: "SAM3 Variant Integration Strategy"
description: >
  How to integrate SAM3 (Segment Anything Model 3, Ravi et al. 2025) into the
  MinIVess segmentation pipeline. SAM3 is a 2D foundation model with a ViT-32L
  perception encoder (848M params, 1008x1008 input) that must be adapted for 3D
  microvessel segmentation. The decision covers backbone selection, adaptation
  strategy (frozen/LoRA/hybrid), and loss function pairing. This is an MLOps
  demonstration, not SOTA development — we quantify SAM3's limitations against
  the DynUNet baseline (0.824 DSC / 0.906 clDice with cbdice_cldice).

decision_level: L3_technology
status: active
last_updated: 2026-03-02

options:
  - option_id: sam3_vanilla
    title: "Frozen SAM3 + Trainable Decoder (V1)"
    description: >
      Freeze the SAM3 ViT-32L perception encoder and train only a lightweight
      mask decoder. Slice-by-slice 2D inference with null prompts (automatic
      segmentation, no interactive prompts). Establishes the SAM3 baseline —
      expected to underperform DynUNet significantly due to domain gap
      (natural images vs microscopy) and 2D-to-3D mismatch.
    prior_probability: 0.20
    status: implemented
    implementation_status: implemented
    implementation_files:
      - "src/minivess/adapters/sam3_vanilla.py"
      - "src/minivess/adapters/sam3_backbone.py"
      - "src/minivess/adapters/sam3_decoder.py"
    evidence:
      - citation_key: ravi2025sam3
        relevance: "SAM3 ViT-32L architecture and perception encoder"
    complements:
      - "segmentation_models.dynunet"
      - "loss_functions.dice_ce"

  - option_id: sam3_topolora
    title: "SAM3 + LoRA on FFN + Topology Loss (V2)"
    description: >
      Apply LoRA to SAM3 ViT-32L encoder FFN layers (mlp.lin1, mlp.lin2,
      r=16, alpha=32) and pair with cbdice_cldice topology loss. Based on
      TopoLoRA-SAM which showed +15% clDice with LoRA + clDice loss on
      vessel segmentation. Controlled experiment: ONLY difference from V1
      is LoRA fine-tuning + topology-aware loss function.
    prior_probability: 0.40
    status: implemented
    implementation_status: implemented
    implementation_files:
      - "src/minivess/adapters/sam3_topolora.py"
    evidence:
      - citation_key: xiang2025topolorasam
        relevance: "LoRA + topology loss for SAM vessel segmentation"
      - citation_key: hu2022lora
        relevance: "LoRA parameter-efficient fine-tuning"
    complements:
      - "loss_functions.cbdice_cldice"

  - option_id: sam3_hybrid
    title: "SAM3 Features + DynUNet 3D Decoder (V3)"
    description: >
      Use frozen SAM3 ViT-32L as a feature extractor, project 2D FPN features
      (256-dim) to 3D via axial convolution, and fuse with DynUNet at output
      level using gated residual fusion (gate_alpha init=0.0 = pure DynUNet at
      start, sigmoid(alpha) * proj(f_sam.detach())). Based on nnSAM and DB-SAM
      patterns. Most complex variant, highest VRAM (~7.5 GB with AMP,
      batch_size=1).
    prior_probability: 0.30
    status: implemented
    implementation_status: implemented
    implementation_files:
      - "src/minivess/adapters/sam3_hybrid.py"
    evidence:
      - citation_key: li2025nnsam
        relevance: "nnSAM plug-and-play SAM integration pattern"
    complements:
      - "segmentation_models.dynunet"
      - "loss_functions.cbdice_cldice"

  - option_id: sam3_2_5d
    title: "2.5D SAM3 (3 Adjacent Slices as RGB)"
    description: >
      Feed 3 adjacent Z-slices as pseudo-RGB input to SAM3, providing
      inter-slice context without architectural changes. Stretch goal
      for V1/V2 variants.
    prior_probability: 0.10
    status: viable
    implementation_status: planned
    evidence:
      - citation_key: ravi2025sam3
        relevance: "SAM3 accepts 3-channel input natively"

go_no_go_gates:
  - gate_id: G1
    condition: "Vanilla SAM3 DSC >= 0.10"
    action_if_fail: "Abandon SAM for segmentation entirely"
  - gate_id: G2
    condition: "TopoLoRA clDice improvement over vanilla >= 2%"
    action_if_fail: "Topology loss does not transfer to SAM LoRA"
  - gate_id: G3
    condition: "Hybrid DSC > TopoLoRA DSC"
    action_if_fail: "SAM features provide no complementary value"

evidence_summary: >
  SAM3 (Ravi et al. 2025, arXiv:2511.16719) is the latest Segment Anything
  Model with a ViT-32L perception encoder (848M params, 1008x1008 input,
  72x72 feature maps). It was trained on natural images and video, not 3D
  medical data. TopoLoRA-SAM (Xiang et al. 2025) showed +15% clDice with
  LoRA + topology loss on 2D vessels. nnSAM (Li et al. 2025) demonstrated
  effective SAM-DynUNet fusion. Our three variants systematically test these
  approaches on 3D microvasculature. The backbone wrapper supports both the
  native sam3 package (git clone) and HuggingFace transformers loading paths,
  with a stub encoder for CI testing.
