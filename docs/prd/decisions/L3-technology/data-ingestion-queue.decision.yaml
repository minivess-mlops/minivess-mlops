rationale: >
  Prefect 3.x native suspend_flow_run (0.50) is the primary recommendation
  based on the Design Goal #1 (EXCELLENT DevEx for PhD researchers): zero
  additional infrastructure, native human-in-the-loop support, and the flow
  tears down infrastructure while waiting (Prefect Technologies, 2022). The
  RunInput mechanism provides structured Pydantic review forms. For complex
  3D annotation (vascular proofreading), Prefect events + webhooks (0.25)
  bridge to 3D Slicer with SlicerNNInteractive (de Vente et al., 2025).
  External MQ (0.10) is only justified for high-throughput multi-annotator
  scenarios. Label Studio queue (0.15) leverages existing Docker Compose
  config but has limited 3D support.

research_notes: >
  Architecture analysis in docs/planning/data-prefect-flow-improvement-for-test-datasets.md
  (Section 5) evaluated 5 proofreading queue architectures. Key insight: Prefect
  suspend_flow_run is unique among orchestrators in providing native flow suspension
  with infrastructure teardown. Dagster and Airflow lack equivalent mechanisms,
  making external MQ the default for those platforms. The store-and-forward pattern
  (offline annotation → webhook on reconnection) addresses air-gapped environments.

