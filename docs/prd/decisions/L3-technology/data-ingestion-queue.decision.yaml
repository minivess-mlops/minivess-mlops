decision_id: data_ingestion_queue
title: "Data Ingestion Queue for Human-in-the-Loop Review"
description: >
  How to implement the human-in-the-loop review queue for data ingestion:
  newly acquired or generated data must pass quality gating before entering
  the DVC-versioned training dataset. The queue pattern determines how the
  system pauses for human review, communicates with external annotation tools,
  and resumes processing. Prefect 3.x suspend_flow_run provides a native
  mechanism that eliminates external message queue infrastructure. For simple
  approve/reject decisions, the Prefect UI suffices. For complex 3D annotation
  review, webhooks bridge to 3D Slicer or napari.

decision_level: L3_technology
status: active
last_updated: 2026-03-02

options:
  - option_id: prefect_suspend
    title: "Prefect suspend_flow_run + RunInput"
    description: >
      Use Prefect 3.x native suspend_flow_run() to pause the data ingestion
      flow when human review is needed. RunInput (Pydantic models) provides
      structured review forms (approve/reject/flag). The flow tears down
      infrastructure while waiting, resuming when the reviewer submits via
      Prefect UI or API. Zero additional infrastructure. Best for simple
      quality gating decisions (volume QC, annotation approval).
    prior_probability: 0.50
    status: recommended
    implementation_status: not_started
    complements:
      - "pipeline_orchestration.prefect"
      - "data_management_strategy.local_dvc"

  - option_id: prefect_events_webhooks
    title: "Prefect Events + Webhook Relay"
    description: >
      Use Prefect events and webhooks to bridge between the data pipeline
      and external annotation tools (3D Slicer, napari). The flow emits
      a Prefect event when data is ready for review; a webhook endpoint
      relays the event to the annotation tool. The tool sends back results
      via webhook, triggering flow resumption. Works for complex 3D
      annotation workflows where the reviewer uses specialized tools.
    prior_probability: 0.25
    status: viable
    implementation_status: not_started
    complements:
      - "annotation_platform.slicer_nninteractive"
      - "annotation_workflow.slicer_proofread"

  - option_id: external_mq
    title: "External Message Queue (RabbitMQ/Redis Streams)"
    description: >
      Dedicated message queue (RabbitMQ, Redis Streams, or Kafka) for
      decoupling data ingestion from annotation review. Supports multiple
      concurrent reviewers, backpressure, and dead-letter queues. Maximum
      flexibility but adds infrastructure complexity. Only justified for
      high-throughput multi-annotator scenarios.
    prior_probability: 0.10
    status: viable
    implementation_status: not_started
    constraints:
      - "Adds +1 service to Docker Compose stack"
      - "Requires queue monitoring and dead-letter handling"
      - "Overkill for solo researcher or small lab"

  - option_id: label_studio_queue
    title: "Label Studio Built-in Task Queue"
    description: >
      Use Label Studio's native task queue for multi-annotator review.
      Label Studio is already in the Docker Compose stack (config_only).
      Provides web UI for task distribution, inter-annotator agreement,
      and review workflows. Primarily 2D; limited 3D interactive support.
    prior_probability: 0.15
    status: viable
    implementation_status: config_only
    complements:
      - "annotation_platform.label_studio"
      - "annotation_workflow.label_studio_manual"

