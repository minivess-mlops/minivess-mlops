# knowledge-graph/navigator.yaml
# PURPOSE: Entry point for all knowledge queries.
# An agent reads THIS FIRST, then loads only the relevant domain file(s).
# Pattern: McMillan 2026 domain-partitioned schema navigation.
#
# 6-LAYER KNOWLEDGE ARCHITECTURE:
#
#   L0: .claude/rules/ + CLAUDE.md         — Constitution (invariant rules, non-negotiable)
#   L1: docs/planning/ + MEMORY.md         — Hot Context (current work, session state)
#   L2: knowledge-graph/navigator.yaml     — Navigator (THIS FILE — domain routing)
#   L3: knowledge-graph/decisions/*.yaml   — Evidence (Bayesian decision nodes, 65 total)
#       knowledge-graph/domains/*.yaml     — Materialized winners (deterministic KG)
#   L4: openspec/specs/                    — Specifications (GIVEN/WHEN/THEN testable)
#   L5: src/ + tests/                      — Implementation (actual code)
#
# INFORMATION FLOW:
#   Downward: PRD decisions → KG materialization → OpenSpec specs → Code
#   Upward:   Experiments → KG posterior updates → PRD belief propagation
#
# MATERIALIZATION RULE:
#   When a PRD node reaches status=resolved with posterior>=0.80 for the winner,
#   the KG domain file records the deterministic winner. The KG is "the deterministic
#   winner probability" — it stores decisions that have been MADE, not speculation.
#
# Full architecture doc: docs/planning/prd-kg-openspec-architecture.md

version: "1.1"
last_updated: "2026-03-17"

domains:
  architecture:
    navigator: knowledge-graph/domains/architecture.yaml
    covers: [model adapters, ensemble strategies, config systems, serving, API, flow topology]
    claude_md: [src/minivess/adapters/CLAUDE.md, src/minivess/config/CLAUDE.md]
    decisions: [model_adapter_pattern, ensemble_strategy, config_architecture,
                serving_architecture, api_protocol, flow_topology]

  training:
    navigator: knowledge-graph/domains/training.yaml
    covers: [loss functions, metrics, augmentation, HPO, calibration]
    claude_md: [src/minivess/pipeline/CLAUDE.md]
    decisions: [loss_function, primary_metrics, topology_metrics, hpo_engine,
                augmentation_library, calibration_method, vlm_calibration]

  cloud:
    navigator: knowledge-graph/domains/cloud.yaml
    covers: [cloud providers, GCP, RunPod, GCS, DVC remotes, data flow, environment mapping, Pulumi IaC]
    claude_md: [deployment/pulumi/gcp/CLAUDE.md]
    decisions: [cloud_provider_selection, dvc_remote_strategy, compute_orchestration]
    note: >
      TWO providers only: RunPod (env/dev) + GCP (staging/prod). GCP project=minivess-mlops,
      region=europe-north1. Data on GCS. NEVER add providers without user authorization.

  infrastructure:
    navigator: knowledge-graph/domains/infrastructure.yaml
    covers: [Docker, Prefect, CI/CD, GPU compute, SkyPilot, security, registries]
    claude_md: [deployment/CLAUDE.md, src/minivess/orchestration/CLAUDE.md]
    decisions: [container_strategy, ci_cd_platform, iac_tool, gitops_engine,
                gpu_compute, secrets_management, air_gap_strategy, docker_registry,
                cloud_provider_selection, compute_orchestration]

  data:
    navigator: knowledge-graph/domains/data.yaml
    covers: [datasets, validation, profiling, versioning, lineage, drift]
    claude_md: [src/minivess/data/CLAUDE.md]
    decisions: [data_versioning, data_validation_depth, dataframe_validation,
                data_profiling, label_quality_tool, lineage_tracking, drift_monitoring,
                dvc_remote_strategy, dataset_strategy, database_backend]

  models:
    navigator: knowledge-graph/domains/models.yaml
    covers: [DynUNet, SAM3, SegResNet, UNETR, SwinUNETR, VesselFM, Mamba, foundation]
    claude_md: [src/minivess/adapters/CLAUDE.md]
    decisions: [primary_3d_model, foundation_model, mamba_architecture, paper_model_comparison]

  observability:
    navigator: knowledge-graph/domains/observability.yaml
    covers: [MLflow, DuckDB, Langfuse, Braintrust, LiteLLM, agents, XAI]
    claude_md: [src/minivess/observability/CLAUDE.md]
    decisions: [experiment_tracker, llm_tracing, llm_evaluation,
                llm_provider_strategy, xai_strategy, xai_voxel_tool,
                xai_meta_tool, observability_depth, agent_architecture]

  operations:
    navigator: knowledge-graph/domains/operations.yaml
    covers: [monitoring, governance, retraining, SBOM, compliance, audit, federated, cost, FDA readiness, test set firewall]
    claude_md: []
    decisions: [dashboarding, retraining_trigger, model_governance,
                audit_trail, sbom_generation, federated_learning,
                dashboard_framework, cost_optimization, fda_readiness,
                test_set_firewall]

  testing:
    navigator: knowledge-graph/domains/testing.yaml
    covers: [test tiers, markers, fixtures, CI, QA, frameworks]
    claude_md: [tests/CLAUDE.md]
    decisions: [test_framework, test_tier_strategy]

  openspec:
    location: openspec/
    covers: [active changes, system specs, archived features, SDD workflow]
    config: openspec/config.yaml
    note: >
      Spec-driven development. Use /opsx:propose for new features.
      Specs are Layer 4 evidence — they operationalize KG decisions
      into GIVEN/WHEN/THEN testable scenarios.

  manuscript:
    navigator: knowledge-graph/domains/manuscript.yaml
    covers: [scientific claims, methods stubs, results stubs, limitations, projections, kg-sync,
             TRIPOD compliance, reporting guidelines, cost transparency]
    claude_md: [docs/planning/repo-to-manuscript.md]
    decisions: [publication_target, tripod_compliance]
    note: >
      Narrative layer for paper writing. Claims + section stubs derived from KG decisions + experiments.
      TRIPOD+AI/LLM/Code compliance matrix at docs/planning/tripod-compliance-matrix.md.

# Cross-layer references — how to navigate between layers
layers:
  L0_constitution:
    files: [CLAUDE.md, .claude/rules/*.md]
    purpose: "Invariant rules that constrain all other layers"
    read_when: "Always loaded by default (system context)"

  L1_hot_context:
    files: [docs/planning/*.md, .claude/worktrees/*/MEMORY.md]
    purpose: "Current session state, active plans, memory"
    read_when: "Starting a new task or resuming a session"

  L2_navigator:
    files: [knowledge-graph/navigator.yaml]
    purpose: "THIS FILE — routes queries to the right domain"
    read_when: "First step for any knowledge query"

  L3_evidence:
    files: [knowledge-graph/decisions/L*/*.yaml, knowledge-graph/domains/*.yaml,
            knowledge-graph/_network.yaml, knowledge-graph/_schema.yaml]
    purpose: "Bayesian decision nodes (65 total) + materialized winners"
    read_when: "Understanding why a decision was made, what alternatives exist"
    architecture_doc: docs/planning/prd-kg-openspec-architecture.md

  L4_specifications:
    files: [openspec/specs/*/*.yaml]
    purpose: "GIVEN/WHEN/THEN testable scenarios operationalizing L3 decisions"
    read_when: "Creating tests, verifying implementation matches spec"

  L5_implementation:
    files: [src/minivess/**, tests/**]
    purpose: "Actual code and test implementations"
    read_when: "Implementing changes, debugging, code review"

invariants:
  # HARD CONSTRAINTS — apply before any decision node is evaluated.
  # These are non-negotiable architectural mandates that override all other guidance.
  - id: devex_reproducibility_first
    rule: "The two highest priorities are (1) excellent DevEx (zero manual work, everything automatic) and (2) reproducibility (combat reproducibility crisis in science/ML). Every tool exists to serve these goals: Pulumi=IaC, SkyPilot=compute, Docker=execution, Prefect=orchestration, DVC=data."
    violation_doc: .claude/metalearning/2026-03-14-docker-resistance-anti-pattern.md
  - id: docker_only
    rule: "ALL execution (local, cloud, CI) MUST run inside Docker containers. Bare VM setup scripts are BANNED. Docker is THE execution model — the reproducibility guarantee — NOT optional overhead."
    applies_to: [deployment/skypilot/, deployment/docker/, scripts/]
    violation_doc: .claude/metalearning/2026-03-14-skypilot-bare-vm-docker-violation.md
    claude_md_rules: [17, 18, 19]
  - id: docker_registry_required
    rule: "Cloud GPU training requires Docker images in a registry (GHCR/DockerHub). SkyPilot YAMLs MUST have image_id."
    applies_to: [deployment/skypilot/]
  - id: skypilot_always
    rule: "SkyPilot = intercloud broker (NSDI'23) — automatic workload placement across clouds/K8s/Slurm/SSH. Like Slurm for multi-cloud, NOT IaC. ALWAYS use for compute beyond dev machine. NEVER bypass. NEVER treat as RunPod-specific."
    violation_doc: .claude/metalearning/2026-03-14-skypilot-purpose-misunderstanding.md
    applies_to: [deployment/skypilot/, src/minivess/compute/]
  - id: two_providers_only
    rule: >
      EXACTLY two cloud providers: RunPod (env/dev) + GCP (staging/prod).
      GCP project=minivess-mlops, region=europe-north1. Data on GCS (gs://minivess-mlops-dvc-data).
      NEVER add a third cloud provider (AWS, Azure, etc.) without explicit user authorization.
      Session continuation summaries are NOT authorization for infrastructure changes.
    violation_doc: .claude/metalearning/2026-03-16-unauthorized-aws-s3-architecture-migration.md
    applies_to: [deployment/, configs/cloud/, .dvc/, scripts/configure_dvc_remote.py]

