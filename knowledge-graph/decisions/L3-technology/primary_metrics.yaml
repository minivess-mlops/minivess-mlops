# ==========================================================================
# METRIC SELECTION RATIONALE (from docs/MetricsReloaded.html)
# ==========================================================================
# The MetricsReloaded questionnaire (Maier-Hein et al., Nature Methods 2024)
# is the GROUND TRUTH for metric selection in this project.
# Report: docs/MetricsReloaded.html
#
# For 3D vascular segmentation with thin tubular structures:
# - Overlap alone (Dice) is MISLEADING for vessels because a model can
#   achieve high Dice by segmenting thick vessel segments while missing
#   thin branches entirely.
# - Topology preservation (clDice) captures vessel CONNECTIVITY.
# - Surface distance (MASD) captures boundary ACCURACY.
# ==========================================================================

metric_hierarchy:
  trusted:
    description: >
      Recommended by MetricsReloaded for 3D vascular segmentation.
      These are the PRIMARY metrics for all model comparisons.
    metrics:
      - name: clDice
        full_name: "centerline Dice (Soft Skeleton Dice)"
        what_it_measures: "Vessel topology preservation — connectivity of centerlines"
        reference: "Shit et al. (2021). 'clDice.' CVPR."
        why_trusted: >
          MetricsReloaded recommends topology-aware metrics for tubular structures.
          A model with high Dice but low clDice segments vessel blobs, not trees.
      - name: MASD
        full_name: "Mean Average Surface Distance"
        what_it_measures: "Average distance between predicted and ground-truth surfaces"
        reference: "Maier-Hein et al. (2024). 'Metrics Reloaded.' Nature Methods."
        why_trusted: >
          Hausdorff-family metrics capture boundary accuracy. MASD is more robust
          than HD95 to single-voxel outliers.

  foil:
    description: >
      Commonly used in medical image segmentation but POTENTIALLY MISLEADING
      for vascular structures. Included to demonstrate how wrong metric choice
      can lead to wrong model rankings.
    metrics:
      - name: DSC
        full_name: "Dice Similarity Coefficient (F1 Score)"
        what_it_measures: "Volumetric overlap between prediction and ground truth"
        why_foil: >
          Dice is volume-biased: a model segmenting 80% of vessel volume
          but missing ALL thin branches scores well on Dice but terribly on
          clDice. Including Dice alongside clDice in the paper DEMONSTRATES
          how misleading it can be for tubular structures.

  optional:
    description: >
      Available in the biostatistics flow but NOT primary for the paper.
      May appear in supplementary material.
    metrics:
      - {name: HD95, full_name: "95th percentile Hausdorff Distance"}
      - {name: ASSD, full_name: "Average Symmetric Surface Distance"}
      - {name: NSD, full_name: "Normalized Surface Dice"}
      - {name: BE_0, full_name: "Betti Error β₀ (connected components)"}
      - {name: BE_1, full_name: "Betti Error β₁ (loops/tunnels)"}
      - {name: junction_F1, full_name: "Junction F1 Score"}

resolution_evidence:
  - type: literature
