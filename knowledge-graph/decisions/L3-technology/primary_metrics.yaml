title: "Primary Evaluation Metrics — MetricsReloaded Ground Truth"
level: L3-technology
status: resolved
options:
  - {id: metricsreloaded_full, name: "Metrics Reloaded Full Suite", prior_probability: 0.50, posterior_probability: 0.85}
  - {id: torchmetrics_dice_f1, name: "TorchMetrics Dice + F1", prior_probability: 0.30, posterior_probability: 0.08}
  - {id: cldice_nsd_hd95, name: "clDice + NSD + HD95", prior_probability: 0.15, posterior_probability: 0.05}
