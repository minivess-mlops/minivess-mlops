  # === Comparable platform papers (added 2026-03-15) ===

  wu_2020_ddeep3m:
    authors: "Wu X, Chen S, Huang J, Li A, Xiao R, Cui X"
    year: 2020
    title: "DDeep3M: Docker-powered deep learning for biomedical image segmentation"
    venue: "Journal of Neuroscience Methods, 342:108804"
    url: "https://doi.org/10.1016/j.jneumeth.2020.108804"
    used_in: [project_purpose]
    abstract_snippet: >
      Docker-based 3D biomedical segmentation platform (J. Neurosci. Methods 2020).
      Closest directly comparable platform paper: Docker lowers the barrier for biomedical
      researchers to use deep learning. Key gap vs ARBOR: no experiment tracking, no multi-cloud,
      no model-agnostic adapter pattern, no drift detection, no HPO pipeline.
      ARBOR extends this vision to full MLOps Level 4 with multi-cloud and model-agnostic design.
      Cite in Introduction as prior art that motivated our approach.

  abe_2022_neurocaas:
    authors: "Abe P, et al."
    year: 2022
    title: "NeuroCAAS: A cloud-based analysis platform for neuroscience"
    venue: "Neuron, 115(6):S0896-6273(22)00587-6"
    url: "https://doi.org/10.1016/j.neuron.2022.06.018"
    used_in: [project_purpose]
    abstract_snippet: >
      Cloud compute platform for neuroscience analyses (AWS-based, multi-user).
      Comparable platform paper: demonstrates cloud compute for academic neuroscience research.
      Key gap vs ARBOR: no model training orchestration, no MONAI ecosystem, no
      experiment tracking, no drift detection; cloud selection is preconfigured, not
      model-agnostic. Cite in Introduction as cloud platform baseline for neuroscience.

  chen_2024_mambavesselnet:
    authors: "Chen Y, Liu Z, He X"
    year: 2024
    title: "MambaVesselNet: A Hybrid CNN-Mamba Architecture for 3D Cerebrovascular Segmentation"
    venue: "ACM Multimedia Asia (MMasia '24)"
    url: "https://doi.org/10.1145/3696409.3700231"
    used_in: [model_adapter_pattern, primary_3d_model]
    abstract_snippet: >
      First published Mamba architecture for 3D cerebrovascular segmentation (TOF-MRA).
      Hybrid CNN+Mamba bottleneck; state-of-the-art on TOF-MRA against SegResNet, UNETR.
      Key relevance: (1) establishes Mamba as viable SSM for cerebrovascular segmentation,
      motivating inclusion of Mamba family in ARBOR's multi-model comparison;
      (2) DDeep3M is NOT evaluated in 2PM microscopy context — our platform fills this gap.
      Note: focuses on architecture, has NO reproducibility tooling, no multi-cloud,
      no experiment tracking, no MLOps pipeline. The architecture exists; the platform does not.

  xu_2025_mambavesselnet_plus:
    authors: "Xu S, Chen Y, Liu Z, He X"
    year: 2025
    title: "MambaVesselNet++: Advancing 3D Cerebrovascular Segmentation with a Selective State Space Model"
    venue: "ACM Transactions on Multimedia Computing, Communications, and Applications (TOMM)"
    url: "https://doi.org/10.1145/3757324"
    used_in: [model_adapter_pattern, primary_3d_model]
    abstract_snippet: >
      Extended journal version of chen_2024_mambavesselnet. MambaVesselNet++ improves
      over the conference version with a refined bidirectional Mamba bottleneck (8 blocks,
      4 enc + 4 dec) and extended experiments. Feature dims: (48, 96, 192, 384, 768).
      Platform paper uses the TOMM architecture (MambaVesselNet++) as the canonical
      SSM family representative. DOI: https://doi.org/10.1145/3757324.

  # === VLM Calibration + Evidential Deep Learning (added 2026-03-17) ===

  sae_2026_vlm_calibration:
    authors: "TBD (CVPR 2026 — authors not yet confirmed)"
    year: 2026
    title: "Similarity-as-Evidence: Calibrating Overconfident VLMs for Interpretable and Label-Efficient Medical Active Learning"
    venue: "CVPR 2026"
    url: "TBD"
    used_in: [vlm_calibration]
    abstract_snippet: >
      Introduces Similarity Evidence Head (SEH) that reinterprets VLM text-image
      similarity vectors as evidence for a Dirichlet distribution. Decomposes
      uncertainty into vacuity (knowledge gap) and dissonance (conflicting evidence).
      82.57% accuracy on 10 medical imaging datasets with 20% label budget.
      Directly relevant to SAM3 zero-shot calibration on microvasculature.
    note: >
      CITATION KEY: sae_2026_vlm_calibration. CVPR 2026 accepted paper — arXiv
      preprint not yet found. Verify authors, URL, and arXiv ID before manuscript
      submission. See Issue #798.

  barfoot_2025_average_calibration_losses:
    authors: "Barfoot T, Garcia-Peraza-Herrera LC, Akcay S, Glocker B, Vercauteren T"
    year: 2025
    title: "Average Calibration Losses for Reliable Uncertainty in Medical Image Segmentation"
    venue: "IEEE TMI, arXiv:2506.03942"
    url: "https://arxiv.org/abs/2506.03942"
    used_in: [calibration_method, vlm_calibration]
    abstract_snippet: >
      Differentiable mL1-ACE (marginal L1 Average Calibration Error) as auxiliary
      loss. Tested on ACDC, AMOS, KiTS, BraTS. Hard-binned hL1-ACE variant used
      in our factorial design (c=2 factor). CC BY 4.0 from cai4cai/Average-Calibration-Losses.

  basu_2025_calibprompt:
    authors: "Basu A, Shamshad F, Sharifdeen A, Nandakumar K, Khan MH"
    year: 2025
    title: "Calibration-Aware Prompt Learning for Medical Vision-Language Models"
    venue: "BMVC 2025, arXiv:2509.15226"
    url: "https://arxiv.org/abs/2509.15226"
    used_in: [vlm_calibration]
    abstract_snippet: >
      CalibPrompt: learnable prompts with smoothed accuracy alignment and angular
      separation loss for medical VLM calibration. Tested on 4 Med-VLMs across
      5 datasets. Complementary to SaE — addresses calibration through prompt
      engineering rather than evidence estimation.

  haft_javaherian_2020_topological:
    authors: "Haft-Javaherian M, Villiger M, Schaffer CB, Nishimura N, Golland P, Bouma BE"
    year: 2020
    title: "A topological encoding convolutional neural network for segmentation of 3D multiphoton images of brain vasculature using persistent homology"
    venue: "CVPR Workshop on Computer Vision for Microscopy Image Analysis (CVMI)"
    url: "https://github.com/mhaft/DeepVess"
    used_in: [primary_metrics, topology_metrics]
    abstract_snippet: >
      Topological encoding CNN for 3D 2PM vascular segmentation using persistent homology.
      MIT/Cornell/MGH collaboration. Key finding: topology preservation in vascular
      segmentation requires explicit topological constraints beyond standard Dice loss.
      The DeepVess architecture achieves 76.2% Dice on DeepVess dataset.
      Direct relevance: (1) validates that topology metrics (clDice, persistent homology)
      are the right evaluation framework for 2PM vascular data — supports our cbdice_cldice
      choice; (2) DeepVess is our external validation dataset (Cornell eCommons).
      Their method has no MLOps pipeline; ARBOR provides the infrastructure scaffold
      to reproduce and extend their topological approach across labs.
