domain: models
description: DynUNet, SAM3, SegResNet, UNETR, SwinUNETR, VesselFM, Mamba, foundation models
last_reviewed: "2026-03-17"

decisions:
  primary_3d_model:
    status: resolved
    winner: vista3d
    rationale: "MONAI-native, no custom code; DynUNet and SegResNet as alternatives"
    implementation: src/minivess/adapters/
    evidence: [docs/planning/monai-model-adapter-integration-plan.md]
    prd_node: knowledge-graph/decisions/L3-technology/primary_3d_model.yaml

  foundation_model:
    status: partial
    candidates: [sam3_lora, medsam3_adapter, med_persam]
    implementation: src/minivess/adapters/sam3_adapter.py
    evidence:
      - docs/planning/sam3-integration-research-report.md
      - .claude/metalearning/2026-03-02-sam3-implementation-fuckup.md
    prd_node: knowledge-graph/decisions/L3-technology/foundation_model.yaml

  mamba_architecture:
    status: resolved
    winner: mambavesselnet_pp
    rationale: "MambaVesselNet++ hybrid CNN-SSM with VSS blocks and multi-scale fusion"
    implementation: [src/minivess/adapters/mambavesselnet.py, src/minivess/adapters/mamba/]
    adapter_status: complete  # PR #748 — code exists, GPU benchmark runs pending
    evidence: [docs/planning/mambavesselnet-implementation-plan.xml]
    prd_node: knowledge-graph/decisions/L3-technology/mamba_architecture.yaml

  paper_model_comparison:
    status: planned
    rationale: "6-model lineup for Nature Protocols paper: DynUNet, MambaVesselNet++, SAM3 Vanilla, SAM3 TopoLoRA, SAM3 Hybrid, VesselFM"
    implementation: []  # GPU benchmark runs pending on GCP L4 spot
    evidence: [.claude/metalearning/2026-03-17-model-lineup-ignorance-massive-fuckup.md]
    prd_node: knowledge-graph/decisions/L3-technology/paper_model_comparison.yaml

metalearning:
  - file: .claude/metalearning/2026-03-02-sam3-implementation-fuckup.md
    applies_to: [sam3_adapter.py]
    rule: "SAM3 = Meta SAM 3 (Nov 2025), NOT SAM2. Always web-search for models beyond cutoff"
  - file: .claude/metalearning/2026-03-07-silent-existing-failures.md
    applies_to: [adapters/]
    rule: "Every test failure needs immediate action — no silent pre-existing failures"
  - file: .claude/metalearning/2026-03-15-amp-validation-nan-3d.md
    applies_to: [src/minivess/pipeline/trainer.py, src/minivess/adapters/]
    rule: "AMP autocast causes NaN in 3D validation — separate AMP policy for train vs val"
  - file: .claude/metalearning/2026-03-15-t4-turing-fp16-nan-ban.md
    applies_to: [deployment/skypilot/, configs/cloud/]
    rule: "T4 banned for half-precision models — Turing lacks BF16, use L4 (Ada Lovelace)"
  - file: .claude/metalearning/2026-03-17-model-lineup-ignorance-massive-fuckup.md
    applies_to: [knowledge-graph/decisions/L3-technology/paper_model_comparison.yaml]
    rule: "Claude could not name the 6-model paper lineup from memory — paper_model_comparison.yaml is the SINGLE SOURCE OF TRUTH"

