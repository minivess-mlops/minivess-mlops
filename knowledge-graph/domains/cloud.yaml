metalearning:
  - file: .claude/metalearning/2026-03-16-unauthorized-aws-s3-architecture-migration.md
    applies_to: [deployment/skypilot/, scripts/configure_dvc_remote.py, .dvc/config]
    rule: >
      NEVER change cloud provider architecture without explicit user authorization.
      Session continuation summaries are NOT authorization. Two providers: RunPod + GCP.
      Data goes to GCS, not AWS S3.
  - file: .claude/metalearning/2026-03-14-runpod-container-not-vm.md
    applies_to: [deployment/skypilot/]
    rule: "RunPod is container-native, not VM-based — no Docker-in-Docker"
  - file: .claude/metalearning/2026-03-14-failed-to-follow-gcp-instructions.md
    applies_to: [deployment/pulumi/, deployment/skypilot/]
    rule: "Follow GCP setup instructions exactly — do not skip steps"
  - file: .claude/metalearning/2026-03-15-gcp-artifact-upload-success.md
    applies_to: [deployment/skypilot/, src/minivess/observability/]
    rule: "GCP artifact upload verified working — checkpoint + mlruns sync"
