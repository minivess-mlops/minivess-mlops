domain: testing
description: Test tiers, markers, fixtures, CI, QA, frameworks
last_reviewed: "2026-03-17"

decisions:
  test_framework:
    status: resolved
    winner: pytest_hypothesis
    rationale: "pytest for unit/integration, Hypothesis for property-based testing"
    implementation: [pyproject.toml, pytest-staging.ini]
    prd_node: knowledge-graph/decisions/L3-technology/test_framework.yaml

  test_tier_strategy:
    status: resolved
    winner: three_tier_staging_prod_gpu
    rationale: "Staging (<3min, no models), Prod (5-10min, all except GPU), GPU (external instances)"
    implementation: [Makefile, pytest-staging.ini]
    prd_node: knowledge-graph/decisions/L3-technology/test_tier_strategy.yaml

tiers:
  staging:
    command: "make test-staging"
    markers_excluded: [model_loading, slow, integration]
    target_time: "< 3 min"
  prod:
    command: "make test-prod"
    markers_excluded: [gpu_heavy]
    target_time: "5-10 min"
  gpu:
    command: "make test-gpu"
    runs_on: "GPU instances only (RunPod, intranet)"

metalearning:
  - file: .claude/metalearning/2026-03-07-silent-existing-failures.md
    applies_to: [tests/]
    rule: "Every test failure needs immediate action"
  - file: .claude/metalearning/2026-03-10-silent-test-skips-optional-deps.md
    applies_to: [tests/, pyproject.toml]
    rule: "uv sync --all-extras required — plain uv sync silently skips 126 tests"

planning_docs:
  - file: docs/planning/e2e-testing-1st-pass.xml
    status: planned
  - file: docs/planning/final-methods-quasi-e2e-testing-plan.xml
    status: implemented

open_issues: []
