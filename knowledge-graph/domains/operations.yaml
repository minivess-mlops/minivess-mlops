domain: operations
description: Monitoring, governance, retraining, SBOM, compliance, audit, federated learning
last_reviewed: "2026-03-17"

decisions:
  drift_monitoring:
    status: resolved
    winner: evidently_lib
    rationale: "Evidently DataDriftPreset + kernel MMD"
    implementation: [src/minivess/pipeline/drift_detection.py, src/minivess/pipeline/embedding_drift.py]
    prd_node: knowledge-graph/decisions/L5-operations/drift_monitoring.yaml

  dashboarding:
    status: config_only
    candidates: [grafana_prometheus, mlflow_ui_only]
    implementation: deployment/docker-compose.yml
    prd_node: knowledge-graph/decisions/L5-operations/dashboarding.yaml

  retraining_trigger:
    status: not_started
    candidates: [drift_alert_webhook, scheduled_periodic, manual_only]
    prd_node: knowledge-graph/decisions/L5-operations/retraining_trigger.yaml

  model_governance:
    status: partial
    candidates: [mlflow_registry_gates, custom_approval_flow, weightwatcher_gate]
    prd_node: knowledge-graph/decisions/L5-operations/model_governance.yaml

  audit_trail:
    status: resolved
    winner: structured_json_otel
    implementation: src/minivess/compliance/
    prd_node: knowledge-graph/decisions/L5-operations/audit_trail.yaml

  sbom_generation:
    status: not_started
    candidates: [syft_uv_lock, cyclonedx]
    prd_node: knowledge-graph/decisions/L5-operations/sbom_generation.yaml

  cost_tracking_strategy:
    status: accepted
    winner: prometheus_bentoml_custom_metrics
    rationale: "Prometheus export via BentoML /metrics, shared Gauges module, DuckDB analytics"
    implementation: [src/minivess/observability/prometheus_metrics.py, src/minivess/observability/analytics.py]
    prd_node: knowledge-graph/decisions/L5-operations/cost-tracking-strategy.yaml

  federated_learning:
    status: not_started
    candidates: [monai_fl, flower_framework, not_applicable]
    prd_node: knowledge-graph/decisions/L5-operations/federated_learning.yaml

  fda_readiness:
    status: accepted
    winner: preclinical_fda_ready
    rationale: "Preclinical platform with FDA-ready architecture. Continuous audit from Day 1. Phased approach: H1 now, H2 after factorial, H3 Q3 2026, H4 clinical projects."
    implementation: [src/minivess/compliance/, docs/planning/regops-fda-regulation-reporting-qms-samd-iec62304-mlops-report.md]
    prd_node: knowledge-graph/decisions/L5-operations/fda_readiness.yaml

  test_set_firewall:
    status: accepted
    winner: audit_log_with_counter
    rationale: "AuditTrail.log_test_evaluation() + cumulative MLflow counter + OpenLineage InputDataset events. Compensates for DVC lacking DataLad inherent action logging."
    implementation: [src/minivess/compliance/audit.py]
    prd_node: knowledge-graph/decisions/L5-operations/test_set_firewall.yaml
    gap: "Methods exist but are never called from Prefect flows. Issue #821."

  dashboard_framework:
    status: resolved
    winner: grafana_prometheus
    rationale: "Grafana + Prometheus + AlertManager for monitoring dashboards"
    implementation: [deployment/docker-compose.yml, deployment/grafana/, deployment/prometheus/]
    prd_node: knowledge-graph/decisions/L5-operations/dashboard_framework.yaml

  cost_optimization:
    status: resolved
    winner: skypilot_spot_finops
    rationale: "Spot instances via SkyPilot, checkpoint/resume for preemption"
    implementation: [deployment/skypilot/]
    prd_node: knowledge-graph/decisions/L5-operations/cost_optimization.yaml

