domain: data
description: Datasets, validation, profiling, versioning, lineage, drift
last_reviewed: "2026-03-17"

decisions:
  data_versioning:
    status: resolved
    winner: dvc_local_minio
    implementation: [data/minivess.dvc, scripts/download_minivess.py]
    prd_node: knowledge-graph/decisions/L3-technology/data_versioning.yaml

  data_validation_depth:
    status: resolved
    winner: validation_onion_12_layer
    rationale: "Pydantic + Pandera + Great Expectations layered validation"
    implementation: src/minivess/data/
    prd_node: knowledge-graph/decisions/L2-architecture/data_validation_depth.yaml

  dataframe_validation:
    status: resolved
    winner: pandera_schemas
    implementation: src/minivess/data/
    prd_node: knowledge-graph/decisions/L3-technology/dataframe_validation.yaml

  data_profiling:
    status: config_only
    winner: whylogs
    prd_node: knowledge-graph/decisions/L3-technology/data_profiling.yaml

  label_quality_tool:
    status: config_only
    candidates: [cleanlab, label_studio_agreement]
    prd_node: knowledge-graph/decisions/L3-technology/label_quality_tool.yaml

  lineage_tracking:
    status: config_only
    candidates: [openlineage_marquez, mlflow_lineage]
    prd_node: knowledge-graph/decisions/L3-technology/lineage_tracking.yaml

  drift_monitoring:
    status: resolved
    winner: evidently_lib
    rationale: "Evidently DataDriftPreset + kernel MMD for embedding drift"
    implementation: [src/minivess/pipeline/drift_detection.py, src/minivess/pipeline/embedding_drift.py]
    evidence: [docs/planning/drift-monitoring-implementation-plan.xml]
    prd_node: knowledge-graph/decisions/L5-operations/drift_monitoring.yaml

  dataset_strategy:
    status: resolved
    winner: minivess_primary_external_test
    rationale: "MiniVess (70 vols) primary; DeepVess/TubeNet/VesselNN for external validation"
    implementation: [src/minivess/data/external_datasets.py, configs/splits/3fold_seed42.json]
    prd_node: knowledge-graph/decisions/L3-technology/dataset_strategy.yaml

  database_backend:
    status: resolved
    winner: postgresql_only
    rationale: "PostgreSQL for MLflow + Optuna; DuckDB for analytics. SQLite BANNED."
    implementation: [deployment/docker-compose.yml]
    prd_node: knowledge-graph/decisions/L3-technology/database_backend.yaml

  dvc_remote_strategy:
    status: resolved
    winner: minio_local_gcs_cloud
    rationale: "MinIO for local dev, GCS for staging/prod"
    implementation: [.dvc/config]
    prd_node: knowledge-graph/decisions/L3-technology/dvc_remote_strategy.yaml

metalearning:
  - file: .claude/metalearning/2026-03-08-sqlite-fallback-bias.md
    applies_to: [src/minivess/data/, deployment/docker-compose.yml]
    rule: "PostgreSQL is the ONLY database — never fall back to SQLite"

planning_docs:
  - file: docs/planning/drift-monitoring-implementation-plan.xml
    status: implemented
  - file: docs/planning/dataset-use-plan.md
    status: implemented
  - file: docs/planning/data-engineering-quality-etl-report.md
    status: reference
  - file: docs/planning/drift-monitoring-plan.md
    status: planned
  - file: docs/planning/synthetic-data-qa-engineering-drifts-knowledge-agentic-systems-report.md
    status: reference

open_issues:
  - number: 602
    title: "Register VesselNN as 4th dataset"
