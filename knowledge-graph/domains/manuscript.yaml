# knowledge-graph/domains/manuscript.yaml
# Narrative layer: scientific claims, methods stubs, results stubs, limitations
# Consumer: sci-llm-writer via kg-sync Skill
# NOT auto-generated — curated by the researcher/author

domain: manuscript
description: Scientific claims, methods stubs, results stubs, limitations, projections for publication
last_reviewed: "2026-03-17"

decisions:
  publication_target:
    status: resolved
    winner: nature_protocols
    rationale: "Nature Protocols; working name: NEUROVEX"
    prd_node: knowledge-graph/decisions/L1-research-goals/publication_target.yaml

  tripod_compliance:
    status: in_progress
    winner: tripod_ai_plus_code_plus_llm
    rationale: >
      Three TRIPOD variants apply: TRIPOD+AI (27 items, primary), TRIPOD-LLM (19 items,
      for Pydantic AI micro-orchestration), TRIPOD-Code (protocol stage, proactive).
      Compliance matrix: docs/planning/tripod-compliance-matrix.md
    references:
      - citation_key: collins_2024_tripod_ai
        citation: "Collins et al. (2024). TRIPOD+AI statement. BMJ 385:e078378."
        url: https://doi.org/10.1136/bmj-2023-078378
      - citation_key: gallifant_2025_tripod_llm
        citation: "Gallifant et al. (2025). TRIPOD-LLM reporting guideline. Nat Med 31:60-69."
        url: https://doi.org/10.1038/s41591-024-03425-5
      - citation_key: pollard_2026_tripod_code
        citation: "Pollard et al. (2026). Protocol for TRIPOD-Code. Diagn Progn Res 10:4."
        url: https://doi.org/10.1186/s41512-025-00217-4
    implementation:
      - src/minivess/pipeline/biostatistics_lineage.py  # existing lineage manifest
      - docs/planning/tripod-compliance-matrix.md        # compliance matrix
    priority_gaps:
      - "Sample size justification (TRIPOD+AI 9a)"
      - "Participant flow diagram (TRIPOD+AI 6, 20a)"
      - "Fairness statement (TRIPOD+AI 3c, 12f, 26)"
      - "Cost transparency (TRIPOD-LLM 12)"
      - "Zenodo archival (TRIPOD-Code)"

# These are the YAML files in knowledge-graph/manuscript/ (to be created)
sections:
  claims:
    file: knowledge-graph/manuscript/claims.yaml
    description: "12 scientific claims linked to KG decision nodes as evidence"
    status: bootstrapped

  methods:
    file: knowledge-graph/manuscript/methods.yaml
    description: "13 Methods section stubs (M0-M12) with Mermaid figure assignments"
    status: bootstrapped

  results:
    file: knowledge-graph/manuscript/results.yaml
    description: "6 Results section stubs (R0-R5) linked to experiment run_ids"
    status: bootstrapped_partial  # R3b blocked: GPU benchmark runs pending (DynUNet + MambaVesselNet++ adapters COMPLETE, SAM3 variants + VesselFM need GPU)

  limitations:
    file: knowledge-graph/manuscript/limitations.yaml
    description: "6 known limitations with mitigation strategy per limitation"
    status: bootstrapped

  projections:
    file: knowledge-graph/manuscript/projections.yaml
    description: "KG→file dependency map for staleness detection and kg-sync"
    status: bootstrapped

downstream_artifacts:
  - path: docs/manuscript/latent-methods-results/methods/
    consumer: sci-llm-writer
    generated_by: kg-sync
    status: scaffold_only  # bullet+Mermaid placeholders, not yet filled

  - path: docs/manuscript/latent-methods-results/results/
    consumer: sci-llm-writer
    generated_by: kg-sync
    status: partial  # R1 and R3a filled, R3b blocked on GPU runs

  - path: sci-llm-writer/manuscripts/vasculature-mlops/kg-snapshot.yaml
    consumer: sci-llm-writer
    generated_by: "/kg-sync --export-to sci-llm-writer"
    status: not_yet_generated

reporting_guidelines:
  tripod_ai:
    file: docs/planning/tripod-compliance-matrix.md
    description: "TRIPOD+AI/LLM/Code compliance matrix — 27+19 items mapped to implementation"
    status: created
    items_covered: 15  # of 27 TRIPOD+AI items fully/partially addressed
    items_missing: 4   # fairness, PPI, registration, abstract
    segmentation_adaptations: true  # prediction -> voxel segmentation probability

intent_sources:
  - source: docs/planning/repo-to-manuscript.md
    role: "Primary plan — paper framing, IMRAD structure, KG architecture"
  - source: docs/planning/repo-to-manuscript-prompt.md
    role: "Verbatim user prompts + synthesized LLM prompt for session resumption"
  - source: CLAUDE.md
    role: "Architectural invariants, design goals, DevEx principles (intent layer)"

metalearning:
  - file: .claude/metalearning/2026-03-02-sam3-implementation-fuckup.md
    applies_to: [manuscript/results.yaml, manuscript/limitations.yaml]
    rule: "SAM3 first impl used SAM2 architecture — document in paper as iteration/learning"
  - file: .claude/metalearning/2026-03-15-t4-turing-fp16-nan-ban.md
    applies_to: [manuscript/methods.yaml#section-M3, manuscript/limitations.yaml]
    rule: "T4 hardware ban is a real constraint — must be stated in paper methods"

open_issues:
  - id: "pending"
    title: "GPU benchmark runs for 6-model paper comparison (R3b blocker) — DynUNet + Mamba adapters complete, SAM3 + VesselFM need GCP L4 spot"
    priority: critical
    blocks: [manuscript/results.yaml#R3b, docs/manuscript/latent-methods-results/results/results-03-models.tex]
