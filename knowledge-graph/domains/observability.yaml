domain: observability
description: MLflow, DuckDB, Langfuse, Braintrust, LiteLLM, agents, XAI
last_reviewed: "2026-03-13"

decisions:
  experiment_tracker:
    status: resolved
    winner: mlflow_local
    rationale: "MLflow local filesystem backend + DuckDB analytics.
      Metric keys use slash-prefix convention (MLflow 2.11+)."
    conventions:
      metric_prefix: "slash (e.g. val/dice, sys/gpu_model)"
      ci_suffix: "/ci95_lo, /ci95_hi"
      fold_encoding: "fold/{id}/best_val_loss"
    implementation: [src/minivess/observability/tracking.py, src/minivess/observability/analytics.py, src/minivess/observability/metric_keys.py]
    prd_node: knowledge-graph/decisions/L3-technology/experiment_tracker.yaml

  metric_naming_convention:
    status: resolved
    winner: slash_prefix
    rationale: "MLflow 2.11+ auto-groups metrics by slash prefix in UI.
      Migrating from underscore to slash for semantic grouping. Issue #790."
    implementation:
      - src/minivess/observability/metric_keys.py
      - src/minivess/observability/tracking.py
    planning_docs:
      - docs/planning/mlflow-metrics-and-params-double-check-before-large-scale-gcp-work.md

  llm_tracing:
    status: resolved
    winner: langfuse_self_hosted
    implementation: src/minivess/observability/langfuse_tracing.py
    prd_node: knowledge-graph/decisions/L3-technology/llm_tracing.yaml

  llm_evaluation:
    status: resolved
    winner: braintrust_autoevals
    implementation: src/minivess/observability/braintrust_eval.py
    prd_node: knowledge-graph/decisions/L3-technology/llm_evaluation.yaml

  llm_provider_strategy:
    status: resolved
    winner: litellm_multi_provider
    implementation: src/minivess/agents/
    prd_node: knowledge-graph/decisions/L3-technology/llm_provider_strategy.yaml

  xai_strategy:
    status: partial
    candidates: [multi_layer_xai, gradcam_only]
    prd_node: knowledge-graph/decisions/L2-architecture/xai_strategy.yaml

  xai_voxel_tool:
    status: config_only
    candidates: [captum_gradcam, captum_integrated_gradients]
    prd_node: knowledge-graph/decisions/L3-technology/xai_voxel_tool.yaml

  xai_meta_tool:
    status: config_only
    candidates: [shap_tabular, quantus_meta_eval, both_shap_quantus]
    prd_node: knowledge-graph/decisions/L3-technology/xai_meta_tool.yaml

  observability_depth:
    status: resolved
    winner: full_stack_otel
    rationale: "Prometheus + Grafana + MLflow + Langfuse full stack"
    implementation: [deployment/docker-compose.yml]
    prd_node: knowledge-graph/decisions/L2-architecture/observability_depth.yaml

  agent_architecture:
    status: resolved
    winner: pydantic_ai_prefect
    rationale: "Pydantic AI + PrefectAgent (ADR 0007). LangGraph deprecated and removed from deps."
    implementation: src/minivess/agents/
    prd_node: knowledge-graph/decisions/L2-architecture/agent_architecture.yaml

metalearning:
  - file: .claude/metalearning/2026-03-14-mlflow-version-mismatch-fuckup.md
    applies_to: [src/minivess/observability/tracking.py, deployment/docker/]
    rule: "MLflow version must match between client and server — pin in pyproject.toml"

planning_docs:
  - file: docs/planning/langfuse-braintrust-integration-report.md
    status: implemented
  - file: docs/planning/mlflow-tracking-plan.md
    status: implemented
  - file: docs/planning/monitoring-research-report.md
    status: reference
  - file: docs/planning/langgraph-agents-plan.md
    status: superseded
    note: "Superseded by ADR-0007 (Pydantic AI over LangGraph)"
  - file: docs/planning/profiler-benchmarking-plan.md
    status: planned

open_issues: []
