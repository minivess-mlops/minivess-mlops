  calibration_training_loss:
    status: resolved
    winner: hl1_ace_auxiliary
    rationale: >
      hL1-ACE (Hard L1 Average Calibration Error) as auxiliary loss.
      Barfoot et al. (2025), "Average Calibration Losses for Improved Calibration
      of Medical Image Segmentation Networks", IEEE TMI (arXiv:2506.03942).
      Added via aux_calibration=true factorial factor. Does NOT replace the
      primary segmentation loss — it is an AUXILIARY term.
    implementation:
