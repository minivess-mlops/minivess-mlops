      - src/minivess/pipeline/loss_functions.py  # AuxCalibCompoundLoss wrapper
    last_reviewed: "2026-03-30"

  calibration_metrics:
    status: resolved
    winner: two_tier_global_and_spatial_partial
    rationale: >
      TWO GRANULARITY LEVELS (both required for segmentation):

      GLOBAL (image-level) calibration: "across all voxels, is mean confidence ≈ mean accuracy?"
        - ECE (Guo 2017): equal-width bins, population-weighted
        - MCE (Naeini 2015): worst-case bin miscalibration
        - ACE (Nixon 2019): equal-count bins, all-class
        - D-ECE (Kumar 2019): bias-corrected ECE
        - Brier score: MSE of probabilities
        - NLL: negative log-likelihood
        - Overconfidence error (Thulasidasan 2019): one-directional
        - Limitation: dominated by background class in vessel segmentation

      SPATIAL (voxel-level) calibration: "at each location type, is confidence calibrated?"
        - BA-ECE (Zeevi 2025): stratified by distance from boundary — CLINICALLY CRITICAL
        - pECE (Li 2025): pixel-wise ECE + FP overconfidence penalty
        - SPACE (Zeevi 2025): local uncertainty-error overlap via Gaussian convolution
        - BUC (Zeevi 2025): boundary vs interior uncertainty concentration
        - Per-voxel Brier map: spatial heatmap of calibration error
        - Advantage: reveals that vessel boundaries are systematically miscalibrated
          even when global ECE looks good

      "A model with good global ECE can have terrible calibration at thin vessel boundaries."

      Co-primary calibration metrics: ECE (global) + BA-ECE (spatial) — Holm-Bonferroni at alpha/2.

      KEY INTERMEDIATE: Kandinsky conformal prediction (Brunekreef 2024 CVPR) —
      aggregates non-conformity scores over "similar" pixels, an intermediate between
      marginal (image-level) and conditional (pixel-level) calibration. Data-efficient
      for medical imaging where calibration data is scarce.

      TRAINING-TIME APPROACHES:
        - hL1-ACE (Barfoot 2025): auxiliary loss targeting global calibration
        - MEEP (Larrazabal 2023 MICCAI): max entropy on erroneous pixels only
        - Spectral entropy regularization (Cheng 2025 ICLR): frequency-domain calibration
        - DA-Cal (Li 2026): pixel-level Meta Temperature Network for cross-domain

      POST-HOC APPROACHES:
        - Temperature scaling (Guo 2017): global scalar
        - Local temperature scaling: per-pixel temperature map
        - Isotonic regression
        - Conformal prediction (split conformal, CRC, ConSeCo)

      ENSEMBLE CALIBRATION:
        - Diverse ensembles improve calibration (Stickland & Murray 2020)
        - Joint regularization + calibration in deep ensembles (Fredsgaard & Schmidt 2025)
        - Calibration-aware ensemble selection (Issue #896)

    implemented_global:
