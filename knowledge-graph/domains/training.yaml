  three_evaluation_axes:
    status: resolved
    winner: accuracy_uncertainty_calibration
    rationale: >
      Three DISTINCT axes (NOT interchangeable):
      1. Segmentation Accuracy: DSC, clDice, HD95, MASD, skeleton recall
      2. Uncertainty: raw probability quality (softmax output, entropy)
      3. Calibration: do probabilities reflect true frequencies? (ECE, BA-ECE)
      aux_calibration=true targets axis 3 (calibration) without degrading axis 1 (accuracy).
      Equal accuracy + better calibration = net win for deployment.
    implementation:
      - src/minivess/config/biostatistics_config.py  # co_primary + calibration_co_primary
    last_reviewed: "2026-03-30"

