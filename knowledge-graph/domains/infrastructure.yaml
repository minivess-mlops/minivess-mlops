domain: infrastructure
description: Docker, Prefect, CI/CD, security. For cloud providers/GPU/SkyPilot/IaC/DVC see cloud domain.
last_reviewed: "2026-03-17"
see_also: knowledge-graph/domains/cloud.yaml

decisions:
  container_strategy:
    status: resolved
    winner: docker_compose_profiles
    rationale: "Docker-per-flow isolation, 12 services"
    implementation: [deployment/docker-compose.yml, deployment/docker-compose.flows.yml]
    evidence: [docs/planning/docker-security-hardening-mlsecops-report.md]
    prd_node: knowledge-graph/decisions/L4-infrastructure/container_strategy.yaml

  ci_cd_platform:
    status: resolved
    winner: github_actions_cml
    rationale: "GitHub Actions + CML, but EXPLICITLY DISABLED (credits)"
    implementation: .github/workflows/ci-v2.yml
    prd_node: knowledge-graph/decisions/L4-infrastructure/ci_cd_platform.yaml

  iac_tool:
    status: resolved
    winner: pulumi_python
    rationale: "Pulumi Python SDK for GCP IaC. Stack: deployment/pulumi/gcp/"
    implementation: [deployment/pulumi/gcp/__main__.py]
    prd_node: knowledge-graph/decisions/L4-infrastructure/iac_tool.yaml

  gitops_engine:
    status: not_started
    candidates: [argocd, fluxcd, github_actions_deploy]
    prd_node: knowledge-graph/decisions/L4-infrastructure/gitops_engine.yaml

  gpu_compute:
    status: resolved
    winner: skypilot_two_providers
    rationale: "RunPod (env/dev) + GCP (staging/prod). Both via SkyPilot. See cloud domain for details."
    implementation: [src/minivess/compute/skypilot_launcher.py, deployment/skypilot/]
    evidence: [docs/planning/skypilot-runpod-architecture-report.md]
    prd_node: knowledge-graph/decisions/L4-infrastructure/gpu_compute.yaml
    constraint: "ALL cloud execution MUST use Docker images (image_id in SkyPilot). Bare VM setup scripts are BANNED."
    see_also: knowledge-graph/domains/cloud.yaml

  docker_registry:
    status: resolved
    winner: dockerhub_and_gar
    rationale: >
      Docker Hub for RunPod (env) — public by default, zero-auth pull. GHCR was private
      and caused 40+ min STARTING hangs on RunPod (2026-03-16). GAR for GCP (staging/prod)
      — same-region as GCS/Cloud Run, ADC auth. GHCR reserved for GitHub Actions CI only.
    implementation: [configs/registry/dockerhub.yaml, configs/registry/gar.yaml, configs/registry/ghcr.yaml]
    per_environment:
      runpod_dev: dockerhub
      gcp_staging_prod: gar
      github_actions_ci: ghcr

  secrets_management:
    status: resolved
    winner: dynaconf_dotenv
    rationale: ".env.example = single source of truth"
    implementation: .env.example
    prd_node: knowledge-graph/decisions/L4-infrastructure/secrets_management.yaml

  air_gap_strategy:
    status: not_started
    candidates: [offline_docker_bundle, helm_oci_vendored]
    prd_node: knowledge-graph/decisions/L4-infrastructure/air_gap_strategy.yaml

  cloud_provider_selection:
    status: resolved
    winner: runpod_gcp_dual
    rationale: "RunPod (env) + GCP (staging/prod). Third provider requires explicit authorization."
    implementation: [configs/cloud/runpod_dev.yaml, configs/cloud/gcp_spot.yaml]
    prd_node: knowledge-graph/decisions/L4-infrastructure/cloud_provider_selection.yaml
    see_also: knowledge-graph/domains/cloud.yaml

  compute_orchestration:
    status: resolved
    winner: skypilot_broker
    rationale: "SkyPilot intercloud broker (NSDI'23) for all cloud GPU compute"
    implementation: [src/minivess/compute/skypilot_launcher.py, deployment/skypilot/]
    prd_node: knowledge-graph/decisions/L4-infrastructure/compute_orchestration.yaml
    see_also: knowledge-graph/domains/cloud.yaml

metalearning:
  - file: .claude/metalearning/2026-03-14-skypilot-purpose-misunderstanding.md
    applies_to: [deployment/skypilot/, src/minivess/compute/]
    rule: "SkyPilot = intercloud broker (NSDI'23). Like Slurm for multi-cloud, NOT IaC. NEVER bypass. NEVER treat as RunPod-specific."
  - file: .claude/metalearning/2026-03-14-skypilot-bare-vm-docker-violation.md
    applies_to: [deployment/skypilot/]
    rule: "Cloud GPU execution MUST use Docker images via image_id. Bare VM setup scripts are BANNED."
  - file: .claude/metalearning/2026-03-09-dotenv-docker-compose-v2.md
    applies_to: [docker-compose.yml, docker-compose.flows.yml]
    rule: "Always use --env-file with docker compose"
  - file: .claude/metalearning/2026-03-06-standalone-script-antipattern.md
    applies_to: [scripts/]
    rule: "Training goes through Prefect flows in Docker, not standalone scripts"
  - file: .claude/metalearning/2026-03-16-unauthorized-aws-s3-architecture-migration.md
    applies_to: [deployment/skypilot/, .dvc/, scripts/configure_dvc_remote.py]
    rule: "NEVER change cloud providers without user authorization. Two providers: RunPod + GCP. Data on GCS."

planning_docs:
  - file: docs/planning/docker-security-hardening-mlsecops-report.md
    status: implemented
  - file: docs/planning/skypilot-runpod-architecture-report.md
    status: partial
  - file: docs/planning/prefect-docker-optimization-and-monai-consolidation.md
    status: partial
  # GCP + cloud planning docs indexed in cloud domain (knowledge-graph/domains/cloud.yaml)

open_issues:
  - number: 564
    title: "Dockerized GPU benchmark plan"
