[pytest]
# Staging test tier — fast unit tests only.
# Target: complete in under 5 minutes on any developer machine.
# Usage: uv run pytest -c pytest-staging.ini
#        bash scripts/run_staging_tests.sh
#
# Excludes: slow (>5s), integration (external services), e2e, gpu tests.
# Includes: all fast unit tests in tests/unit/ and tests/v2/unit/.
#
# Note: Parallel execution (xdist) is NOT used here — xdist is incompatible
# with the Prefect + MLflow shared state in this test suite. Sequential
# execution is stable and takes ~3-4 minutes for ~3800 tests.
testpaths = tests/unit tests/v2/unit
pythonpath = .
addopts = -m "not slow and not integration and not e2e and not gpu" -x --tb=short -q
markers =
    unit: Fast isolated unit tests
    integration: Integration tests requiring services
    e2e: End-to-end pipeline tests
    slow: Tests that take >30s
    gpu: Tests requiring CUDA GPU
    real_data: Requires real MiniVess dataset (not run in CI)
    requires_mlflow_server: Tests requiring a running MLflow server
